iption":"Погрузитесь в мир роскоши и утонченности с \"Комплектом ДУБАЙ\" от Aura — шедевром мебельного искусства, созданным для тех, кто ценит великолепие и неподвластную времени элегантность. Этот монументальный гарнитур, представленный величественным трехместным диваном и двумя импозантными креслами, с первого взгляда заявляет о себе как о центральном элементе самого изысканного интерьера. Он идеально впишется в дворцовые ансамбли, классические гостиные или просторные загородные резиденции, привнося атмосферу аристократического шика и подлинного восточного колорита.\n\nКаждая деталь комплекта \"ДУБАЙ\" — это ода ручному мастерству и богатому декору. Роскошный резной каркас, выполненный из ценных пород дерева, щедро покрыт эффектной золотой поталью, придающей мебели ослепительное сияние и благородный блеск. Замысловатые узоры, витиеватые цветочные мотивы и классические завитки, искусно вырезанные мастерами, создают ощущение подлинного королевского убранства. Этот золотой акцент гармонично контрастирует с нежной и благородной обивкой, подчеркивая ее изысканность.\n\nОбивочный материал — это высококачественный мебельный текстиль в оттенке слоновой кости или нежного шампанского, с едва уловимым, но очень изысканным орнаментом, который добавляет глубины и тактильного удовольствия. Спинка дивана и кресел украшена элегантной каретной стяжкой (капитоне), формирующей объемные ромбы и подчеркивающей классический характер гарнитура. Многочисленные декоративные подушки различных форм и размеров, некоторые из которых имеют тонкие оборки или центральное утягивание, не только добавляют уюта, но и служат дополнительным украшением, приглашая окунуться в мир абсолютного расслабления.\n\n\"Комплект ДУБАЙ\" — это не просто мебель, это заявление о статусе, безупречном вкусе и стремлении к жизни, наполненной красотой и изысканностью. Он способен преобразить любое пространство, вдохнув в него дух роскоши и величия, достойный самых взыскательных интерьеров.\n\n### Техническая информация:\n*   **Тип:** Мягкая группа для гостиной (диван 3-местный, 2 кресла).\n*   **Материал:**\n    *   Каркас: Резное дерево, покрытое золотой поталью (золочение).\n    *   Обивка: Высококачественный мебельный текстиль (предположительно жаккард или дамаст) с орнаментом.\n*   **Цвет:**\n    *   Каркас: Золотой.\n    *   Обивка: Светлый кремовый / Слоновая кость / Оттенок шампань.\n*   **Особенности:**\n    *   Изысканный дворцовый стиль / Роскошная классика / Барокко.\n    *   Щедрая ручная художественная резьба по дереву на каркасе.\n    *   Декоративное золочение на резных элементах.\n    *   Глубокая каретная стяжка (капитоне) на спинках дивана и кресел.\n    *   В комплект входят декоративные подушки различных форм и размеров.\n    *   Элегантные фигурные ножки.\n    *   Орнаментальный узор на обивочной ткани."}},"__N_SSG":true},"page":"/products/[id]","query":{"id":"qfwFkCfaxsHTMJZ8AFdO"},"buildId":"15N6UJ1ZcCWJtJ8S4Eosx","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
