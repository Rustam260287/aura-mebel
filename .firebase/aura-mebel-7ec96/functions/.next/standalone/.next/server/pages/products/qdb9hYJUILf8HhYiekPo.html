":989000000},"description":"Добро пожаловать в мир безупречной роскоши с мебельным магазином \"Aura\"! Представляем вашему вниманию \"Комплект ИМПЕРАТРИЦА\" — великолепное творение, призванное стать жемчужиной вашего интерьера и воплощением изысканного вкуса.\n\nЭтот комплект мягкой мебели, состоящий из величественного трехместного дивана и грациозного кресла, с первого взгляда покоряет своей монументальностью и утонченностью. Он выполнен в стиле неоклассики с отчетливыми элементами барокко, что мгновенно погружает в атмосферу дворцовой роскоши и аристократического шика. Каждая линия, каждый изгиб дышит историей и величием, создавая ощущение, что перед вами не просто мебель, а настоящее произведение искусства, достойное королевских покоев.\n\nСердцем \"Комплекта ИМПЕРАТРИЦА\" является его каркас, выполненный из темного дерева глубокого, насыщенного оттенка, напоминающего благородный орех или махагон. Этот прочный и изысканный каркас щедро украшен сложнейшей ручной резьбой, имитирующей витиеватые узоры, растительные мотивы и изящные завитки. Особое внимание привлекает золотое покрытие этих резных элементов, которое переливается мягким античным блеском, создавая эффект позолоты и придавая мебели поистине царский вид. Обивка выполнена из роскошного велюра глубокого темно-коричневого цвета, напоминающего оттенок мокко или горького шоколада, который приглашает окунуться в объятия мягкости и комфорта.\n\nИзящные детали завершают образ: глубокая каретная стяжка (капитоне) на спинках дивана и кресла формирует объемный рельеф, подчеркивая пышность и удобство. Спинка дивана дополнительно акцентирована центральной плиссированной розеткой, напоминающей распускающийся бутон или веер, добавляющей уникальности. Изогнутые подлокотники и фигурные ножки, также украшенные резным декором с золотой отделкой, довершают облик. \"Комплект ИМПЕРАТРИЦА\" создает в помещении атмосферу величия и благородства, обещая не только непревзойденный комфорт, но и статус, который будет радовать вас и в
