},"description":"Добро пожаловать в мир утонченности и роскоши с \"Моделью «Каролина»\" от \"Aura\". Этот великолепный гарнитур – истинное воплощение дворцовой элегантности, призванное преобразить вашу гостиную в пространство, достойное королевских особ. Сочетая в себе величественный трехместный диван и два грациозных кресла, \"Каролина\" не просто мебель, а произведение искусства, вдохновленное величием классических эпох и стилей барокко и рококо. Она идеально впишется в интерьер, где ценят традиции, изящество и неподвластную времени красоту.\n\nКаждый элемент \"Каролины\" говорит о мастерстве и внимании к деталям. Каркас, выполненный из массива дерева, поражает воображение своей витиеватой резьбой, имитирующей ручную работу, с цветочными и орнаментальными мотивами. Он покрыт благородной античной белой или кремовой отделкой с золотистой патиной, которая нежно подчеркивает каждый изгиб и завиток, создавая ощущение старинной ценности и благородного блеска. Основная обивка – это роскошная ткань с тканым рисунком, вероятно, жаккард или дамаск, где на фоне благородного серо-голубого или дымчатого оттенка расцветают изысканные золотистые и серебристые узоры, придавая мебели дополнительный объем и сияние.\n\nСпинки дивана и кресел украшены глубокой каретной стяжкой капитоне, что не только добавляет визуальной привлекательности, но и обеспечивает исключительный комфорт. Объемные подушки, часть из которых выполнена из однотонной, возможно, велюровой ткани, а другие повторяют основной узор обивки, приглашают окунуться в объятия мягкости и уюта. Среди них выделяется элегантная круглая подушка на диване и декоративные подушки с изящными кисточками на креслах, довершающие образ завершенностью и шармом. \"Модель «Каролина»\" — это не просто место для отдыха, это центр притяжения, где каждая встреча или тихий вечер наполнятся особой атмосферой роскоши и благородства.\n\n**Техническая информация:**\n\n*   **Тип:** Гарнитур для гостиной (трехместный диван и два кресла).\n*   **Стил
