tails":{"dimensions":"","material":"","care":""},"description":"Добро пожаловать в мир утонченной роскоши и безупречного стиля с обеденной группой \"Стол Лапка\" от мебельного магазина \"Aura\". Этот ансамбль – истинное воплощение величия и изысканности, призванный преобразить ваше пространство, наполнив его атмосферой аристократического шика и неподвластной времени элегантности. Каждая деталь комплекта тщательно продумана, чтобы создать гармоничное и впечатляющее зрелище, достойное центрального места в вашем доме.\n\nСердцем этого великолепного комплекта является просторный овальный стол, который величественно возвышается на массивной центральной опоре. Столешница, выполненная в глянцевом исполнении, завораживает своим изысканным мраморным рисунком в серых и белых тонах, придавая изделию не только благородный, но и практичный вид. Края столешницы и изящная колоннообразная основа стола щедро украшены объемной резьбой, создающей эффект старинного убранства. Именно в этих грациозных изгибах и тонких, словно вылепленных вручную узорах, кроется секрет названия \"Лапка\" – они придают всей конструкции легкость и одновременно надежную опору, словно бережное прикосновение.\n\nВ идеальном тандеме со столом выступают шесть стульев, каждый из которых является самостоятельным произведением искусства. Их каркасы, гармонично продолжающие стилистику стола, поражают своей фигурной резьбой и изящными, плавно изогнутыми ножками. Высокие спинки стульев обиты благородным велюром глубокого графитового оттенка, обещая необыкновенный комфорт и мягкость. Сиденья, выполненные из плотной, гладкой мебельной ткани более светлого серого тона с легким глянцевым блеском, создают выразительный контраст фактур, подчеркивая утонченность дизайна и приглашая окунуться в мир непревзойденного удобства.\n\nОбеденная группа \"Стол Лапка\" – это больше, чем просто мебель; это приглашение к созданию незабываемых моментов и теплых воспоминаний. Она станет идеальным решением для роскошных столовых, просторных гостиных или торжественных банкетных залов, где ценится красота, функциональность и долговечность. Выберите \"Стол Лапка\", чтобы привнести в свой интерьер дыхание классической роскоши, которая будет радовать глаз и дарить комфорт всем вашим гостям и членам семьи.\n\n---\n\n**Техническая информация:**\n\n*   **Тип:** Обеденная группа (стол и 6 стульев).\n*   **Форма столешницы:** Овальная.\n*   **Материал:**\n    *   **Каркас (стол и стулья):** Массив дерева с лаковым покрытием.\n    *   **Столешница:** Искусственный камень с мраморным рисунком, глянцевая.\n    *   **Обивка спинки стульев:** Велюр.\n    *   **Обивка сиденья стульев:** Плотная мебельная ткань с глянцевым эффектом.\n*   **Цвет:**\n    *   **Каркас (стол и стулья):** Светлый кремовый / Слоновая кость с серебристой патиной.\n    *   **Столешница:** Серо-белый мраморный рисунок.\n    *   **Обивка спинки стульев:** Темно-серый / Графитовый.\n    *   **Обивка сиденья стульев:** Средне-серый.\n*   **Особенности:**\n    *   Резные декоративные элементы на каркасе стола и стульев.\n    *   Фигурные (изогнутые) ножки стульев.\n    *   Массивная центральная опора стола (пьедестал) с вертикальным рифлением.\n    *   Изысканные, высокие спинки стульев с резным верхом в форме короны.\n    *   Комплект включает 1 стол и 6 стульев."}},"__N_SSG":true},"page":"/products/[id]","query":{"id":"BPmVaRfVFu4r4SxEw2DK"},"buildId":"15N6UJ1ZcCWJtJ8S4Eosx","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
