ачество и уют.\n\n---\n\n**Техническая информация:**\n\n*   **Тип:** Комплект мягкой мебели (Диван-тройка и два кресла)\n*   **Материал:**\n    *   Обивка: Премиальный текстиль (предположительно, микровелюр или ткань с аналогичной тактильной фактурой)\n    *   Каркас/Основание/Ножки: Натуральное дерево светлых пород (светлый орех, бук)\n    *   Наполнитель: Мягкий, многослойный (визуально создает объем и комфорт)\n*   **Цвет:**\n    *   Обивка: Теплый серо-коричневый (Тауп)\n    *   Деревянные элементы: Натуральный светлый оттенок дерева\n*   **Особенности:**\n    *   Диван с выразительной изогнутой деревянной основой и декоративными многослойными деревянными подлокотниками.\n    *   Кресла с высокими, конусообразными деревянными ножками.\n    *   Мягкие, объемные подушки спинки и сидений.\n    *   Съемные подушки для спинки и декоративные подушки в комплекте.\n    *   Выразительная декоративная строчка по контуру всех элементов.\n    *   Эргономичный дизайн, способствующий комфортному отдыху.\n    *   Защитные пластиковые подпятники на ножках кресел."}},"__N_SSG":true},"page":"/products/[id]","query":{"id":"cVQcon70ZDD6W21yY6Y0"},"buildId":"15N6UJ1ZcCWJtJ8S4Eosx","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
