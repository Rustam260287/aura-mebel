escription":"Добро пожаловать в мир утонченности и роскоши с банкеткой \"Латифа\" от Aura!\n\nПредставляем вашему вниманию Банкетку \"Латифа\" – подлинное воплощение дворцовой роскоши и утонченной элегантности, призванное стать центральным акцентом в любом интерьере. С первого взгляда она очаровывает своей грациозностью и величием, перенося в атмосферу классических европейских салонов. Это не просто предмет мебели, а произведение искусства, созданное для тех, кто ценит красоту и изысканность в каждой детали, стремясь придать своему дому неповторимый шарм и благородство.\n\nИзящный каркас банкетки выполнен в насыщенном золотом цвете, украшенном богатой, витиеватой резьбой и объемными декоративными элементами. Пышные завитки, растительные мотивы и искусные орнаменты создают ощущение благородной старины и безупречного вкуса, отсылая к стилям барокко и рококо. Обивка гармонично сочетает в себе два вида текстиля: мягкий, приятный на ощупь велюр светлого, кремового или серо-бежевого оттенка обволачивает подлокотники и внешние части спинки, а сиденье и центральная часть спинки украшены роскошной тканью с дамасским или флоральным узором в бежево-золотистых тонах, добавляя нотку королевского шика.\n\nЗавершают образ декоративные подушки: одна круглая, с элегантной утяжкой и складками, и два валика с изящными кистями-подвесками, выполненные в тон основной однотонной обивке. Эти детали не только повышают комфорт, но и подчеркивают уникальный характер \"Латифы\", делая ее неотразимой в прихожей, гостиной, спальне или будуаре. Банкетка \"Латифа\" наполнит ваше пространство светом и изысканностью, создавая атмосферу уюта и благородства, и несомненно будет притягивать восхищенные взгляды, становясь ярким акцентом в любом интерьере.\n\n### Техническая информация:\n\n*   **Тип:** Банкетка / Диванчик\n*   **Стиль:** Классический, с элементами барокко\n*   **Материал каркаса:** Дерево (предположительно), Декоративное покрытие \"Золото\"\n*   **Материал обивки:** Велюр (однотонный), Жаккардовая ткань с узором\n*   **Цвет каркаса:** Золотой\n*   **Цвет обивки:** Светло-бежевый, Кремовый, Золотистый (узор)\n*   **Особенности:** Резной каркас с орнаментом, фигурные ножки (кабриоль), высокая фигурная спинка, подлокотники с завитками, декоративные подушки (круглая с утяжкой, валики с кистями), комбинированная обивка из двух типов ткани."}},"__N_SSG":true},"page":"/products/[id]","query":{"id":"ZHHeT39Nu0ESIFGyjyrg"},"buildId":"15N6UJ1ZcCWJtJ8S4Eosx","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
