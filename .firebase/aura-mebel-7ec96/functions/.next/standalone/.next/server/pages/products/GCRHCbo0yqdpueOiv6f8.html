":{"dimensions":"","material":"","care":""},"description":"Добро пожаловать в мир утонченной роскоши с мебельным магазином \"Aura\"! Представляем вашему вниманию поистине королевский гарнитур \"Анжелика\", созданный, чтобы дарить вдохновение и воплощать мечты об идеальной спальне. С первого взгляда он очаровывает своей грациозностью и величием, перенося вас в эпоху дворцовой элегантности и романтики. Этот гарнитур — ода классическому стилю с явными элементами барокко и рококо, где каждая деталь служит торжеству красоты и изысканности.\n\nЦентральное место в коллекции занимает величественная кровать, притягивающая взгляд своим высоким, пышно декорированным изголовьем. Оно украшено глубокой каретной стяжкой (капитоне) из мягкой, бархатистой ткани цвета шампань, что придает ей невероятно притягательный и уютный вид. Резные элементы, изображающие цветочные гирлянды и пышные завитки, щедро покрыты золотой патиной, создавая эффект антикварной роскоши и благородства. Изножье кровати не уступает изголовью по богатству декора, повторяя его резные узоры и изящные изгибы, которые словно обнимают ложе, обещая безмятежный сон.\n\nГарнитур дополняют изящные прикроватные тумбы и грандиозный туалетный столик с зеркалом. Каждый предмет мебели выполнен в единой стилистике: основной цвет — благородная слоновая кость, подчеркнутая золотистыми акцентами на резных деталях и изысканной фурнитуре. Столешницы тумб и туалетного столика имеют глянцевое покрытие с тонким, мраморным рисунком, добавляя функциональности и шарма. Фигурные ножки, характерные для классического стиля, завершают образ, привнося легкость и утонченность, несмотря на массивность и прочность конструкции. Зеркало в богато декорированной раме, повторяющей узоры кровати, становится венцом туалетного столика, отражая великолепие всей композиции.\n\n\"Анжелика\" – это не просто мебель, это целый ансамбль, который преобразит вашу спальню в настоящий будуар. Он создает атмосферу абсолютного комфорта, неги и торжественного спокойствия, где каждая линия, каждый изгиб и каждое золотое прикосновение говорит о внимании к деталям и бескомпромиссном качестве. Этот гарнитур предназначен для тех, кто ценит вечную классику, стремится окружить себя предметами искусства и жаждет превратить свою спальню в личное святилище роскоши и гармонии.\n\n**Техническая информация:**\n\n*   **Тип:** Спальный гарнитур (включает кровать, две прикроватные тумбы, туалетный столик с зеркалом, пуф).\n*   **Стиль:** Классический, барокко, рококо.\n*   **Материал:**\n    *   **Корпус:** Высококачественный МДФ / массив дерева (с глянцевым покрытием).\n    *   **Отделка:** Пышная ручная резьба, золоченое патинирование (золотой акцент), лаковое покрытие.\n    *   **Обивка:** Велюр / бархат (или аналогичная мягкая ткань) на изголовье и пуфе.\n    *   **Столешницы:** Глянцевое покрытие с имитацией рисунка натурального камня (мрамора).\n    *   **Фурнитура:** Изящные металлические ручки золотого/бронзового оттенка.\n*   **Цвет:** Слоновая кость / Кремовый (основной), Золотой (акценты), Шампань / Светло-бежевый (обивка).\n*   **Особенности:**\n    *   Высокое изголовье с каретной стяжкой (капитоне).\n    *   Обильное декоративное резное оформление на всех элементах гарнитура (цветы, завитки, вензеля).\n    *   Фигурные резные ножки.\n    *   Зеркало в резной, массивной раме.\n    *   Ящики с декоративными фасадами.\n    *   Глянцевые, износостойкие поверхности."}},"__N_SSG":true},"page":"/products/[id]","query":{"id":"GCRHCbo0yqdpueOiv6f8"},"buildId":"15N6UJ1ZcCWJtJ8S4Eosx","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
