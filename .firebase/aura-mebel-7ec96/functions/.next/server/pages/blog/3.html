нт, напоминающий изящный щит или раковину, обрамленный витиеватыми узорами, а также горизонтальная вставка с тем же классическим орнаментом \"греческий ключ\". Сиденья стульев обиты высококачественным материалом глубокого темно-серого или черного цвета с легким глянцем, который создает эффектный контраст со светлым каркасом, придавая комплекту завершенный и роскошный вид.\n\n\"Стол Роза\" — это не просто мебель, это центральный элемент вашей столовой, призванный стать свидетелем самых теплых семейных ужинов и торжественных приемов. Он создает атмосферу праздника и уюта, где каждый прием пищи превращается в особое событие. Его величественная красота и продуманные детали делают его идеальным выбором для интерьеров, где доминируют классика, роскошь и безупречный вкус, обещая незабываемые моменты и долгие годы эстетического наслаждения.\n\n### Техническая информация:\n\n*   **Тип:** Обеденная группа (1 стол, 6 стульев)\n*   **Материал:**\n    *   Каркас стола и стульев: Массив дерева или высококачественный МДФ (окрашенный).\n    *   Столешница: Глянцевая поверхность (вероятно, лакированная МДФ или закаленное стекло).\n    *   Обивка стульев: Искусственная кожа или высококачественный кожзам.\n    *   Декоративные элементы: Резьба, металлические вставки (орнамент).\n*   **Цвет:**\n    *   Каркас/Столешница: Белый / Слоновая кость / Светло-кремовый.\n    *   Обивка стульев: Темно-серый / Антрацит / Черный.\n    *   Декор: Серебристый (акценты на орнаменте и резьбе).\n*   **Особенности:**\n    *   Изысканный неоклассический/барочный стиль.\n    *   Овальная столешница со скругленными углами.\n    *   Декоративный орнамент \"греческий ключ\" (меандр) по периметру столешницы и на спинках стульев.\n    *   Массивные резные ножки стола с растительным орнаментом (акант).\n    *   Резные элементы на спинках стульев (центральный вензель/щит).\n    *   Глянцевая, отражающая поверхность столешницы."},{"id":"WO42WppZsQMDh54G1EHi","name":"Мишель","price":203500,"imageUrls":["https://label-com.ru/images/virtuemart/product/mishel.png"],"category":"Спальни","originalUrl":"https://label-com.ru/katalog/spalni/mishel-detail.html","createdAt":"2025-11-24T15:26:21.836Z","updatedAt":"2025-11-24T15:26:21.836Z","rating":0,"reviews":[],"details":{"dimensions":"2700  x 1300  x 2100\n","material":"","care":""},"description":"Добро пожаловать в мир безупречной элегантности с коллекцией \"Мишель\" от Aura – истинного воплощения современной классики, созданной для самых изысканных интерьеров. Этот спальный гарнитур мгновенно преображает пространство, наполняя его атмосферой утонченного комфорта и спокойствия. Дизайн коллекции демонстрирует безупречное чувство стиля, сочетая в себе плавные линии, мягкие текстуры и благородные акценты, каждый из которых призван дарить ощущение гармонии и роскоши, превращая вашу спальню в личный оазис безмятежного отдыха.\n\nЦентральное место в композиции занимает кровать с высоким, мягким изголовьем, очерченным изящными изгибами, которые приглашают к расслаблению. Обивка кровати выполнена из приятного на ощупь фактурного текстиля, предположительно букле или велюра, в нежном светло-бежевом или теплом светло-сером оттенке, что придает ей особую мягкость и визуальную теплоту. Дополняют спальное место две изящные прикроватные тумбы с двумя ящиками, отличающиеся идеально гладкими, матовыми фасадами и тонкими, чуть изогнутыми ножками. Их столешницы украшены лаконичными золотистыми металлическими вставками, а миниатюрные ручки под золото добавляют мебели аристократический шарм.\n\nШирокий платяной шкаф, гармонично вписывающийся в общую стилистику, обладает мягко скругленными боковыми секциями, которые смягчают его монументальность и придают интерьеру легкости. Вся корпусная мебель выполнена в единой светлой палитре, создавая ощущение воздушности и простора. Завершает ансамбль элегантный комод с тремя вместительными ящиками, украшенный такими же изогнутыми ножками и золотистыми акцентами. Над ним расположен стильный элемент декора – круглое настенное зеркало с сегментированной рамой, которое перекликается с эстетикой ар-деко и визуально расширяет пространство, отражая свет и добавляя глубины.\n\nКоллекция \"Мишель\" – это воплощение продуманного дизайна, где каждый элемент работает на создание целостного, спокойного и вместе с тем роскошного образа. Изящные детали, такие как золотистые акценты и матовые поверхности, подчеркивают высокий статус мебели, а общая цветовая гамма создает идеальные условия для полноценного отдыха и восстановления. Это не просто мебель, это инвестиция в ваш ежедневный комфорт и эстетическое наслаждение.\n\n---\n\n### Техническая информация:\n\n*   **Тип:** Спальный гарнитур (включает кровать, две прикроватные тумбы, пятидверный шкаф, комод с зеркалом)\n*   **Материал:**\n    *   Корпус мебели: Высококачественная МДФ с матовым покрытием.\n    *   Обивка кровати: Мягкий фактурный текстиль (предположительно букле или велюр).\n    *   Декор и фурнитура: Металл под золото/латунь.\n*   **Цвет:**\n    *   Основной: Светло-бежевый / светло-серый (нейтральный, теплый оттенок).\n    *   Акценты: Золотистый.\n*   **Особенности:**\n    *   Кровать с высоким мягким изголовьем и округлыми формами.\n    *   Элегантные изогнутые ножки у прикроватных тумб и комода.\n    *   Металлические декоративные ручки и торцевые вставки золотого цвета.\n    *   Шкаф с закругленными боковыми секциями.\n    *   Круглое настенное зеркало с сегментированной рамой."},{"id":"WYbg7e3GUFTm64NlGDFs","name":"спальня БОГЕМИЯ","price":55000,"imageUrls":["https://label-com.ru/images/virtuemart/product/bogemiya.jpg"],"category":"Спальни","originalUrl":"https://label-com.ru/katalog/spalni/bogemiya-detail.html","rating":0,"reviews":[],"createdAt":{"_seconds":1764052770,"_nanoseconds":374000000},"description":"Добро пожаловать в мир утонченной элегантности и безмятежного комфорта со спальней \"БОГЕМИЯ\" от мебельного магазина \"Aura\". Этот изысканный гарнитур — истинное воплощение современной классики, пропитанной духом нежной роскоши и романтики. Он создан для тех, кто ценит гармонию форм, продуманность деталей и атмосферу уюта, где каждая мелочь призвана дарить эстетическое наслаждение и спокойствие. \"БОГЕМИЯ\" превратит вашу спальню в настоящий оазис для отдыха и восстановления.\n\nЦентральное место в этом ансамбле занимает величественная кровать, приковывающая взгляд своим мягким изголовьем. Оно обито благородной тканью цвета слоновой кости, украшенной глубокой каретной стяжкой с элегантными пуговицами, что придает ей особую пышность и ощущение комфорта. Корпус кровати, как и прикроватные тумбы, комод и шкаф, выполнен в единой светлой палитре – оттенке слоновой кости или светлого крема, деликатно дополненного патиной под состаренное серебро или легкое шампань-золото. Эта отделка подчеркивает изысканные фрезерованные элементы и создает эффект легкой старины.\n\nОсобое внимание уделено деталям: на фасадах прикроватных тумб и комода, а также на дверцах шкафа, вы найдете изысканные квадратные вставки с рельефным орнаментом. Они служат не только украшением, но и ручками, создавая единую стилистическую нить, которая пронизывает весь гарнитур. Вместительный шкаф-купе с тремя секциями – две из которых зеркальные, а одна глухая панель – не только обеспечивает достаточно места для хранения, но и визуально расширяет пространство, наполняя комнату светом. Зеркало над комодом, обрамленное в том же стиле, довершает образ, предлагая функциональность и декоративность.\n\n\"БОГЕМИЯ\" от \"Aura\" – это не просто набор мебели, это обещание комфорта и красоты, приглашение погрузиться в атмосферу спокойствия и благородства. Каждый элемент гарнитура излучает легкость и воздушность, а продуманное сочетание мягких фактур, глянца зеркал и деликатного блеска патинированных поверхностей создает неповторимый облик, который будет радовать вас долгие годы.\n\n---\n\n**Техническая информация:**\n\n*   **Тип:** Спальный гарнитур (кровать, 2 прикроватные тумбы, шкаф-купе, комод с зеркалом).\n*   **Материал:**\n    *   Изголовье кровати: Мягкая обивка (предположительно велюр или плотная мебельная ткань) с каретной стяжкой.\n    *   Корпус мебели: МДФ/ДСП с финишным покрытием, имитирующим патинированное дерево.\n    *   Декоративные элементы и ручки: Металлические, с рельефным орнаментом (оттенок под состаренное серебро/светлое шампань-золото).\n    *   Зеркала: Стеклянные, в дверцах шкафа и над комодом.\n*   **Цвет:** Слоновая кость / Светло-кремовый с патинированием под состаренное серебро или светлое шампань-золото.\n*   **Особенности:**\n    *   Мягкое изголовье кровати с каретной стяжкой и пуговицами.\n    *   Единый декоративный мотив с квадратными рельефными вставками на фасадах и ручках всех элементов.\n    *   Шкаф-купе с тремя секциями, включая две зеркальные дверцы.\n    *   Зеркало в фигурной раме над комодом.\n    *   Фасады с фрезерованными или рельефными элементами по периметру."},{"id":"WdO2YLh0UtdOkdeFvCjs","name":"Стол Рим","imageUrls":["https://label-com.ru/images/virtuemart/product/stol_rim.jpg"],"category":"Гостиная","originalUrl":"https://label-com.ru/katalog/gostinaya/stol-rim-detail.html","createdAt":"2025-11-24T15:26:21.848Z","updatedAt":"2025-11-24T15:26:21.848Z","rating":0,"reviews":[],"details":{"dimensions":"","material":"","care":""},"price":30000,"description":"Добро пожаловать в мир безупречной элегантности с обеденной группой \"Стол Рим\" от мебельного магазина Aura. Представьте себе сердце вашего дома, где каждый обед превращается в изысканное торжество, а ужин — в момент истинного наслаждения. Эта коллекция, выполненная в стиле современной классики с легким неоклассическим акцентом, воплощает в себе вечную красоту и грацию, достойную самых роскошных интерьеров.\n\nВ центре ансамбля — величественный стол, чья сияющая белоснежная столешница с глянцевым покрытием мгновенно притягивает взгляд. Прямоугольная форма со скругленными углами придает ему мягкость и гостеприимность, а видимый стык в центре намекает на его раздвижной механизм, предлагая простор для большой компании. Изысканность стола подчеркивает фрезерованное подстолье с вертикальными рифлениями, создающими игру света и тени, и четыре точеные ножки, украшенные объемным узором, напоминающим античные колонны. Каждая деталь выполнена с безупречным вкусом, превращая функциональный предмет мебели в произведение искусства.\n\nДополняют эту роскошную картину элегантные стулья, гармонично продолжающие заданный столом стиль. Их белоснежные, будто выточенные из слоновой кости, каркасы с изящными изгибами и точеными ножками безупречно сочетаются с ножками стола. Овальные спинки и сиденья обиты роскошным велюром глубокого темно-серого, почти антрацитового цвета, который дарит ощущение мягкости и комфорта. Контраст между светлым каркасом и благородным темным велюром создает утонченный и притягательный образ, обещая уютные и стильные вечера.\n\nОбеденная группа \"Стол Рим\" — это не просто мебель, это манифест вкуса и стиля. Она идеально впишется в пространство, где ценят классические формы, высокое качество и неподвластную времени эстетику. Создайте атмосферу роскоши и уюта в вашей столовой с Aura, где каждая деталь говорит о статусе и утонченности.\n\n---\n\n**Техническая информация:**\n\n*   **Тип:** Обеденная группа (стол + стулья)\n*   **Форма столешницы:** Прямоугольная со скругленными углами\n*   **Механизм трансформации:** Раздвижной (по видимой линии на столешнице)\n*   **Материал столешницы:** Глянцевое покрытие (предположительно, МДФ с эмалью/лаком)\n*   **Материал основания (ножки стола и каркас стульев):** Дерево/Массив дерева (резные, точеные элементы)\n*   **Материал обивки стульев:** Велюр/Бархат\n*   **Цвет стола:** Белый\n*   **Цвет каркаса стульев:** Белый\n*   **Цвет обивки стульев:** Темно-серый / Антрацит\n*   **Особенности стола:** Фрезерованный (рифленый) подстолье, резные/точеные ножки с объемным узором.\n*   **Особенности стульев:** Изогнутые линии каркаса, овальная форма спинки, точеные ножки.\n*   **Стиль:** Неоклассика / Современная классика."},{"id":"X6RUEEA9VA7kDP4KFB5v","name":"Ариэль","imageUrls":["https://label-com.ru/images/virtuemart/product/ariel.jpg"],"category":"Спальни","originalUrl":"https://label-com.ru/katalog/spalni/ariel-detail.html","createdAt":"2025-11-24T15:26:21.820Z","updatedAt":"2025-11-24T15:26:21.820Z","rating":0,"reviews":[],"details":{"dimensions":"","material":"","care":""},"price":137500,"description":"Представляем вашему вниманию \"Ариэль\" от мебельного магазина \"Aura\" – воплощение мечты о роскошной и уютной спальне.\n\nСпальный гарнитур \"Ариэль\" от Aura — это не просто мебель, это воплощение изысканной мечты о безмятежном отдыхе и утонченной роскоши. Представьте себе убежище, где каждый элемент создан для того, чтобы дарить комфорт и эстетическое наслаждение. \"Ариэль\" мастерски сочетает в себе элегантность современной классики с легкими нотами арт-деко, предлагая интерьер, достойный самых взыскательных ценителей. Это симфония мягких линий, благородных оттенков и продуманных деталей, призывающая окунуться в атмосферу абсолютного покоя и стиля.\n\nЦентральным акцентом гарнитура является величественная кровать с высоким мягким изголовьем, обитым бархатистой тканью нежного цвета шампань. Его уникальный, изогнутый геометрический узор придает спальне динамичность и современный шик, а тонкий золотой кант по верхнему краю изголовья и основания кровати подчеркивает изящество формы. Все элементы гарнитура – кровать, прикроватные тумбы и туалетный столик – выполнены в нежном кремовом оттенке, который идеально гармонирует с золотыми декоративными акцентами. Эти деликатные золотые полосы, словно драгоценные нити, обрамляют каждый предмет, добавляя ему благородного сияния.\n\nФасады прикроватных тумб и туалетного столика удивляют своим рельефным, волнообразным декором, создающим игру света и тени и придающим мебели неповторимую индивидуальность. Глянцевые поверхности отражают свет, наполняя пространство воздухом и легкостью, в то время как изящные металлические ручки завершают образ, привнося нотку современного минимализма в классический дизайн. Зеркальные элементы гарнитура не только функциональны, но и визуально расширяют пространство, а встроенная подсветка над зеркалом туалетного столика обеспечивает идеальное освещение для ваших утренних ритуалов.\n\n\"Ариэль\" — это больше, чем спальный гарнитур; это готовое решение для создания спальни, которая станет вашим личным оазисом красоты и спокойствия. Он создан для тех, кто ценит гармонию, высокое качество и безупречный стиль в каждой детали, стремясь окружить себя мебелью, которая будет радовать глаз и дарить комфорт на протяжении долгих лет. Отдайтесь очарованию \"Ариэль\" и позвольте себе роскошь истинного расслабления, где каждый день начинается и заканчивается в атмосфере исключительного комфорта и изящества.\n\n***\n\n**Техническая информация:**\n\n*   **Тип:** Спальный гарнитур\n*   **Состав гарнитура (видимые элементы):** Двуспальная кровать с мягким изголовьем, две прикроватные тумбы, туалетный столик с зеркалом, шкаф (элемент, видимый на заднем плане, выполнен в едином стиле).\n*   **Материал:**\n    *   Корпус/фасады: Вероятно, ЛДСП/МДФ с глянцевым или лакированным покрытием.\n    *   Изголовье кровати: Мягкая обивка (предположительно, велюр или бархатистая ткань).\n    *   Декоративные элементы: Металл \"под золото\".\n    *   Ручки: Металлические.\n    *   Зеркальные вставки.\n*   **Цвет:**\n    *   Основной: Кремовый / Молочный.\n    *   Акценты: Золотой.\n    *   Обивка изголовья: Шампань / Светло-бежевый.\n*   **Особенности:**\n    *   Высокое мягкое изголовье с фигурным, изогнутым узором/стежкой.\n    *   Декоративные золотые канты и вставки по всему периметру элементов.\n    *   Рельефные/волнообразные фасады ящиков на прикроватных тумбах и туалетном столике.\n    *   Изящные металлические ручки современного дизайна.\n    *   Интегрированные зеркальные элементы.\n    *   Встроенная подсветка над зеркалом туалетного столика.\n    *   Закругленные углы у некоторых элементов (например, у основания кровати и тумб).\n    *   Постельное белье с вышивкой (демонстрационный элемент, подчеркивающий стиль гарнитура)."},{"id":"XPxMlYHIz78GFW74a4ZK","name":"E L I T","price":170000,"imageUrls":["https://label-com.ru/images/virtuemart/product/262.jpg"],"category":"Мягкая мебель","originalUrl":"https://label-com.ru/katalog/myagkaya-mebel/e-l-i-t-detail.html","createdAt":"2025-11-24T15:26:21.840Z","updatedAt":"2025-11-24T15:26:21.840Z","rating":0,"reviews":[],"details":{"dimensions":"","material":"","care":""},"description":"Представляем вашему вниманию \"E L I T\" – воплощение изысканности и непревзойденного комфорта от мебельного магазина \"Aura\". Этот великолепный комплект мягкой мебели, состоящий из просторного трехместного дивана и двух уютных кресел, разработан для того, чтобы стать центральным элементом вашей гостиной, придавая ей атмосферу утонченной роскоши и домашнего тепла. Дизайн \"E L I T\" гармонично сочетает в себе элегантность современной классики с эргономичным подходом к удобству, создавая пространство, где каждая деталь продумана для вашего идеального отдыха.\n\nКомплект \"E L I T\" обит высококачественным фактурным текстилем нежного, теплого песочного оттенка, который дарит ощущение мягкости и приглашает расслабиться. Этот благородный цвет служит идеальной основой для контрастных акцентов: глубокие шоколадные вставки из плотного текстиля или экокожи, а также тонкий кант того же оттенка, мастерски подчеркивают изящные линии мебели. Особое внимание привлекают подлокотники, где плавные изгибы обивки переходят в роскошные декоративные элементы из натурального дерева, выполненные в насыщенном коричневом цвете с заметной текстурой. Эти деревянные вставки не только добавляют конструкции прочности, но и придают ей выразительность и неповторимый шарм.\n\nКаждое изделие в комплекте \"E L I T\" отличается щедрым наполнителем, формирующим пышные, но упругие подушки сидений и спинок, которые обещают исключительный комфорт. Декоративные подушки на диване и креслах, с их контрастным дизайном, не только дополняют эстетику, но и добавляют дополнительный уровень уюта. Устойчивые, слегка зауженные к низу ножки из массива дерева, повторяющие оттенок деревянных элементов на подлокотниках, обеспечивают надежную опору и завершают образ, приподнимая мебель над полом и придавая ей легкость. \"E L I T\" — это не просто мебель, это инвестиция в ваш ежедневный комфорт и стиль, созданная для того, чтобы радовать вас и ваших гостей долгие годы.\n\n\"E L I T\" создан для тех, кто ценит безупречное качество, эстетику и функциональность. Он идеально впишется как в классические, так и в более современные интерьеры, становясь настоящим оазисом релаксации. Пригласите этот изысканный комплект в свой дом, и он наполнит пространство гармонией, уютом и ощущением истинного благородства.\n\n***\n\n### Техническая информация:\n\n*   **Тип:** Комплект мягкой мебели для гостиной (диван и два кресла)\n*   **Материал:**\n    *   **Основная обивка:** Высококачественный фактурный мебельный текстиль.\n    *   **Акцентные элементы/кант/подушки:** Контрастный плотный текстиль или экокожа.\n    *   **Декоративные вставки/ножки:** Массив натурального дерева (вероятно, бук или орех).\n*   **Цвет:**\n    *   **Основной:** Теплый песочный/светло-бежевый.\n    *   **Акценты/Деревянные элементы:** Глубокий шоколадный/темно-коричневый.\n*   **Особенности:**\n    *   Элегантный дизайн в стиле современной классики.\n    *   Эргономичные, пышные подушки сидений и спинок.\n    *   Интегрированные декоративные элементы из натурального дерева на подлокотниках.\n    *   Контрастная окантовка и детализация.\n    *   Декоративные подушки в комплекте.\n    *   Устойчивые ножки из массива дерева.\n    *   Широкие, комфортные подлокотники.\n    *   Трехместный диван.\n    *   Два индивидуальных кресла."},{"id":"XuSNL4g25yXzY36uUMXv","name":"Стул Рим","price":6000,"imageUrls":["https://label-com.ru/images/virtuemart/product/stol_rim6.jpg"],"category":"Гостиная","originalUrl":"https://label-com.ru/katalog/gostinaya/stul-rim-detail.html","rating":0,"reviews":[],"createdAt":{"_seconds":1764053785,"_nanoseconds":346000000},"description":"Добро пожаловать в мир утонченной элегантности с \"Стулом Рим\" от \"Aura\" – воплощением изысканного стиля и безупречного комфорта, созданного для ценителей истинной красоты. Взгляните на этот предмет мебели, и вы сразу ощутите притяжение классических форм, переосмысленных в современном ключе. Его дизайн — это гармоничное сочетание неоклассической грации и актуальной функциональности, призванной добавить роскоши и уюта вашей столовой или гостиной.\n\nКаждый элемент \"Стула Рим\" свидетельствует о внимании к деталям и мастерстве исполнения. Каркас стула выполнен из высококачественного дерева, окрашенного в благородный оттенок слоновой кости или очень светлого серого цвета, что придает ему воздушность и легкость. Изящные, точеные ножки с характерными продольными желобками и едва уловимыми резными элементами демонстрируют утонченность ручной работы, словно перенося нас в дворцовые интерьеры. Эта деликатная фрезеровка, повторяющаяся и на царге стола, создает ощущение целостности и завершенности композиции.\n\nОбивка стула выполнена из мягкого, струящегося велюра глубокого темно-серого, почти графитового оттенка. Этот материал не только дарит непередаваемые тактильные ощущения, но и визуально обогащает пространство, притягивая взгляд своей бархатистой текстурой и способностью играть со светом. Сочетание светлого каркаса и темной обивки создает элегантный контраст, который подчеркивает изысканность стула и придает ему особый шик. Округлая, эргономичная спинка и мягкое сиденье обеспечивают максимальный комфорт, приглашая задержаться за столом на долгие часы приятных бесед.\n\n\"Стул Рим\" идеально впишется в интерьеры, где ценится вневременная классика с нотками современной роскоши. Он станет центральным акцентом в вашей обеденной зоне, будь то торжественные приемы или теплые семейные ужины. Создайте атмосферу утонченности и комфорта, где каждая деталь гармонично дополняет другую, и наслаждайтесь превосходством дизайна и качества, которое предлагает мебельный магазин \"Aura\".\n\n### Техническая информация:\n\n*   **Тип:** Обеденный стул\n*   **Материал:** Каркас – крашеное дерево (предположительно массив или МДФ), Обивка – велюр\n*   **Цвет:** Каркас – светлый (молочно-белый / оттенок слоновой кости / светло-серый), Обивка – темно-серый / графитовый\n*   **Особенности:** Изящные точеные и фрезерованные ножки, округлая эргономичная спинка, мягкие сиденье и спинка, классический дизайн с элементами неоклассики."},{"id":"XxCyEoM1JIVyrzLjS396","name":"Хилтон","price":156000,"imageUrls":["https://label-com.ru/images/virtuemart/product/127.jpg"],"category":"Мягкая мебель","originalUrl":"https://label-com.ru/katalog/myagkaya-mebel/khilton-detail.html","rating":0,"reviews":[],"createdAt":{"_seconds":1764053558,"_nanoseconds":664000000},"description":"**Диван \"Хилтон\" – воплощение безмятежной элегантности**\n\nПредставляем вашему вниманию угловой диван \"Хилтон\" – истинный шедевр, созданный для тех, кто ценит гармонию современного стиля и классического комфорта. Этот диван не просто предмет мебели, а центральный элемент вашей гостиной, способный преобразить пространство, наполнив его атмосферой уюта и изысканности. Его обтекаемые формы и продуманный дизайн говорят о внимании к каждой детали, обещая стать идеальным местом для релаксации и приятного времяпровождения.\n\nВ основе дизайна \"Хилтон\" лежит притягательная мягкость бархатистой текстильной обивки в нежном оттенке слоновой кости или светлого бежевого. Этот благородный цвет придает дивану легкость и воздушность, позволяя ему органично вписаться как в светлые, так и в более контрастные интерьеры. Особый шарм изделию придают изящные вертикальные каннелюры на спинке и боковинах, которые создают игру света и тени, подчеркивая объем и придавая всей конструкции выразительность.\n\nКонтрастным акцентом выступает массивное основание и утонченные конические ножки из натурального дерева глубокого орехового оттенка. Этот элемент не только обеспечивает надежную опору, но и привносит в облик дивана теплоту и респектабельность. Глубокая посадка и обилие мягких подушек, заботливо повторяющих основные изгибы спинки, приглашают окунуться в мир абсолютного комфорта, где каждая минута превращается в мгновение блаженства. \"Хилтон\" – это диван, который не только радует глаз, но и дарит незабываемые тактильные ощущения.\n\nСозданный для полноценного отдыха и изысканных приемов, \"Хилтон\" идеально впишется в интерьеры в стиле неоклассики, современного минимализма с элементами роскоши или контемпорари. Он станет эпицентром вашего домашнего очага, где каждый член семьи и гость сможет насладиться непревзойденным комфортом и элегантностью, которые дарит этот диван.\n\n---\n\n**Техническая информация:**\n\n*   **Тип:** Угловой диван\n*   **Материал:** Мягкая текстильная обивка (предположительно, велюр или схожая фактурная ткань), массив дерева (ножки, основание)\n*   **Цвет:** Светло-бежевый / кремовый / слоновая кость (обивка), Темно-коричневый (деревянные элементы)\n*   **Особенности:** Декоративная вертикальная стежка (каннелюры) на спинке и подлокотниках, глубокая посадка, несколько съемных подушек спинки, декоративные подушки в комплекте, устойчивые конические деревянные ножки, обтекаемые формы подлокотников."},{"id":"Y92g37wylxj8ckBZBkvb","name":"Грация","imageUrls":["https://label-com.ru/images/virtuemart/product/gratsiya.png"],"category":"Спальни","originalUrl":"https://label-com.ru/katalog/spalni/gratsiya-detail.html","createdAt":"2025-11-24T15:26:21.833Z","updatedAt":"2025-11-24T15:26:21.834Z","rating":0,"reviews":[],"details":{"dimensions":"1900  x 1380  x 2060\n","material":"","care":""},"price":104500,"description":"### Коллекция \"Грация\" — Воплощение Современной Элегантности\n\nПогрузитесь в мир изысканного комфорта и безупречного стиля с коллекцией мебели для спальни \"Грация\" от Aura. Этот спальный гарнитур — ода современной классике, где каждая деталь продумана для создания атмосферы спокойствия, роскоши и гармонии. Он идеально подходит для тех, кто ценит чистоту линий, функциональность и неброскую элегантность, способную преобразить любое пространство в истинный оазис уюта.\n\nЦентральным элементом коллекции выступает кровать с роскошным мягким изголовьем. Выполненное из благородного темно-серого велюра или качественной мебельной ткани, оно украшено выразительным геометрическим орнаментом, выполненным в золотистых тонах, добавляющим дизайну глубины и шика. Этот акцент перекликается с общим настроением коллекции, где плавные линии встречаются с чёткими формами. Гармоничное сочетание антрацитовых тонов с мягкими светлыми оттенками на фасадах остальных элементов создает ощущение воздушности и простора.\n\nПрикроватные тумбы, вместительный комод и функциональный платяной шкаф продолжают общую дизайнерскую концепцию. Их фасады выполнены в светлом, кремовом или молочном цвете с уникальной рельефной, волнообразной текстурой, которая придает мебели особую тактильность и объем. Изящные золотистые ручки и тонкие, слегка скошенные металлические ножки того же оттенка подчеркивают утонченность каждого предмета, добавляя ансамблю легкости и изящества. Центральные двери шкафа и большое зеркало комода, обрамленное текстурными панелями, не только расширяют пространство, но и наполняют комнату светом.\n\nКоллекция \"Грация\" — это не просто мебель, это целостное решение для вашей спальни, где каждый элемент работает на создание единой, гармоничной и по-настоящему стильной обстановки. Она приглашает вас насладиться комфортом, красотой и спокойствием, обеспечивая идеальные условия для отдыха и восстановления.\n\n---\n\n### Техническая информация:\n\n*   **Тип:** Спальный гарнитур\n*   **Комплектация:** Кровать, две прикроватные тумбы, платяной шкаф (4-дверный), комод с зеркалом.\n*   **Материал:**\n    *   Корпус: ЛДСП / МДФ (темно-серый).\n    *   Фасады: МДФ с рельефной текстурой (светлый оттенок), зеркало.\n    *   Обивка кровати: Велюр / Мебельная ткань (темно-серая).\n    *   Декор/Фурнитура: Металл (золотистого оттенка).\n*   **Цвет:** Антрацит (темно-серый), Молочный/Светло-бежевый, Золотистый.\n*   **Особенности:**\n    *   Мягкое изголовье кровати с золотистым геометрическим узором.\n    *   Объемная, волнообразная (рельефная) текстура на светлых фасадах тумб, комода и платяного шкафа.\n    *   Зеркальные вставки на двух центральных дверцах платяного шкафа.\n    *   Изящные металлические ручки и ножки золотистого цвета.\n    *   Слегка скошенные (угловые) ножки.\n    *   Зеркало комода со встроенной вертикальной подсветкой (видимый элемент декора на фото)."},{"id":"Z5a9o89vFeTWp0IaYaY2","name":"Атланта","price":176000,"imageUrls":["https://label-com.ru/images/virtuemart/product/atlanta.png"],"category":"Спальни","originalUrl":"https://label-com.ru/katalog/spalni/atlanta-detail.html","createdAt":"2025-11-24T15:26:21.822Z","updatedAt":"2025-11-24T15:26:21.822Z","rating":0,"reviews":[],"details":{"dimensions":"2658  x 1393  x 2100\n","material":"","care":""},"description":"**Атланта: Изысканность, Облаченная в Комфорт**\n\nПредставляем коллекцию \"Атланта\" – воплощение безмятежной элегантности и современного комфорта, созданную для тех, кто ценит гармонию и изысканность в каждой детали. Этот спальный гарнитур преобразит вашу спальню в оазис спокойствия и стиля, где каждая линия, каждый оттенок дышит уютом и роскошью. Дизайн \"Атланты\" — это идеальный баланс между современным минимализмом и неоклассической утонченностью, создающий атмосферу вечной красоты и функциональной продуманности.\n\nЦентральное место в коллекции занимает роскошная кровать, притягивающая взгляд высоким, мягким изголовьем с элегантными закругленными углами. Обивка нежного светло-бежевого оттенка, напоминающая бархат или велюр, приглашает к расслаблению и покою. Вертикальные золотистые вставки по бокам изголовья добавляют нотку эксклюзивности и подчеркивают благородство линий, создавая ощущение легкого шика. Мягкое основание кровати, выполненное в том же текстиле, гармонично завершает образ, обещая идеальный отдых.\n\nКоллекция \"Атланта\" дополнена продуманной корпусной мебелью, выполненной в единой эстетике. Прикроватные тумбы, вместительный платяной шкаф и изящный комод представлены в светло-серой или жемчужной палитре, гармонично сочетающейся с теплотой кровати. Все элементы корпусной мебели отличаются чистыми, лаконичными фасадами без видимых ручек, что подчеркивает современный характер. Верхние ящики тумб и комода украшены тонкой горизонтальной фрезеровкой, добавляющей текстурную изюминку. Комод стоит на высоких, тонких золотистых ножках, а его фасад дополнен вертикальной золотой полосой, перекликающейся с акцентами изголовья. Зеркало над комодом с уникальным многослойным дизайном рамы завершает композицию, добавляя пространству света и глубины.\n\n\"Атланта\" – это не просто мебель, это целостная концепция для создания вашей идеальной спальни. Сочетание мягких текстур, благородных оттенков и золотистых акцентов придает интерьеру изысканный, но при этом невероятно уютный вид. Этот гарнитур станет идеальным выбором для тех, кто ищет мебель, способную наполнить дом ощущением умиротворения, высокого стиля и неподвластной времени элегантности.\n\n---\n\n**Техническая информация:**\n\n*   **Тип:** Спальный гарнитур (кровать, 2 прикроватные тумбы, платяной шкаф, комод, настенное зеркало).\n*   **Стиль:** Современный, элегантный, неоклассика.\n*   **Материал:**\n    *   Обивка кровати: Мягкая мебельная ткань (предположительно велюр/бархат).\n    *   Корпусная мебель (тумбы, шкаф, комод): ЛДСП / МДФ с матовым покрытием.\n    *   Декоративные элементы: Металл (под золото/латунь).\n    *   Зеркала: Высококачественное зеркальное полотно.\n*   **Цвет:**\n    *   Кровать: Светло-бежевый / Цвет слоновой кости.\n    *   Корпусная мебель: Светло-серый / Жемчужный / Оттенок \"пыльной розы\" (очень светлый).\n    *   Декоративные вставки: Золотой / Латунный.\n*   **Особенности:**\n    *   Высокое мягкое изголовье с закругленными углами и декоративными металлическими вставками.\n    *   Безручечная система открывания ящиков и дверей (интегрированные ручки или механизм push-to-open).\n    *   Декоративная горизонтальная фрезеровка на фасадах верхних ящиков тумб и комода.\n    *   Комод на высоких изящных металлических ножках с золотистым покрытием.\n    *   Платяной шкаф с комбинированными фасадами (глухие секции и зеркальные вставки).\n    *   Настенное зеркало с многослойной рамой оригинального дизайна."},{"id":"ZCAVJExi8jXpaM1elqbr","name":"Милан","price":168300,"imageUrls":["https://label-com.ru/images/virtuemart/product/milan.png"],"category":"Спальни","originalUrl":"https://label-com.ru/katalog/spalni/milan-detail.html","createdAt":"2025-11-24T15:26:21.835Z","updatedAt":"2025-11-24T15:26:21.835Z","rating":0,"reviews":[],"details":{"dimensions":"2080  x 1320  x 2450\n","material":"","care":""},"description":"Добро пожаловать в мир утонченной роскоши с мебельной коллекцией \"Милан\" от Aura. Взгляните на это воплощение элегантности, где каждая деталь призвана создавать атмосферу безмятежного комфорта и изысканного стиля. \"Милан\" — это больше, чем просто мебель; это обещание роскошного отдыха и эстетического наслаждения, вдохновленное вневременной европейской классикой, переосмысленной в современной интерпретации.\n\nСпальный гарнитур \"Милан\" представляет собой идеальное сочетание тактильных текстур и чистых линий. Центром композиции является кровать с высоким, величественным изголовьем, обитым мягкой тканью теплого кремового оттенка. Изысканная вертикальная стежка на изголовье добавляет объема и графичности, приглашая окунуться в мир глубокого сна. Прикроватные тумбы и вместительный шкаф выполнены в единой палитре изысканного светло-бежевого цвета, их гладкие фасады украшены тонкими, вытянутыми металлическими ручками под золото, создающими гармоничный контраст и добавляющими нотку ар-деко.\n\nКорпусная мебель коллекции \"Милан\" демонстрирует безупречное мастерство: от элегантных прикроватных тумб с выдвижными ящиками, установленных на изящных металлических ножках, до грандиозного шкафа. Фасады шкафа чередуют гладкие матовые поверхности с секциями, повторяющими вертикальную рифленую структуру изголовья кровати, а также включают зеркальные вставки, визуально расширяющие пространство. Туалетный столик, продолжающий общую эстетику, сочетает функциональность с воздушной легкостью благодаря тонким золотистым ножкам и дополнен мягким круглым пуфом, обитым в тон кровати.\n\nОбщая атмосфера, создаваемая коллекцией \"Милан\", — это ода спокойствию и уюту. Нейтральная палитра светло-бежевых и кремовых оттенков в сочетании с теплыми золотистыми акцентами создает ощущение воздушности и света. Это спальня, где каждый элемент продуман для вашего комфорта и наслаждения красотой, превращая личное пространство в настоящий домашний оазис роскоши и умиротворения.\n\n---\n\n### Техническая информация:\n\n*   **Тип:** Спальный гарнитур (Кровать, две прикроватные тумбы, платяной шкаф, туалетный столик с зеркалом, пуф).\n*   **Стиль:** Современная классика / Неоклассика с элементами ар-деко.\n*   **Материал:**\n    *   **Корпус мебели (тумбы, шкаф, туалетный столик):** Предположительно МДФ/ЛДСП с гладким матовым или полуглянцевым покрытием.\n    *   **Обивка (изголовье кровати, пуф):** Мягкая мебельная ткань (возможно, велюр) светло-бежевого/кремового оттенка.\n    *   **Акценты:** Металл с покрытием под золото/латунь (ручки, ножки прикроватных тумб, туалетного столика).\n    *   **Зеркало:** Стеклянное, в тонкой металлической раме.\n*   **Цвет:** Светло-бежевый/кремовый, золотистый (акценты).\n*   **Особенности:**\n    *   Высокое мягкое изголовье кровати с вертикальной рельефной стежкой.\n    *   Вертикальное рифление на некоторых фасадах шкафа.\n    *   Гладкие фасады с минималистичными металлическими ручками.\n    *   Зеркальные вставки на фасадах платяного шкафа.\n    *   Изящные, тонкие металлические ножки на прикроватных тумбах и туалетном столике.\n    *   Мягкий круглый пуф в комплекте с туалетным столиком."},{"id":"ZHHeT39Nu0ESIFGyjyrg","name":"Банкетка Латифа","price":70000,"imageUrls":["https://label-com.ru/images/virtuemart/product/latifa5.jpeg"],"category":"Мягкая мебель","originalUrl":"https://label-com.ru/katalog/myagkaya-mebel/banketka-latifa-detail.html","rating":0,"reviews":[],"createdAt":{"_seconds":1764053110,"_nanoseconds":694000000},"description":"Добро пожаловать в мир утонченности и роскоши с банкеткой \"Латифа\" от Aura!\n\nПредставляем вашему вниманию Банкетку \"Латифа\" – подлинное воплощение дворцовой роскоши и утонченной элегантности, призванное стать центральным акцентом в любом интерьере. С первого взгляда она очаровывает своей грациозностью и величием, перенося в атмосферу классических европейских салонов. Это не просто предмет мебели, а произведение искусства, созданное для тех, кто ценит красоту и изысканность в каждой детали, стремясь придать своему дому неповторимый шарм и благородство.\n\nИзящный каркас банкетки выполнен в насыщенном золотом цвете, украшенном богатой, витиеватой резьбой и объемными декоративными элементами. Пышные завитки, растительные мотивы и искусные орнаменты создают ощущение благородной старины и безупречного вкуса, отсылая к стилям барокко и рококо. Обивка гармонично сочетает в себе два вида текстиля: мягкий, приятный на ощупь велюр светлого, кремового или серо-бежевого оттенка обволачивает подлокотники и внешние части спинки, а сиденье и центральная часть спинки украшены роскошной тканью с дамасским или флоральным узором в бежево-золотистых тонах, добавляя нотку королевского шика.\n\nЗавершают образ декоративные подушки: одна круглая, с элегантной утяжкой и складками, и два валика с изящными кистями-подвесками, выполненные в тон основной однотонной обивке. Эти детали не только повышают комфорт, но и подчеркивают уникальный характер \"Латифы\", делая ее неотразимой в прихожей, гостиной, спальне или будуаре. Банкетка \"Латифа\" наполнит ваше пространство светом и изысканностью, создавая атмосферу уюта и благородства, и несомненно будет притягивать восхищенные взгляды, становясь ярким акцентом в любом интерьере.\n\n### Техническая информация:\n\n*   **Тип:** Банкетка / Диванчик\n*   **Стиль:** Классический, с элементами барокко\n*   **Материал каркаса:** Дерево (предположительно), Декоративное покрытие \"Золото\"\n*   **Материал обивки:** Велюр (однотонный), Жаккардовая ткань с узором\n*   **Цвет каркаса:** Золотой\n*   **Цвет обивки:** Светло-бежевый, Кремовый, Золотистый (узор)\n*   **Особенности:** Резной каркас с орнаментом, фигурные ножки (кабриоль), высокая фигурная спинка, подлокотники с завитками, декоративные подушки (круглая с утяжкой, валики с кистями), комбинированная обивка из двух типов ткани."},{"id":"anhQx4gr6FiniDVug61o","name":"Стул Милана","price":6500,"imageUrls":["https://label-com.ru/images/virtuemart/product/stol_milana5.jpg"],"category":"Гостиная","originalUrl":"https://label-com.ru/katalog/gostinaya/stul-milana-detail.html","createdAt":"2025-11-24T15:26:21.850Z","updatedAt":"2025-11-24T15:26:21.850Z","rating":0,"reviews":[],"details":{"dimensions":"","material":"","care":""},"description":"Добро пожаловать в мир утонченности и изысканности, где каждая деталь имеет значение. Представляем вашему вниманию \"Стул Милана\" от мебельного салона Aura – истинное воплощение вневременной классики и современного комфорта, который мы видим на изображении. Этот стул не просто предмет мебели, а центральный элемент, способный преобразить любое пространство, наполнив его атмосферой благородства и роскоши. Его дизайн вдохновлен эстетикой неоклассицизма, с характерными плавными линиями и сдержанной, но выразительной отделкой.\n\nИзучая изображение, мы видим безупречное сочетание материалов и оттенков. Каркас стула выполнен в нежном светло-кремовом или цвете слоновой кости, покрытом высококачественной эмалью, что придает ему легкий глянцевый блеск и ощущение безукоризненной чистоты. Особое внимание привлекает обивка: мягкий, приятный на ощупь велюр глубокого пыльно-голубого оттенка, который дарит ощущение уюта и благородства. Этот цвет создает завораживающий контраст с светлым каркасом и эффектно играет на свету, подчеркивая мягкость и глубину фактуры.\n\nКаждый элемент стула \"Милана\" пронизан вниманием к деталям. Изогнутая овальная спинка и комфортное сиденье обтянуты тем самым роскошным велюром, обеспечивая исключительный комфорт. Каркас стула украшен деликатной золотистой отделкой – тонким кантом, который проходит по периметру сиденья и спинки, а также изящными акцентами на ножках. Сами ножки имеют элегантные вертикальные фрезеровки (каннелюры), добавляющие изысканности и легкости всей конструкции. Эти детали подчеркивают высокий статус и мастерство исполнения, делая \"Стул Милана\" идеальным дополнением к обеденной группе, представленной на фото, или самостоятельным акцентом в интерьере.\n\n\"Стул Милана\" – это не просто место для сидения, это инвестиция в красоту и комфорт вашего дома. Он способен создать вокруг себя атмосферу торжественности и уюта, идеальную для семейных обедов, званых ужинов или моментов уединенного отдыха. Сочетание элегантности форм, благородных материалов и тонких декоративных элементов делает его истинным произведением мебельного искусства, которое будет радовать глаз и дарить комфорт на протяжении многих лет.\n\n### Техническая информация:\n\n*   **Тип:** Обеденный стул\n*   **Стиль:** Неоклассика, классический, элегантный\n*   **Материал каркаса:** Предположительно массив дерева, покрытый эмалью/краской\n*   **Материал обивки:** Велюр / Бархат\n*   **Цвет каркаса:** Светло-кремовый / Слоновая кость\n*   **Цвет обивки:** Пыльно-голубой / Серо-голубой\n*   **Декоративные элементы:** Золотистая отделка (кант, акценты на ножках), резные / фрезерованные ножки (каннелюры)\n*   **Особенности:** Мягкая спинка и сиденье, округлая форма спинки, устойчивые ножки."},{"id":"bIM8kvQml9T8untzUTlS","name":"Мягкая мебель «РАЙХАНА»","price":155500,"imageUrls":["https://label-com.ru/images/virtuemart/product/raihan6.jpeg"],"category":"Мягкая мебель","originalUrl":"https://label-com.ru/katalog/myagkaya-mebel/myagkaya-mebel-rajkhana-detail.html","rating":0,"reviews":[],"createdAt":{"_seconds":1764053448,"_nanoseconds":46000000},"description":"Представляем вашему вниманию мягкую мебель «РАЙХАНА» от \"Aura\" – воплощение элегантности, комфорта и безупречного стиля. Этот изысканный гарнитур, состоящий из просторного трехместного дивана и двух уютных кресел, создан для того, чтобы стать сердцем вашего дома, наполняя его атмосферой спокойствия и утонченности. Его дизайн идеально вписывается в концепцию современного стиля с элементами классики, где каждая линия и изгиб говорят о внимании к деталям и стремлении к гармонии.\n\nЦентральным акцентом «РАЙХАНА» является его благородная цветовая палитра. Обивка выполнена в глубоком, приглушенном оттенке шалфейно-оливкового цвета, который дарит ощущение свежести и близости к природе, привнося в интерьер умиротворение и особую индивидуальность. Этот изысканный тон прекрасно гармонирует с теплыми, медовыми акцентами натурального дерева. Деревянные элементы изящно обрамляют подлокотники, создавая тактильно приятные и визуально выразительные детали, а также формируют изящные, слегка изогнутые ножки, которые придают всему гарнитуру легкость и завершенный вид.\n\nМатериал обивки, судя по изображению, представляет собой высококачественный текстиль с матовой, слегка текстурированной поверхностью, напоминающей бархатистый велюр или мягкий шенилл. Эта ткань не только выглядит роскошно, но и обещает невероятную мягкость при прикосновении, приглашая к полному расслаблению. Объемные, пышные подушки сидений и спинок, дополненные аккуратной горизонтальной прострочкой на спинке, обеспечивают максимальный комфорт и эргономичную поддержку, позволяя забыть о повседневных заботах. внимание к каждой детали. \"Анжелика\" не просто мебель, это художественное произведение, способное преобразить пространство, наполнив его атмосферой изысканного шарма и респектабельности.\n\nДизайн \"Анжелика\" черпает вдохновение в роскошной неоклассике, гармонично сочетая пышность барокко с элегантной строгостью современности. Доминирующий цвет слоновой кости и кремовых оттенков придает гарнитуру воздушность и свет, расширяя пространство и наполняя его теплотой. Золотистые акценты в виде изящных резных элементов, патины и витиеватых орнаментов на фасадах создают ощущение королевской роскоши, добавляя блеска и глубины. Глянцевое покрытие поверхностей мягко отражает свет, подчеркивая совершенство линий и форм.\n\nГарнитур включает в себя две величественные витрины и центральную консоль, образуя единую, гармоничную композицию. Витрины с прозрачными стеклянными дверцами и полками — идеальное место для демонстрации вашей коллекции посуды, сувениров или изысканных предметов декора, превращая их в часть интерьера. Каждая дверца украшена тонкими резными рамками, а верхняя часть витрин увенчана объемными флористическими элементами, выполненными с исключительной детализацией. Центральная консоль с выдвижными ящиками и открытой нишей предлагает функциональное решение для хранения, при этом сохраняя общую стилистику благодаря элегантным формам и золотистым узорам.\n\n\"Анжелика\" — это выбор тех, кто стремится окружить себя красотой и комфортом, создавая интерьер, который будет радовать глаз и дарить эстетическое наслаждение долгие годы. От фигурных ножек до изящных металлических ручек, каждый элемент этого гарнитура говорит о высоком вкусе и стремлении к совершенству. Позвольте \"Анжелике\" стать центром притяжения в вашем доме, создавая атмосферу, достойную самых торжественных приемов и уютных семейных вечеров.\n\n---\n\n**Техническая информация:**\n\n*   **Тип:** Гостиная стенка / Витринный гарнитур\n*   **Состав:** Две витрины со стеклянными дверцами и центральная консоль с ящиками и открытой нишей.\n*   **Материал:** Высококачественный МДФ с глянцевым лакированным покрытием, декоративные резные элементы (предположительно, полимерные или из массива), стекло, металлическая фурнитура.\n*   **Цвет:** Оттенки слоновой кости / кремовый, золотистые декоративные элементы, бежево-мраморный рисунок на некоторых фасадах.\n*   **Особенности:** Глянцевая поверхность, объемные резные флористические украшения, фигурные ножки, изящные металлические ручки, декоративные орнаменты на фасадах, стеклянные полки внутри витрин."},{"id":"cNR6Xz49d3U0pmnDhMcG","name":"Rolex","price":142000,"imageUrls":["https://label-com.ru/images/virtuemart/product/rolex1.jpeg"],"category":"Мягкая мебель","originalUrl":"https://label-com.ru/katalog/myagkaya-mebel/rolex-detail.html","createdAt":"2025-11-24T15:26:21.844Z","updatedAt":"2025-11-24T15:26:21.844Z","rating":0,"reviews":[],"details":{"dimensions":"","material":"","care":""},"description":"Добро пожаловать в мир безупречного стиля и исключительного комфорта от мебельного магазина \"Aura\". Представляем вашему вниманию комплект мягкой мебели \"Rolex\" — название, которое само по себе говорит о статусе и времени, проведенном с наслаждением. Этот ансамбль, состоящий из роскошного дивана и двух уютных кресел, является воплощением современного дизайна, где каждая деталь продумана для создания атмосферы утонченной роскоши и домашнего тепла. \"Rolex\" призван стать центральным элементом вашей гостиной, приглашая к расслаблению и наслаждению каждым моментом.\n\nВзгляд притягивает благородная обивка в нежном, светлом оттенке — это может быть кремовый, слоновая кость или очень светлый беж. На изображении ткань выглядит как высококачественное букле или изысканный шенилл, обещая невероятную мягкость и приятные тактильные ощущения. Этот светлый тон наполняет пространство воздухом и светом, создавая ощущение простора и элегантности. Контрастные акценты на подлокотниках дивана, выполненные в глубоком темном цвете — будь то мато ет общий декор, предлагая визуальное наслаждение. Пышные спинки стульев, с их плавными линиями и объемными резными элементами, обещают королевский комфорт даже во время самых продолжительных застолий.\n\nКомплект \"СТОЛ и СТУЛЬЯ\" от \"Aura\" — это не просто мебель, это приглашение в мир, где каждая деталь дышит историей и роскошью. Он идеально подходит для создания величественной столовой или просторной гостиной, где проводятся торжественные ужины и собираются самые дорогие гости. Этот ансамбль обещает стать жемчужиной вашего дома, местом, где рождаются незабываемые моменты и царит атмосфера истинного великолепия и гостеприимства.\n\n---\n\n### Техническая информация:\n\n*   **Тип:** Обеденная группа\n*   **Стиль:** Неоклассика / Барокко / Дворцовый\n*   **Материал каркаса (стол и стулья):** Резное дерево (предположительно массив или высококачественный МДФ), покрытие \"под золото\" с эффектом патины, кремовая эмаль/лак.\n*   **Материал столешницы:** Глянцевое покрытие (возможно, полимерная смола или лак на основе МДФ) с интегрированным декоративным узором.\n*   **Материал обивки:** Текстиль (предположительно жаккард или дамаск).\n*   **Цвет:** Золотой, кремовый, бежевый, слоновая кость.\n*   **Особенности:**\n    *   Вычурная, детализированная резьба по всему периметру стола и на каркасах стульев.\n    *   Глянцевая столешница с центральным декоративным узором.\n    *   Прямоугольная столешница со скошенными углами.\n    *   Высокие, фигурные спинки стульев с резными элементами.\n    *   Узорчатая тканевая обивка сидений и спинок.\n    *   Изящные, фигурные ножки у стола и стульев.\n    *   Количество посадочных мест: 10."},{"id":"csXOy7GEUfirA5teAI8e","name":"Мария угловая","price":126500,"imageUrls":["https://label-com.ru/images/virtuemart/product/marija_ugol.jpg"],"category":"Кухни","originalUrl":"https://label-com.ru/katalog/kukhni-1/mariya-uglovaya-detail.html","createdAt":"2025-11-24T15:26:21.839Z","updatedAt":"2025-11-24T15:26:21.839Z","rating":0,"reviews":[],"details":{"dimensions":"","material":"","care":""},"description":"Представляем вашему вниманию кухонный гарнитур \"Мария угловая\" от Aura — воплощение утонченной элегантности и безупречной функциональности. Этот гарнитур, выполненный в стиле современной классики с легкими неоклассическими мотивами, создает атмосферу спокойствия и благородства. Его изысканный дизайн, вдохновленный традициями, но адаптированный к современным реалиям, превратит вашу кухню в сердце дома, где каждый момент будет наполнен комфортом и гармонией.\n\nЦветовая палитра \"Марии угловой\" пленяет своей нежностью и универсальностью. Фасады глубокого, но при этом светлого серо-бежевого оттенка (грейж) с матовой текстурой излучают тепло и гостеприимство. Они идеально гармонируют со светлой столешницей, имитирующей благородный камень с едва заметными прожилками, и элегантными тонкими ручками, выполненными в цвете состаренного золота или латуни. Этот тщательно подобранный ансамбль создает ощущение простора и света, визуально расширяя пространство и наполняя его воздухом.\n\nКаждая деталь гарнитура \"Мария угловая\" продумана до мелочей. Фрезерованные фасады с аккуратными филенками подчеркивают классический стиль, а выразительные декоративные карнизы по верхнему краю добавляют завершенности и роскоши. Особое внимание привлекают стеклянные витрины с изящным геометрическим переплетом, сквозь тонированное стекло которых можно демонстрировать любимую посуду, добавляя интерьеру легкости и шарма. Угловое расположение максимально эффективно использует пространство, а высокий пенал обеспечивает вместительное хранение, делая эту кухню не только красивой, но и невероятно практичной.\n\n\"Мария угловая\" — это идеальный выбор для тех, кто ценит классическую эстетику, не жертвуя при этом современным удобством. Она идеально впишется как в просторные, так и в более компактные помещения, привнося в каждый дом ощущение порядка, гармонии и изысканного стиля. С этим гарнитуром ваша кухня станет поистине вдохновляющим пространством для кулинарных шедевров и теплых семейных встреч.\n\n---\n\n**Техническая информация:**\n*   **Тип:** Угловая кухонная гарнитура.\n*   **Стиль:** Современная классика / Неоклассика.\n*   **Материал:**\n    *   Фасады: Крашеный МДФ или массив дерева с филенчатой фрезеровкой.\n    *   Столешница: Искусственный камень или высококачественный влагостойкий ЛДСП.\n    *   Ручки: Металл с покрытием под латунь/золото.\n    *   Витрины: Тонированное стекло с декоративным переплетом.\n*   **Цвет:**\n    *   Фасады: Светло-серый / Серо-бежевый (грейж).\n    *   Столешница: Белый / Светло-серый с прожилками.\n    *   Фурнитура: Золотистый / Латунь.\n    *   Стекло витрин: Дымчатое / Бронзовое.\n*   **Особенности:**\n    *   Угловая конфигурация, обеспечивающая максимальную эргономику.\n    *   Филенчатые (фрезерованные) фасады.\n    *   Декоративные верхние карнизы.\n    *   Интегрированная вытяжка.\n    *   Высокий шкаф-пенал для встраиваемой техники или хранения.\n    *   Стеклянные витрины с изящным геометричным переплетом.\n    *   Наличие выдвижных ящиков и шкафов различных размеров.\n    *   Место под угловую мойку и варочную панель."},{"id":"e2se69JxkbKAyLM3YYZR","name":"Стол Голд","price":45000,"imageUrls":["https://label-com.ru/images/virtuemart/product/stol_gold1.jpg"],"category":"Гостиная","originalUrl":"https://label-com.ru/katalog/gostinaya/stol-gold-3-detail.html","createdAt":"2025-11-24T15:26:21.847Z","updatedAt":"2025-11-24T15:26:21.847Z","rating":0,"reviews":[],"details":{"dimensions":"","material":"","care":""},"description":"Добро пожаловать в мир безупречного стиля и королевского комфорта от мебельного салона Aura. Представляем вашему вниманию обеденный гарнитур \"Стол Голд\" – воплощение несравненной роскоши и аристократического шика, созданное для тех, кто ценит великолепие в каждой детали. Этот величественный ансамбль, выполненный в стиле изысканной неоклассики с элементами барокко, мгновенно преображает любое пространство, наполняя его атмосферой торжественности и утонченности. Гармоничное сочетание благородных оттенков жемчужно-белого и глубокого серого создает поистине королевское убранство для вашей столовой.\n\nВ центре композиции – грандиозный стол, чья монументальность идеально сочетается с воздушной элегантностью. Его прямоугольная столешница, с деликатно скругленными углами, выполнена из высококачественного материала с завораживающим мраморным рисунком в серо-белых тонах. Глянцевое покрытие поверхности отражает свет, добавляя пространству воздушности и благородного блеска. Периметр столешницы украшает сложный резной орнамент, а центральное основание представляет собой мощную, фигуристую колонну, богато декорированную витиеватыми узорами, что придает столу уникальность и величие.\n\nШесть изящных стульев, идеально гармонирующих со столом, приглашают присесть и насладиться непревзойденным комфортом. Их высокие, изогнутые спинки, обрамленные витиеватыми резными элементами в жемчужно-белом оттенке, увенчаны роскошным коронообразным декором. Мягкая обивка спинок выполнена из благородного велюра глубокого серого цвета и украшена классической каретной стяжкой с инкрустацией сияющих кристаллов, что придает каждому стулу индивидуальность и блистательный акцент. Сиденья, также обтянутые мягким велюром, обеспечивают исключительный комфорт, а изящные фигурные ножки-кабриоль завершают образ неподвластной времени элегантности.\n\nОбеденная группа \"Стол Голд\" – это не просто мебель, это центральный элемент, вокруг которого будут собираться самые близкие люди, чтобы разделить важные моменты и создать незабываемые воспоминания. Выбирая этот гарнитур, вы выбираете нечто большее, чем просто стол и стулья – вы выбираете атмосферу великолепия, гостеприимства и изысканного вкуса, которая будет радовать вас и ваших гостей долгие годы, подтверждая ваш статус и безупречный стиль.\n\n---\n\n**Техническая информация:**\n\n*   **Тип:** Обеденная группа (Стол и 6 стульев)\n*   **Стиль:** Неоклассика с элементами барокко\n*   **Материал:**\n    *   Столешница: Искусственный камень с эффектом мрамора.\n    *   Каркас стола и стульев: Массив дерева / МДФ с глянцевым лаковым покрытием.\n    *   Обивка стульев: Велюр.\n*   **Цвет:**\n    *   Каркас/основание: Жемчужно-белый / Светло-серый (с перламутровым отливом).\n    *   Обивка стульев: Темно-серый / Графитовый.\n    *   Столешница: Серо-белый мраморный узор.\n*   **Особенности:**\n    *   Массивное основание стола с резными элементами.\n    *   Резные декоративные элементы на каркасах стола и стульев.\n    *   Глянцевое лаковое покрытие.\n    *   Каретная стяжка (капитоне) на спинках стульев.\n    *   Декоративные пуговицы-стразы на спинках стульев.\n    *   Фигурные ножки \"кабриоль\" у стульев."},{"id":"en4sh3XcweUnmjwnF7zH","name":"тв тумба Элен","price":31000,"imageUrls":["https://label-com.ru/images/virtuemart/product/tv-tumba-elen.png"],"category":"Гостиная","originalUrl":"https://label-com.ru/katalog/gostinaya/tv-tumba-elen-detail.html","createdAt":"2025-11-24T15:26:21.850Z","updatedAt":"2025-11-24T15:26:21.850Z","rating":0,"reviews":[],"details":{"dimensions":"180  x 51  x 47","material":"","care":""},"description":"Представляем вашему вниманию ТВ тумбу «Элен» от \"Aura\" — воплощение утонченности и современного шика, созданное для тех, кто ценит безупречный стиль и функциональность в интерьере. Эта тумба – истинное произведение мебельного искусства, легко интегрирующееся в интерьеры в стиле неоклассики, современного гламура или ар-деко, привнося в пространство ощущение легкости и благородства. Ее гармоничные линии и продуманные детали мгновенно преображают гостиную, делая ее центральным акцентом.\n\nКорпус тумбы выполнен в нежном кремовом или светло-бежевом оттенке, что придает ей особую изысканность. Поверхность имеет благородный глянцевый блеск, отражающий свет и визуально расширяющий пространство. Фасады тумбы украшены изящным вертикальным рифлением, которое добавляет текстуру и глубину, создавая игру света и тени. Этот элемент декора не только подчеркивает высокое качество исполнения, но и придает изделию динамичность, не нарушая при этом его классической элегантности.\n\nОсобое внимание привлекают роскошные золотые акценты, которые элегантно подчеркивают каждую деталь. Тонкий металлический кант золотистого цвета обрамляет столешницу и нижний периметр корпуса, придавая тумбе завершенный и дорогой вид. Изящные вертикальные ручки, также выполненные в цвете золота, идеально сочетаются с общим дизайном. Завершают образ фигурные резные ножки с шарообразными элементами, которые не только обеспечивают устойчивость, но и добавляют предмету мебели царственный шарм, словно приподнимая его над полом и придавая легкость всему облику.\n\nТВ тумба «Элен» — это не просто место для вашего телевизора, это символ хорошего вкуса и стремления к совершенству. Она создает атмосферу уюта, роскоши и гармонии, приглашая насладиться каждым моментом, проведенным в вашей гостиной. Благодаря своей функциональной длине и вместительности, она идеально подходит для хранения медиатехники и аксессуаров, при этом сохраняя безупречный порядок и эстетику.\n\n---\n\n### Техническая информация:\n\n*   **Тип:** ТВ тумба / Тумба под телевизор\n*   **Материал:**\n    *   Корпус и фасады: Предположительно МДФ с глянцевым (эмалевым) покрытием.\n    *   Декоративные элементы (кант, ручки, ножки): Металл с покрытием \"под золото\".\n*   **Цвет:** Кремовый / Слоновая кость / Светло-бежевый (основной), Золотой (акценты).\n*   **Особенности:**\n    *   Глянцевое покрытие корпуса и фасадов.\n    *   Фасады с вертикальным рифлением (каннелюры/флейтинг).\n    *   Декоративный металлический кант золотистого цвета по верхнему и нижнему периметру.\n    *   Вертикальные ручки-планки золотистого цвета.\n    *   Фигурные (резные/точеные) металлические ножки золотистого цвета.\n    *   Четыре секции для хранения (предположительно дверцы).\n    *   Длинная, вытянутая горизонтальная форма."},{"id":"f3Lm9LRFckHBOT8rlJA6","name":"BUGATTI","price":143000,"imageUrls":["https://label-com.ru/images/virtuemart/product/327.jpg"],"category":"Мягкая мебель","originalUrl":"https://label-com.ru/katalog/myagkaya-mebel/bugatti-detail.html","createdAt":"2025-11-24T15:26:21.840Z","updatedAt":"2025-11-24T15:26:21.840Z","rating":0,"reviews":[],"details":{"dimensions":"","material":"","care":""},"description":"Добро пожаловать в мир роскоши и безупречного стиля с мебелью от \"Aura\".\n\nПредставляем Вашему вниманию \"BUGATTI\" – имя, которое говорит само за себя, воплощая в себе мощь, элегантность и безупречный вкус. Этот угловой диван – не просто предмет мебели, а центральный элемент интерьера, способный мгновенно преобразить любое пространство, наполнив его атмосферой утонченной роскоши. Его дизайн искусно балансирует на грани современной эстетики и классической респектабельности, приглашая к полному погружению в мир комфорта.\n\nОбивка дивана выполнена в благородном, теплом оттенке светло-бежевого, который можно описать как изысканный \"грейдж\", обладающий легкой текстурой, напоминающей дорогостоящую кожу. Этот материал не только приятен на ощупь, но и отличается превосходной износостойкостью. Плавные, округлые линии подлокотников и спинки, подчеркнутые аккуратной горизонтальной отстрочкой, придают модели объем и мягкость, создавая ощущение обволакивающего уюта.\n\nОсобое внимание привлекают детали: на боковинах широких подлокотников размещены изящные декоративные вставки из темного, полированного дерева с изогнутыми линиями, напоминающими произведения искусства. Эти элементы добавляют дивану уникальный характер и тонкую роскошь, свидетельствуя о ручной работе и внимании к каждой детали. Основание дивана, также выполненное из темного дерева, обеспечивает устойчивость и завершает целостный образ, придавая \"BUGATTI\" основательность и солидность, достойную Вашего дома.\n\n\"BUGATTI\" от \"Aura\" – это не просто мебель, это инвестиция в Ваш комфорт и стиль.\n\n---\n\n**Техническая информация:**\n*   **Тип:** Угловой диван\n*   **Материал:** Высококачественная мебельная ткань (или экокожа) с имитацией текстуры кожи, массив дерева (или шпон) для декоративных элементов и основания, наполнитель (мягкий пенополиуретан).\n*   **Цвет:** Светло-бежевый/Грейдж (обивка), темно-коричневый (декоративные деревянные вставки и основание).\n*   **Особенности:** Угловая конфигурация, широкие и округлые подлокотники, декоративные изогнутые деревянные вставки на боковинах подлокотников, горизонтальная декоративная отстрочка на спинке и сиденьях, мягкие подушки для спины, низкое деревянное основание."},{"id":"fWsar1DBBk81YKCXvgNC","name":"Ницца 2м мокко","price":46500,"imageUrls":["https://label-com.ru/images/virtuemart/product/niza.png"],"category":"Гостиная","originalUrl":"https://label-com.ru/katalog/gostinaya/nitstsa-2m-mokko-detail.html","createdAt":"2025-11-24T15:26:21.846Z","updatedAt":"2025-11-24T15:26:21.846Z","rating":0,"reviews":[],"details":{"dimensions":"570  x 1110  x 870\n","material":"","care":""},"description":"Добро пожаловать в мир утонченной элегантности с обеденной группой \"Ницца 2м мокко\" от Aura. Этот комплект мебели – воплощение современного шика и вневременной роскоши, созданный для тех, кто ценит безупречный вкус и комфорт. С первого взгляда он очаровывает своей гармонией форм, текстур и оттенков, превращая обыденное пространство в истинный оазис стиля. Изысканный дизайн, вдохновленный эстетикой современной классики с элементами арт-деко, придает интерьеру особую атмосферу благородства и изысканности.\n\nЦентральное место в этой композиции занимает обеденный стол с овальной столешницей из полированного камня светлого, почти кремового оттенка. Его массивное, но в то же время изящное основание украшено эффектными вертикальными флутованными панелями цвета \"мокко\", которые добавляют фактурности и глубины. Нижняя часть основания стола акцентирована блестящим золотым металлическим кантом, подчеркивающим его безупречные линии. В ансамбле со столом выступают стулья, обитые роскошным велюром нежного оттенка \"мокко\". Их минималистичный силуэт с высокой спинкой и мягким сиденьем поддерживается изящными, изогнутыми ножками из полированного золотого металла, создающими ощущение легкости и воздушности.\n\nЗавершает образ роскошный буфет-комод, повторяющий стилистику стола. Его фасады также декорированы рифлеными панелями цвета \"мокко\", а боковые и нижние части обрамлены сверкающими золотыми металлическими элементами, которые придают ему дополнительный лоск. Идеальным дополнением к буфету служит овальное настенное зеркало с двойной рамой, выполненной в сочетании светлых и золотых тонов, отражающее свет и визуально расширяющее пространство. Все элементы \"Ницца 2м мокко\" продуманы до мелочей, создавая целостный и завершенный интерьер, который станет настоящим произведением искусства в вашей столовой или гостиной.\n\nТехническая информация:\n\n*   **Тип:** Обеденная группа / Мебельный комплект для гостиной.\n*   **Материал:**\n    *   Столешница стола и верхняя поверхность буфета: Искусственный камень (возможно, имитация мрамора).\n    *   Основание стола и корпус буфета: МДФ с рифленой (флутованной) отделкой.\n    *   Обивка стульев: Велюр / Бархат.\n    *   Каркас стульев и декоративные элементы: Полированный металл (золотистого/латунного оттенка).\n*   **Цвет:** Мокко (бежево-серый/тауп), кремовый (столешницы), золотой (металлические акценты).\n*   **Особенности:**\n    *   Элегантные рифленые (флутованные) фасады и основания.\n    *   Роскошные золотые металлические акценты на всех элементах.\n    *   Овальная столешница обеденного стола.\n    *   Изогнутые металлические ножки стульев.\n    *   Длинный буфет-комод с центральными золотыми вставками.\n    *   Овальное настенное зеркало с декоративной двойной рамой."},{"id":"g3udRBrUMCO9aWIxRoTk","name":"Latina","price":154600,"imageUrls":["https://label-com.ru/images/virtuemart/product/12.jpg"],"category":"Мягкая мебель","originalUrl":"https://label-com.ru/katalog/myagkaya-mebel/latina-detail.html","createdAt":"2025-11-24T15:26:21.843Z","updatedAt":"2025-11-24T15:26:21.843Z","rating":0,"reviews":[],"details":{"dimensions":"","material":"","care":""},"description":"Добро пожаловать в мир безупречного стиля и исключительного комфорта от Aura! Представляем вашему вниманию мягкую мебель \"Latina\" — воплощение изысканности, где каждая деталь призвана создать атмосферу тепла и уюта в вашем доме.\n\nКоллекция \"Latina\" — это ода современной классике, умело сочетающей в себе элегантность традиционных форм и функциональность актуального дизайна. Нежные, обволакивающие линии подлокотников дивана и кресла плавно переходят в мягкие подушки сидений, приглашая к глубокому расслаблению. Общая атмосфера, которую создает этот гарнитур, наполнена спокойствием и респектабельностью, делая его идеальным выбором для гостиной, где ценят комфорт и красоту в равной степени.\n\nВ основе \"Latina\" лежит высококачественная текстильная обивка в благородном светло-бежевом или кремовом оттенке. Этот нейтральный, но глубокий цвет придает мебели универсальность, позволяя ей гармонично вписаться в любой интерьер, от скандинавского минимализма до ар-деко. Особое очарование коллекции придает каретная стяжка (капитоне) на верхних частях спинок дивана и кресла, выполненная с использованием декоративных пуговиц, которая добавляет объема и изысканной текстуры, подчеркивая мастерство исполнения.\n\nЭлегантности комплекту добавляет продуманный выбор материалов для каркаса и ножек. Видимые элементы выполнены из темного дерева с отчетливой текстурой, что придает мебели основательность и благородство. Изогнутые, слегка зауженные к низу деревянные ножки не только обеспечивают надежную поддержку, но и служат утонченным декоративным акцентом. Фронтальные ножки дивана украшены серебристыми металлическими наконечниками, добавляющими современный штрих и легкий блеск, завершая образ идеального предмета интерьера, созданного для комфортной и стильной жизни.\n\n### Техническая информация:\n*   **Тип:** Мягкая мебель (трехместный диван и кресло) / Гостиный гарнитур\n*   **Материал:** Высококачественная текстильная обивка (предположительно, микровелюр или плотная мебельная ткань), массив дерева (каркас, ножки), металл (декоративные элементы ножек).\n*   **Цвет:** Светло-бежевый / Кремовый (обивка), Темно-коричневый (деревянные элементы), Серебристый (металлические наконечники).\n*   **Особенности:** Каретная стяжка (капитоне) на спинках дивана и кресла, декоративные пуговицы по нижнему краю дивана, изогнутые деревянные ножки, округлые подлокотники, металлические наконечники на передних ножках дивана."},{"id":"hJZwVKHZsQxiPyfMY0c1","name":"Стол Роза","price":27000,"imageUrls":["https://label-com.ru/images/virtuemart/product/stol_Roza5.jpg"],"category":"Гостиная","originalUrl":"https://label-com.ru/katalog/gostinaya/stol-roza-2-detail.html","rating":0,"reviews":[],"createdAt":{"_seconds":1764053745,"_nanoseconds":580000000},"description":"Добро пожаловать в мир утонченной роскоши с обеденной группой \"Стол Роза\" от Aura. Этот комплект не просто мебель, это манифест классической элегантности, призванный стать жемчужиной вашей столовой или гостиной. С первого взгляда он пленяет своим величественным обликом, где каждая деталь гармонично вписывается в общую картину благородства и изысканности. Идеальный выбор для тех, кто ценит традиции, но при этом стремится окружить себя атмосферой непревзойденного комфорта и стиля.\n\n\"Стол Роза\" воплощает в себе дух неоклассического стиля, сочетая строгость форм с обилием изящных декоративных элементов. Столешница, выполненная в ослепительно белом глянцевом покрытии, завораживает своим блеском, отражая свет и визуально расширяя пространство. Ее фигурный край, украшенный тонким светлым орнаментом, придает ей завершенность и утонченность. Опорой для этой великолепной поверхности служат массивные, искусно резные ножки, чьи витиеватые узоры и изгибы напоминают произведения искусства, подчеркивая монументальность и неповторимый ха
