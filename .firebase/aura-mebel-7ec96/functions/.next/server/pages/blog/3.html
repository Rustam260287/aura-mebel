 скандинавского минимализма и mid-century modern, создавая при этом атмосферу спокойствия и благополучия. SALVA — это не просто мебель, это приглашение к отдыху, к размеренной жизни в окружении красоты и функциональности.\n\nДизайн коллекции SALVA очаровывает своей плавной эстетикой и мягкими линиями. Обивка выполнена из высококачественной, приятной на ощупь фактурной ткани дымчато-серого оттенка, который придает пространству легкость и универсальность, позволяя ему гармонировать с различными цветовыми палитрами интерьера. Теплые, натуральные древесные акценты — изящные конические ножки и оригинальные накладки на подлокотниках дивана — создают выразительный контраст, добавляя облику мебели теплоты и природной элегантности.\n\nПродуманная эргономика дивана и кресел обещает исключительный комфорт. Глубокие сиденья, объемные подушки и поддерживающие спинки, особенно выделяющиеся у кресел благодаря горизонтальной прострочке, приглашают расслабиться после долгого дня. Каждый элемент SALVA разработан с учетом создания идеального пространства для чтения, беседы или простого наслаждения тишиной. Декоративные подушки, идущие в комплекте, с тонкими акцентными линиями, завершают образ, добавляя финальный штрих к этой безупречной композиции. SALVA – это ваш личный оазис стиля и комфорта.\n\n---\n\n### Техническая информация:\n\n*   **Тип:** Комплект мягкой мебели для гостиной (диван и кресла)\n*   **Материал:** Текстильная обивка (фактурная мебельная ткань), натуральное дерево (видимые элементы каркаса, ножки, акцентные накладки на подлокотниках).\n*   **Цвет:** Светло-серый (дымчатый), тепло-коричневый (оттенок дерева).\n*   **Особенности:**\n    *   Изогнутые подлокотники с декоративными деревянными вставками.\n    *   Конические ножки из натурального дерева, слегка под углом.\n    *   Мягкие, объемные подушки сидений и спинок.\n    *   Высокие спинки кресел с горизонтальной прострочкой для дополнительной поддержки.\n    *   Декоративные подушки в комплекте (для дивана с вертикальной прострочкой, для кресел – поясничные).\n    *   Современный стиль с элементами mid-century modern."},{"id":"PSDCRRp8pxdPcdW59QOU","name":"MOON FAMILY","imageUrls":["https://label-com.ru/images/virtuemart/product/251.jpg"],"category":"Мягкая мебель","originalUrl":"https://label-com.ru/katalog/myagkaya-mebel/moon-family-1-detail.html","createdAt":"2025-11-24T15:26:21.844Z","updatedAt":"2025-11-24T15:26:21.844Z","rating":0,"reviews":[],"details":{"dimensions":"","material":"","care":""},"price":147350,"description":"**MOON FAMILY**\n\nДобро пожаловать в мир безмятежного уюта и современного шика с коллекцией \"MOON FAMILY\" от \"Aura\". Эта модульная диванная группа — воплощение домашнего очага, где каждая деталь призвана дарить максимальный комфорт и эстетическое наслаждение. Мягкие, обтекаемые формы дивана и отдельно стоящего кресла создают атмосферу спокойствия и расслабления, приглашая к отдыху после долгого дня. Благодаря своей универсальной цветовой палитре и современному дизайну, \"MOON FAMILY\" идеально впишется в интерьер, стремящийся к гармонии и функциональности, будь то минималистичная гостиная или пространство в стиле современная классика.\n\nКоллекция обтянута роскошной текстурированной тканью теплого серо-бежевого оттенка, напоминающего нежный шенилл или букле. Этот материал не только приятен на ощупь, но и придает мебели глубину и объем, создавая ощущение обволакивающей мягкости. Изящные низкие ножки из натурального дерева среднего коричневого тона добавляют конструкции легкости и природного тепла. Особый акцент коллекции придает одна из секций дивана с интегрированной столешницей из темного дерева или ламината – это продуманное решение для вашего комфорта, позволяющее всегда держать под рукой любимую книгу или чашку кофе.\n\n\"MOON FAMILY\" демонстрирует мастерство в деталях: на диване и кресле расположились декоративные подушки с геометрическим узором, выполненным в спокойных тонах синего, серого и коричневого. Эти акценты оживляют общий образ, добавляя ему динамики и современного стиля. Отдельное круглое кресло, будто нежное объятие, завершает ансамбль, предлагая уединенное место для чтения или созерцания. Вместе эти элементы создают полноценное пространство для всей семьи, где каждый найдет свой уголок комфорта и покоя, отражая саму суть названия \"MOON FAMILY\" – объединять и дарить тепло.\n\nТехническая информация:\n\n*   **Тип:** Модульная диванная группа с отдельно стоящим креслом.\n*   **Материал обивки:** Текстурированная мебельная ткань (вероятно, шенилл или букле).\n*   **Материал ножек:** Натуральное дерево.\n*   **Материал встроенной столешницы:** Темное дерево или ламинат.\n*   **Цвет обивки:** Теплый серо-бежевый (тауп).\n*   **Цвет ножек:** Средний коричневый.\n*   **Цвет встроенной столешницы:** Темно-коричневый.\n*   **Особенности:**\n    *   Модульная конструкция дивана.\n    *   Интегрированная функциональная столешница в подлокотнике одной из секций.\n    *   Декоративные подушки с геометрическим узором в комплекте (синий, серый, коричневый).\n    *   Низкие конические деревянные ножки.\n    *   Отдельное округлое кресло на низкопрофильном основании."},{"id":"PzVhQPghc6abn9jTfZlE","name":"комплект ДИВАН И 2 КРЕСЛА","price":160000,"imageUrls":["https://label-com.ru/images/virtuemart/product/divan.jpg"],"category":"Мягкая мебель","originalUrl":"https://label-com.ru/katalog/myagkaya-mebel/komplekt-divan-i-2-kresla-detail.html","rating":0,"reviews":[],"createdAt":{"_seconds":1764053269,"_nanoseconds":72000000},"description":"Представляем вашему вниманию комплект мягкой мебели \"Диван и 2 кресла\" от \"Aura\" – воплощение безупречного стиля и утонченного вкуса, созданный для тех, кто ценит комфорт и эстетику в каждой детали интерьера. Этот гарнитур мгновенно преобразит вашу гостиную, придав ей атмосферу роскоши и сдержанного шика. Его дизайн гармонично сочетает в себе элементы современной классики с нотками необарокко, что делает его актуальным и вневременным выбором.\n\nОбивка комплекта выполнена из благородного, бархатистого материала насыщенного темно-серого цвета, который деликатно переливается при свете, подчеркивая глубину оттенка. Этот тактильно приятный текстиль (вероятно, велюр или высококачественный шенилл) не только придает мебели изысканный вид, но и обещает необыкновенный комфорт. Изюминкой дизайна является классическая каретная стяжка (капитоне) на спинках дивана и кресел, формирующая выразительный ромбовидный узор, который добавляет объема и элегантности каждому элементу.\n\nИзящные резные точеные ножки, выполненные из дерева и окрашенные в светлый, почти белый цвет, создают контраст с темной обивкой и придают комплекту легкость и воздушность. Эти ножки не только служат прочной опорой, но и являются важным декоративным акцентом, отсылающим к классическим образцам мебельного искусства. Подлокотники дивана украшены стильными металлическими кольцами серебристого оттенка, добавляющими современный штрих. В комплект входят декоративные подушки различных форм – прямоугольные и одна круглая с центральной пуговицей, некоторые из которых имеют элегантную вертикальную стежку, идеально дополняя общий ансамбль.\n\nЭтот комплект мебели не просто функциональный предмет интерьера, но и центральный акцент, способный придать законченность и индивидуальность вашему пространству. Он идеально подойдет для создания уютной зоны отдыха в гостиной, оформления респектабельного кабинета или стильной приемной, приглашая к расслаблению и наслаждению атмосферой уюта и гармонии.\n\n---\n\n### Техническая информация:\n\n*   **Тип:** Комплект мягкой мебели (диван и 2 кресла)\n*   **Стиль:** Современная классика, неоклассика\n*   **Материал:**\n    *   Обивка: Велюр / Высококачественный текстиль\n    *   Ножки: Дерево\n    *   Декоративные элементы: Металл\n*   **Цвет:**\n    *   Обивка: Темно-серый / Антрацит\n    *   Ножки: Белый / Светлый\n*   **Особенности:**\n    *   Каретная стяжка (капитоне) на спинках\n    *   Декоративные резные (точеные) ножки\n    *   Металлические декоративные кольца на подлокотниках дивана\n    *   Наличие декоративных подушек в комплекте (прямоугольные, с вертикальной стежкой, круглая с пуговицей)\n    *   Высокие спинки у кресел для дополнительного комфорта"},{"id":"Q97ORmIS5e7UUWOjiT6m","name":"IZABELL","price":154000,"imageUrls":["https://label-com.ru/images/virtuemart/product/izabell.jpg"],"category":"Мягкая мебель","originalUrl":"https://label-com.ru/katalog/myagkaya-mebel/izabell-detail.html","createdAt":"2025-11-24T15:26:21.843Z","updatedAt":"2025-11-24T15:26:21.843Z","rating":0,"reviews":[],"details":{"dimensions":"","material":"","care":""},"description":"Представляем вашему вниманию комплект мягкой мебели IZABELL от Aura – воплощение изысканности и непревзойденного комфорта, созданный для тех, кто ценит гармонию современного дизайна и классической элегантности. Этот комплект, состоящий из просторного трехместного дивана и двух уютных кресел, приковывает взгляд своей утонченностью и обещанием абсолютного релакса. Идеально сбалансированная цветовая палитра в теплых серо-бежевых тонах обивки прекрасно впишется в интерьеры, стремящиеся к атмосфере спокойствия и роскоши.\n\nКаждая деталь комплекта IZABELL продумана до мелочей, чтобы дарить эстетическое наслаждение. Обивка из нежнейшей бархатистой ткани, напоминающей велюр, создает приятные тактильные ощущения и придает мебели особую глубину цвета, играя переливами света. Спинки дивана украшены элегантной флейтовой (вертикальной) стежкой, добавляющей текстурную выразительность и отсылающей к утонченным традициям классического стиля.\n\nИзысканный силуэт мебели подчеркнут сияющими золотыми акцентами. Изящные металлические вставки на подлокотниках плавно переходят в тонкие, хитросплетенные ножки оригинальной формы, выполненные в благородном золотом цвете. Эти детали не только обеспечивают надежную опору, но и служат великолепным декоративным элементом, придавая комплекту легкость и воздушность. Декоративные подушки, гармонично дополняющие комплект, украшены тонкой золотой полосой, завершая образ утонченного шика.\n\nIZABELL – это не просто мебель, это центральный элемент вашего пространства, который мгновенно трансформирует гостиную в оазис уюта и респектабельности. Глубокие сиденья и мягкие спинки приглашают расслабиться, а безупречное исполнение гарантирует долговечность и актуальность на долгие годы. Откройте для себя совершенство форм и функциональности с IZABELL, и пусть ваш дом наполнится атмосферой изысканного комфорта.\n\n### Техническая информация:\n\n*   **Тип:** Гостиный гарнитур (комплект мягкой мебели)\n*   **Состав комплекта:** Трехместный диван, два кресла\n*   **Материал обивки:** Бархатистая ткань (велюр)\n*   **Цвет обивки:** Серо-бежевый / Тауп\n*   **Материал декоративных элементов и ножек:** Металл\n*   **Цвет металлических элементов:** Золотой\n*   **Особенности:**\n    *   Декоративная флейтовая (вертикальная) стежка на спинках дивана\n    *   Изящные металлические вставки золотого цвета на подлокотниках\n    *   Фигурные металлические ножки золотого цвета\n    *   В комплект входят декоративные подушки с золотой полосой\n    *   Современный классический / Неоклассический стиль\n    *   Мягкие, объемные сиденья и спинки"},{"id":"RMmPDEkVpMOaEzWdrarm","name":"Борнео","price":205000,"imageUrls":["https://label-com.ru/images/virtuemart/product/259.jpg"],"category":"Мягкая мебель","originalUrl":"https://label-com.ru/katalog/myagkaya-mebel/borneo-1-detail.html","rating":0,"reviews":[],"createdAt":{"_seconds":1764053122,"_nanoseconds":841000000},"description":"Добро пожаловать в мир утонченного стиля и непревзойденного комфорта с коллекцией \"Борнео\" от Aura. Представляем вашему вниманию элегантный угловой диван и гармонично дополняющее его кресло, которые станут сердцем вашей гостиной. \"Борнео\" — это воплощение современной классики, где чистые линии встречаются с уютной роскошью, создавая атмосферу спокойствия и изысканности. Его продуманный дизайн мгновенно преображает пространство, предлагая не только место для отдыха, но и подлинный объект восхищения.\n\nОсновой коллекции служит благородный светло-серый оттенок обивки, выполненной из высококачественной фактурной ткани. Этот нейтральный, но при этом глубокий цвет легко вписывается в любую палитру интерьера, добавляя ему света и воздушности. Контраст создают декоративные подушки насыщенного темно-серого цвета, которые приглашают к полному расслаблению и являются стильным акцентом. Особое внимание привлекают изящные детали: по периметру нижней части дивана и кресла проходит тонкий декоративный кант из темного дерева, который придает конструкции законченный и респектабельный вид, подчеркивая плавность форм.\n\nКоллекция \"Борнео\" стоит на крепких, но изящных деревянных ножках темно-коричневого оттенка, сужающихся к низу, что придает мебели легкость и визуальную невесомость, несмотря на ее внушительный размер. Эти ножки, как и деревянные элементы на подлокотниках кресла, выполнены из массива дерева, что гарантирует долговечность и устойчивость. Мягкие сиденья и спинки обещают исключительный комфорт, делая каждый момент, проведенный на диване или в кресле \"Борнео\", истинным удовольствием.\n\nСозданный для тех, кто ценит безупречный вкус и функциональность, угловой диван \"Борнео\" вместе с креслом от Aura станет идеальным решением для организации просторной зоны отдыха. Он прекрасно подойдет как для больших семейных сборищ, так и для уединенных вечеров с книгой, легко интегрируясь в современный, минималистичный или даже лофт-интерьер благодаря своей универсальной эстетике и высокому качеству исполнения.\n\n### Техническая информация:\n*   **Тип:** Угловой диван, Кресло\n*   **Материал:** Текстильная обивка (фактурная ткань), Массив дерева (для ножек и декоративных элементов)\n*   **Цвет:** Светло-серый (основная обивка), Темно-серый (декоративные подушки), Темно-коричневый (деревянные элементы)\n*   **Особенности:** Модульная конструкция (угловой диван), Прямые линии с мягкими скруглениями, Декоративные подушки в комплекте, Конусные деревянные ножки, Декоративный деревянный кант по периметру основания, Деревянные акценты на подлокотниках кресла."},{"id":"RNs5KmPHKRl5Z28idVlq","name":"ORION","price":155350,"imageUrls":["https://label-com.ru/images/virtuemart/product/147.jpg"],"category":"Мягкая мебель","originalUrl":"https://label-com.ru/katalog/myagkaya-mebel/orion-detail.html","createdAt":"2025-11-24T15:26:21.844Z","updatedAt":"2025-11-24T15:26:21.844Z","rating":0,"reviews":[],"details":{"dimensions":"","material":"","care":""},"description":"**ORION: Созвездие комфорта и стиля**\n\nПогрузитесь в мир безупречного стиля и исключительного комфорта с мебельным гарнитуром \"ORION\" от \"Aura\". Этот изысканный комплект, состоящий из элегантного дивана и двух уютных кресел, воплощает собой современную эстетику, где каждая линия и деталь говорят о внимании к дизайну и стремлении к совершенству. \"ORION\" гармонично впишется в интерьер, тяготеющий к мягкому модерну или утонченной современной классике, создавая атмосферу спокойствия и благородства. Его облик обещает стать центральным акцентом вашей гостиной, приглашая к расслаблению и приятному времяпрепровождению.\n\nВ основе очарования \"ORION\" лежит гармония тактильных ощущений и визуального восприятия. Обивка, выполненная из высококачественного фактурного текстиля нейтрального серо-бежевого оттенка, не только приятна на ощупь, но и удивительно универсальна, легко сочетаясь с разнообразными цветовыми палитрами интерьера. Теплая, глубокая палитра полированного дерева, используемого для каркаса и изящных конических ножек, добавляет комплекту ощущение прочности и натуральной красоты. Особый шарм придают декоративные вставки из того же полированного дерева на боковых частях подлокотников, подчеркивая утонченность дизайна.\n\nКаждый элемент гарнитура \"ORION\" создан для вашего максимального удобства. Мягкие, пышные сиденья и спинки с горизонтальной прострочкой обеспечивают эргономичную поддержку, бережно обволакивая тело и способствуя полному расслаблению. Высокие спинки кресел гарантируют дополнительный комфорт для головы и шеи. Элегантные конические ножки, украшенные тонкими прозрачными или металлическими акцентами у основания, не только обеспечивают устойчивость, но и визуально облегчают конструкцию, придавая ей невесомость и современный шик.\n\n\"ORION\" – это не просто набор мебели, это обещание домашнего очага, где каждый момент наполнен уютом и гармонией. Он создан для тех, кто ценит не только внешнюю привлекательность, но и глубокий, продуманный комфорт. Позвольте себе роскошь обладать комплектом, который преобразит ваше пространство, наполнив его светом и умиротворением, и станет идеальным местом для семейных встреч или уединенных минут отдыха.\n\n**Техническая информация:**\n\n*   **Тип:** Комплект мягкой мебели для гостиной (диван и два кресла)\n*   **Конфигурация:** Трехместный диван, Два кресла\n*   **Материал обивки:** Фактурный текстиль\n*   **Материал каркаса/основания:** Полированное дерево\n*   **Материал ножек:** Дерево с декоративными прозрачными/металлическими вставками\n*   **Цвет обивки:** Светло-серый / Серо-бежевый (нейтральный оттенок)\n*   **Цвет дерева:** Темно-коричневый\n*   **Особенности:** Пышные, мягкие сиденья и спинки; Сегментированные спинки с горизонтальной прострочкой; Изогнутые подлокотники с декоративными вставками из полированного дерева; Конические ножки."},{"id":"RPPmLKkChAXs2791X0FZ","name":"Бренд Угловая","price":192500,"imageUrls":["https://label-com.ru/images/virtuemart/product/brendU.png"],"category":"Кухни","originalUrl":"https://label-com.ru/katalog/kukhni-1/brend-uglovaya-detail.html","createdAt":"2025-11-24T15:26:21.837Z","updatedAt":"2025-11-24T15:26:21.837Z","rating":0,"reviews":[],"details":{"dimensions":"3800","material":"","care":""},"description":"Представляем угловой кухонный гарнитур \"Бренд Угловая\" от \"Aura\" — воплощение изысканности и функциональности, созданный для тех, кто ценит гармонию в каждой детали. Этот ансамбль задает тон современному классическому стилю, где элегантность прошлого встречается с практичностью настоящего. Он не просто мебель, а центральный элемент вашего дома, наполняющий пространство светом и утонченным очарованием, превращая обыденную кухню в источник вдохновения.\n\nДизайн гарнитура построен на нежной палитре и благородных акцентах. Фасады выполнены в притягательном пудрово-бежевом оттенке, который дарит ощущение тепла и уюта, при этом сохраняя легкость и воздушность интерьера. Изысканные золотистые ручки и тонкие декоративные планки, искусно вплетенные в дизайн, добавляют нотку роскоши и шика, подчеркивая статус и безупречный вкус владельца. В контрасте с ними выступает столешница и фартук, выполненные в эффектном белом мраморе с выразительными серыми прожилками, что придает кухне особую свежесть и благородство глянцевой поверхности.\n\nКаждая деталь \"Бренд Угловая\" продумана до мелочей. Особенностью фасадов являются утонченные вертикальные бороздки (каннелюры) и рамочные элементы с внутренним рельефом, которые создают притягательную игру света и тени, добавляя глубины и текстуры. Угловая конфигурация гарнитура обеспечивает максимальную эргономику и эффективное использование каждого сантиметра пространства, предлагая вместительные модули и высокие пеналы для удобного хранения. Это решение идеально подходит для создания функциональной и в то же время невероятно стильной рабочей зоны, которая станет настоящим сердцем вашего дома.\n\n### Техническая информация:\n\n*   **Тип:** Угловой кухонный гарнитур.\n*   **Стиль:** Современная классика / Неоклассика.\n*   **Материал фасадов:** МДФ с матовым или полуглянцевым покрытием (предположительно эмаль или пленка) с рельефными элементами (вертикальные бороздки, рамочные вставки).\n*   **Материал столешницы и фартука:** Имитация белого мрамора (глянцевая поверхность), предположительно искусственный камень или ламинированная ДСП/МДФ.\n*   **Основной цвет фасадов:** Пудровый бежевый / Нежный кремовый.\n*   **Цвет декоративных элементов и фурнитуры:** Золотистый.\n*   **Особенности дизайна:**\n    *   Декоративные вертикальные бороздки (каннелюры/рейки) на фасадах.\n    *   Рамочные фасады с внутренним рельефом.\n    *   Интегрированные золотистые декоративные планки.\n    *   Элегантные горизонтальные ручки золотистого цвета.\n    *   Высокие пеналы для хранения или встраиваемой техники.\n    *   Угловая планировка для оптимального использования пространства.\n    *   Глянцевая поверхность столешницы и фартука."},{"id":"RyorvUKVlwS3pNcUQFuU","name":"Комплект АМБЕР","price":192500,"imageUrls":["https://label-com.ru/images/virtuemart/product/amber.jpg"],"category":"Мягкая мебель","originalUrl":"https://label-com.ru/katalog/myagkaya-mebel/komplekt-amber-detail.html","rating":0,"reviews":[],"createdAt":{"_seconds":1764053258,"_nanoseconds":116000000},"description":"Представляем вашему вниманию \"Комплект АМБЕР\" от мебельного магазина Aura — истинное воплощение дворцовой роскоши и классической элегантности. Этот великолепный ансамбль, состоящий из величественного трехместного дивана и двух изысканных кресел, создан для тех, кто стремится окружить себя предметами искусства и внести в интерьер атмосферу неподвластного времени величия. \"АМБЕР\" — это не просто мебель, это центральный элемент, способный преобразить любую гостиную в роскошный салон.\n\nС первого взгляда комплект покоряет своей детальной проработкой и блеском. Каркас каждого предмета мебели украшен обильной, витиеватой резьбой, выполненной в классическом стиле барокко или рококо. Каждая завиток, каждый листок и каждый орнамент тщательно вырезаны и покрыты сияющей золотой отделкой, которая придает комплекту поистине королевский вид. Изящно изогнутые ножки, дополненные легкими серебристыми акцентами на основаниях, добавляют конструкции воздушности и грации, подчеркивая мастерство исполнения.\n\nОбивка комплекта \"АМБЕР\" безупречно гармонирует с золотым каркасом, создавая единый роскошный образ. Основная часть ews":[],"details":{"dimensions":"","material":"","care":""},"description":"Добро пожаловать в мир изысканного комфорта с диваном \"Эдель\" от \"Aura\" – предметом мебели, созданным, чтобы восхищать и дарить неповторимые ощущения уюта и роскоши. Взгляните на него, и вы сразу почувствуете, как пространство вокруг наполняется атмосферой утонченности и благородства. \"Эдель\" – это безупречное воплощение современной классики с элегантными нотками ар-деко, призванное стать центральным акцентом вашего интерьера, будь то просторная гостиная или уютная студия.\n\nОбивка дивана \"Эдель\" выполнена из нежнейшего велюра, который очаровывает своей шелковистой текстурой и притягательным блеском. Выбранный оттенок – \"пыльная роза\" или \"пудровый беж\" – создает ощущение воздушности и легкости, при этом добавляя интерьеру теплоты и романтики. Этот утонченный цвет идеально гармонирует с полированными золотистыми металлическими акцентами, обрамляющими боковины дивана. Эти детали не просто подчеркивают четкие линии и форму, но и добавляют изысканный штрих роскоши, отражая свет и создавая игру бликов.\n\nГлавной изюминкой дизайна, бесспорно, является глубокая каретная стяжка (капитоне), украшающая боковые части и придающая дивану величественный и статусный вид. Ромбовидный узор, образованный утяжками, создает объем и фактуру, напоминая о традициях высокого мебельного искусства. В комплект входят мягкие декоративные подушки, выполненные в тон основной обивке, которые не только дополняют эстетику, но и обеспечивают дополнительный комфорт, приглашая к полному расслаблению.\n\nПомимо своей безупречной эстетики, \"Эдель\" удивляет своей функциональностью. Диван легко трансформируется в просторное и комфортабельное спальное место благодаря продуманному выкатному механизму. Это делает его идеальным решением не только для повседневного отдыха, но и для приема гостей, предлагая им полноценный сон. \"Эдель\" – это не просто диван, это обещание комфорта, стиля и безупречного качества, которое прослужит вам долгие годы.\n\n---\n\n**Техническая информация:**\n\n*   **Тип:** Раскладной диван / Диван-кровать\n*   **Механизм трансформации:** Выкатной\n*   **Материал обивки:** Велюр\n*   **Цвет обивки:** Пудровый / Бежево-розовый / Оттенок \"пыльной розы\"\n*   **Декоративные элементы:** Металлические планки золотистого цвета на боковинах\n*   **Особенности:**\n    *   Глубокая каретная стяжка (капитоне) на боковинах.\n    *   Прямые подлокотники.\n    *   В комплекте четыре декоративные подушки (две большие квадратные, две маленькие прямоугольные)."},{"id":"TJAyTgD8kDSiG28oYaED","name":"Мия","price":184800,"imageUrls":["https://label-com.ru/images/virtuemart/product/miya.png"],"category":"Спальни","originalUrl":"https://label-com.ru/katalog/spalni/miya-detail.html","createdAt":"2025-11-24T15:26:21.836Z","updatedAt":"2025-11-24T15:26:21.836Z","rating":0,"reviews":[],"details":{"dimensions":"2260  x 1680  x 2200\n","material":"","care":""},"description":"Добро пожаловать в мир утонченной роскоши с коллекцией мебели для спальни \"Мия\" от Aura. Взгляните на эту пленительную композицию, где каждая деталь призвана создать атмосферу изысканного комфорта и величественного спокойствия. \"Мия\" — это ода неоклассическому стилю с его гармонией линий и благородной эстетикой, дополненной нотками современного гламура. Мебель представлена в нежном, светло-сером оттенке, который привносит в пространство ощущение воздушности, света и безмятежности, становясь идеальным фоном для ваших самых сокровенных снов.\n\nЦентральное место в коллекции занимает роскошная кровать с высоким, изогнутым изголовьем, обтянутым мягким, благородным велюром. Глубокая каретная стяжка (капитоне) с множеством пуговиц создает объемный ромбовидный узор, подчеркивающий элегантность и приглашающий к полному расслаблению. Изящные фигурные боковые элементы изголовья, словно крылья, обрамляют спальное место, добавляя ему торжественности и уюта. Прикроватные тумбы по обе стороны кровати поддерживают общий стиль благодаря изящным резным ножкам, плавно изогнутым фасадам и декоративной окантовке, а блестящие кристаллические ручки завершают образ, словно драгоценные капли росы.\n\nГардеробная группа и туалетный столик продолжают общую дизайнерскую линию, демонстрируя идеальное сочетание функциональности и визуальной привлекательности. Вместительный платяной шкаф с тремя дверцами, украшенными фрезерованными рамами, обеспечивает достаточно места для хранения, сохраняя при этом легкость и элегантность благодаря светлому цвету и тонкой фурнитуре. Туалетный столик с аналогичными резными ножками и тремя центральными ящиками, а также боковыми отделениями, дополнен круглым зеркалом в сияющей раме с кристаллическим декором. Все элементы коллекции \"Мия\" выполнены с вниманием к деталям, обещая долгие годы безупречной службы и неизменного восторга.\n\n\"Мия\" от Aura — это не просто мебель, это целостное решение для создания спальни вашей мечты, где каждый день начинается и заканчивается в объятиях роскоши и умиротворения. Эта коллекция преобразит вашу комнату в личный будуар, наполненный светом, изяществом и неповторимым шармом, отражающим ваш утонченный вкус и стремление к совершенству.\n\n---\n\n### Техническая информация:\n\n*   **Тип:** Спальный гарнитур (кровать, две прикроватные тумбы, платяной шкаф, туалетный столик, круглое зеркало).\n*   **Материал:**\n    *   Каркасы мебели: Высококачественные древесные материалы (вероятно, МДФ с эмалевым покрытием).\n    *   Обивка изголовья: Мягкий велюр (или бархат).\n    *   Фурнитура: Металлические ручки с кристаллическими вставками.\n*   **Цвет:** Светло-серый (с легким сиреневым или голубоватым подтоном).\n*   **Особенности:**\n    *   Мягкое изголовье кровати с глубокой каретной стяжкой (капитоне).\n    *   Изящные фигурные боковые элементы изголовья (тип \"крылья\").\n    *   Резные ножки кабриоль на тумбах и туалетном столике.\n    *   Фасады шкафа и тумбочек с фрезеровкой (рамочные панели).\n    *   Круглое настенное зеркало в раме с кристаллическим декором.\n    *   Декоративная окантовка по периметру столешниц тумб и туалетного столика."},{"id":"TNC22g8UkBcwRqAcOwtQ","name":"Стул Голд","price":6000,"imageUrls":["https://label-com.ru/images/virtuemart/product/stol_gold7.jpg"],"category":"Гостиная","originalUrl":"https://label-com.ru/katalog/gostinaya/stul-gold-detail.html","rating":0,"reviews":[],"createdAt":{"_seconds":1764053759,"_nanoseconds":743000000},"description":"Добро пожаловать в мир утонченной роскоши с \"Стулом Голд\" от Aura – воплощением королевской элегантности и безупречного стиля. Этот стул, являясь частью величественного обеденного гарнитура, мгновенно преображает любое пространство, наполняя его атмосферой дворцовой роскоши и классического величия. Его дизайн искусно сочетает в себе элементы барокко и неоклассики, создавая не просто предмет мебели, а произведение искусства, призванное стать центральным акцентом вашей столовой, приглашая к длительным и приятным беседам в атмосфере изысканности.\n\nКаждый изгиб каркаса \"Стула Голд\" – это ода мастерству и вниманию к деталям. Изысканные резные элементы, украшающие высокую фигурную спинку и грациозные изогнутые ножки, выполнены в благородном оттенке молочного жемчуга или античной слоновой кости, который придает мебели воздушность и аристократизм. Глянцевое лаковое покрытие подчеркивает каждую линию, отражая свет и добавляя пространству сияния, а тонкая серебристая или серая патина в резьбе умело выделяет богатство орнамента, делая его поистине завораживающим. Это произведение столярного искусства излучает величие и историческую ценность.\n\nЗавершает образ роскошная обивка, приковывающая взгляды и приглашающая насладиться безупречным комфортом. Спинка стула обтянута мягким, тактильно приятным велюром благородного светло-серого оттенка, глубокая каретная стяжка которого украшена множеством блестящих кристаллов или декоративных пуговиц. Эти сияющие акценты ловят свет, добавляя шика и гламура. Уютное сиденье, выполненное в гармонирующем оттенке велюра, обещает комфорт и поддержку, превращая каждую трапезу в особое, торжественное событие. \"Стул Голд\" – это не просто место для сидения, это трон для истинных ценителей красоты и уюта, где каждая деталь служит созданию неповторимой атмосферы праздника.\n\n---\n\n### Техническая информация:\n\n*   **Тип:** Обеденный стул (элемент обеденной группы)\n*   **Материал:**\n    *   Каркас: Резное дерево (или высококачественная имитация) с глянцевым эмалевым покрытием.\n    *   Обивка спинки и сиденья: Мягкий велюр.\n    *   Декор: Блестящие кристаллы или декоративные пуговицы.\n*   **Цвет:**\n    *   Каркас: Жемчужно-белый / Цвет слоновой кости (светло-кремовый) с серебристыми/серыми акцентами в резьбе.\n    *   Обивка: Светло-серый.\n*   **Особенности:**\n    *   Высокая фигурная спинка с выраженным резным декором.\n    *   Глубокая каретная стяжка (капитоне) на спинке.\n    *   Декоративные элементы в виде блестящих кристаллов/пуговиц, инкрустированных в стяжку.\n    *   Изысканная резная отделка по всему каркасу.\n    *   Изогнутые фигурные ножки в стиле \"кабриоль\".\n    *   Глянцевое лаковое покрытие каркаса."},{"id":"TquVpes4lZRzRdOn8JnV","name":"Венеция угловая","price":121000,"imageUrls":["https://label-com.ru/images/virtuemart/product/kg_venecija_ugol.jpg"],"category":"Кухни","originalUrl":"https://label-com.ru/katalog/kukhni-1/venetsiya-uglovaya-detail.html","createdAt":"2025-11-24T15:26:21.837Z","updatedAt":"2025-11-24T15:26:21.837Z","rating":0,"reviews":[],"details":{"dimensions":"","material":"","care":""},"description":"Добро пожаловать в мир утонченной роскоши с кухонным гарнитуром \"Венеция угловая\" от Aura. Представьте себе пространство, где каждый элемент дышит аристократическим величием и неподвластной времени красотой. Этот кухонный гарнитур – истинное воплощение классической элегантности с нотками неоклассики и барокко, созданный для тех, кто ценит изысканность и безупречный вкус. Его белоснежные фасады, словно окутанные легкой дымкой, излучают свет и наполняют помещение ощущением простора и свежести.\n\nВ основе \"Венеции угловой\" лежит безупречное мастерство исполнения. Фрезерованные дверцы и декоративные пилястры с вертикальными каннелюрами придают гарнитуру монументальность и респектабельность. Особое внимание привлекают изящные резные элементы: витиеватые карнизы, капители и накладки, украшающие центральный портал вытяжки и остекленные секции. Эти детали, выполненные с филигранной точностью, выглядят так, будто покрыты легкой серебряной патиной, подчеркивая глубину и сложность декора. Изящное остекление верхних шкафов с матовым или узорчатым стеклом и декоративными ажурными накладками добавляет легкости и позволяет ненавязчиво демонстрировать фамильный сервиз.\n\nРабочая зона гарнитура \"Венеция угловая\" достойна отдельного восхищения. Белоснежная столешница и фартук, имитирующие натуральный мрамор с элегантными серыми прожилками, создают гармоничный контраст с общим светлым фоном, добавляя интерьеру динамики и благородства. Встроенная бытовая техника, включая стильный темный смеситель и мойку, органично вписывается в общий дизайн, не нарушая его визуальной целостности. Каждый ящик и дверца оснащены утонченными металлическими ручками, которые завершают образ, привнося нотку современного минимализма в классическое убранство.\n\n\"Венеция угловая\" – это не просто кухонный гарнитур, это сердце дома, где рождаются кулинарные шедевры и собирается вся семья. Он создает атмосферу праздника и уюта, приглашая к неспешным беседам и наслаждению каждым моментом. Выбирая этот гарнитур, вы выбираете не просто мебель, а образ жизни, наполненный красотой, комфортом и истинной гармонией.\n\n---\n\n**Техническая информация:**\n\n*   **Тип:** Кухонный гарнитур угловой\n*   **Стиль:** Классический, неоклассический с элементами барокко/рококо\n*   **Материал фасадов:** Окрашенный МДФ или массив дерева с матовым/сатиновым финишем\n*   **Цвет фасадов:** Светлый (оттенок слоновой кости/кремовый/молочный)\n*   **Материал столешницы и фартука:** Искусственный камень/кварцевый агломерат/ламинат с имитацией белого мрамора и серыми/темными прожилками\n*   **Декоративные элементы:** Резные карнизы, пилястры, капители, накладки на вытяжку и остекленные фасады. Предполагается патинирование под серебро/светлое золото.\n*   **Остекление:** Матовое/узорчатое стекло с декоративными металлическими/резными накладками на фасадах.\n*   **Фурнитура:** Металлические ручки-скобы серебристого/хромированного цвета.\n*   **Особенности:**\n    *   Фрезерованные филенчатые фасады.\n    *   Высокие колонны-пеналы для встраиваемой техники.\n    *   Интегрированная вытяжка в декоративном портале.\n    *   Угловая конфигурация с модулями различной ширины.\n    *   Встроенная варочная панель.\n    *   Мойка из темного композитного материала/гранита.\n    *   Смеситель темного (черного/бронзового) цвета.\n    *   Верхний свет встроенных потолочных светильников."},{"id":"TrpdAivIiHl4HQkrK7Aq","name":"Амазонка","price":136000,"imageUrls":["https://label-com.ru/images/virtuemart/product/Amazonka2.jpeg"],"category":"Мягкая мебель","originalUrl":"https://label-com.ru/katalog/myagkaya-mebel/yarkaya-novinka-amazonka-detail.html","createdAt":"2025-11-24T15:26:21.846Z","updatedAt":"2025-11-24T15:26:21.846Z","rating":0,"reviews":[],"details":{"dimensions":"","material":"","care":""},"description":"Погрузитесь в мир изысканной роскоши с гостиным гарнитуром \"Амазонка\" от мебельного салона \"Aura\". Этот величественный комплект, состоящий из трехместного дивана и двух элегантных кресел, создан, чтобы стать центральным элементом вашей гостиной, наполняя ее атмосферой дворцового шика и аристократического комфорта. \"Амазонка\" – это не просто мебель, это произведение искусства, воплощающее вневременную классику и безупречное мастерство.\n\nКаждая деталь гарнитура \"Амазонка\" говорит о его благородном происхождении. Каркас мебели выполнен из темного, глубокого оттенка дерева, который напоминает ценные породы, такие как красное дерево или темный орех, с легким глянцевым отливом. Он украшен обильной, витиеватой резьбой, имитирующей ручную работу: это и замысловатые цветочные мотивы, и листья аканта, и грациозные рокайли. Все резные элементы эффектно подчеркнуты роскошным золотым патинированием, которое придает ансамблю истинно королевский вид и изысканность.\n\nОбивка \"Амазонки\" выполнена из плотного, высококачественного текстиля с богатым жаккардовым узором, играющим нежными бежево-золотистыми тонами. Спинки дивана и кресел украшены классической каретной стяжкой (капитоне), создающей объемную, рельефную текстуру и ощущение глубины. Сиденья и подлокотники дополнены узором, который гармонично сочетается с основной тканью, но при этом придает изюминку. Декоративные подушки, включая одну круглую с центральной пуговицей, завершают образ, предлагая дополнительный уют и поддержку.\n\n\"Амазонка\" приглашает вас насладиться отдыхом в объятиях истинной красоты и комфорта. Ее изогнутые линии, фигурные ножки и общая композиция создают ощущение величия и гостеприимства. Этот гарнитур идеально впишется в интерьеры, оформленные в классическом стиле, барокко или рококо, став главным акцентом в вашей гостиной или парадном зале и неизменно притягивая восхищенные взгляды.\n\n---\n\n### Техническая информация:\n\n*   **Тип:** Гостиный гарнитур\n*   **Комплектация:** Диван трехместный, 2 кресла\n*   **Стиль:** Классический, барокко, рококо\n*   **Материал каркаса:** Дерево (темные породы), резное дерево\n*   **Материал обивки:** Текстиль (жаккард/дамаск)\n*   **Цвет каркаса:** Темно-коричневый (оттенки красного дерева/ореха)\n*   **Цвет обивки:** Светло-бежевый, кремовый, золотистый (с узором)\n*   **Особенности декора:** Резные элементы с золотым патинированием, каретная стяжка (капитоне) на спинках, витиеватые узоры на обивке, декоративные подушки (прямоугольные, круглая), фигурные ножки, изогнутые формы."},{"id":"UnvwqW4Hu1iSxqFLDbtL","name":"Комплект мягкой мебели АДЕЛЬ","price":135700,"imageUrls":["https://label-com.ru/images/virtuemart/product/Adel3.jpeg"],"category":"Мягкая мебель","originalUrl":"https://label-com.ru/katalog/myagkaya-mebel/komplekt-myagkoj-mebeli-adel-detail.html","rating":0,"reviews":[],"createdAt":{"_seconds":1764053317,"_nanoseconds":971000000},"description":"Представляем вашему вниманию \"Комплект мягкой мебели АДЕЛЬ\" от Aura – воплощение безупречного вкуса и исключительного комфорта, созданное для тех, кто ценит элегантность вне времени. Этот изысканный ансамбль, состоящий из просторного трехместного дивана и двух величественных кресел, мгновенно преобразит любое пространство, наполняя его атмосферой уюта и благородства. Комплект АДЕЛЬ – это современная классика, где традиции безупречного мастерства гармонично сочетаются с актуальными дизайнерскими решениями, создавая идеальное место для отдыха и приема гостей.\n\nОбивка комплекта выполнена из роскошного текстиля, предположительно высококачественного велюра или микровелюра, отличающегося мягкостью и приятной на ощупь текстурой с легким эффектом потертости, что придает мебели особый шарм и глубину. Привлекает внимание глубокая каретная стяжка (капитоне) на высоких спинках дивана и кресел – классический элемент, который подчеркивает аристократизм и ручную работу. Дополнительный комфорт обеспечивают мягкие сиденья и комплект декоративных подушек: две прямоугольные с изящной вертикальной прострочкой и одна уникальная круглая подушка с центральной пуговицей на диване, добавляющая игривый акцент. У каждого кресла также имеется одна прямоугольная подушка с вертикальной прострочкой.\n\nЦветовая палитра комплекта АДЕЛЬ выбрана с безукоризненным вкусом: теплый серо-бежевый оттенок (тауп) обивки является идеальным фоном для самых разнообразных интерьерных решений. Этот нейтральный, но глубокий цвет легко интегрируется как в светлые, так и в более насыщенные пространства, создавая ощущение спокойствия и умиротворения. Изящные, точеные ножки из темного дерева не только обеспечивают надежную опору, но и добавляют завершающий штрих к образу, подчеркивая утонченность каждой детали и отсылая к классическим образцам мебельного искусства.\n\nКомплект АДЕЛЬ от Aura – это не просто мебель, это инвестиция в ваш домашний уют и стиль. Он приглашает расслабиться после долгого дня, насладиться чтением в уютном кресле или провести теплый вечер в кругу близких на диване, окруженном неповторимой атмосферой роскоши и комфорта. Позвольте себе погрузиться в мир истинного благородства и наслаждения, которые привнесет этот великолепный комплект в ваш дом.\n\n***\n\n### Техническая информация:\n\n*   **Тип:** Комплект мягкой мебели (диван трехместный, 2 кресла)\n*   **Стиль:** Современная классика, неоклассика\n*   **Материал обивки:** Текстиль (предположительно велюр или микровелюр) с эффектом легкой потертости\n*   **Материал каркаса/ножек:** Дерево (резные, точеные ножки)\n*   **Цвет обивки:** Серо-бежевый (тауп)\n*   **Цвет ножек:** Темное дерево\n*   **Особенности:** Глубокая каретная стяжка (капитоне) на спинках дивана и кресел, высокие фигурные спинки у кресел, декоративные подушки (прямоугольные с вертикальной прострочкой, круглая с пуговицей)."},{"id":"V1Bby8aFIQa8KxK7isyA","name":"Стол Рим","price":30000,"imageUrls":["https://label-com.ru/images/virtuemart/product/stol_rim8.jpg"],"category":"Гостиная","originalUrl":"https://label-com.ru/katalog/gostinaya/stol-rim-1-detail.html","createdAt":"2025-11-24T15:26:21.848Z","updatedAt":"2025-11-24T15:26:21.848Z","rating":0,"reviews":[],"details":{"dimensions":"","material":"","care":""},"description":"**Стол Рим: Изысканность, Вдохновленная Вечностью**\n\nВстречайте \"Стол Рим\" – жемчужину коллекции Aura, призванную преобразить вашу столовую в оазис утонченности и стиля. Этот обеденный комплект является воплощением современной классики, переосмысленной через призму неоклассической эстетики и французского шика. Изящные линии, благородные оттенки и безупречное исполнение создают атмосферу аристократического уюта, где каждая трапеза превращается в торжество вкуса и элегантности, а семейные ужины наполняются особым шармом.\n\nСердце ансамбля – стол с безупречно глянцевой столешницей сияющего белого цвета, которая отражает свет, добавляя пространству легкости и воздушности. Отчетливый стык в центре намекает на его функциональность – способность легко трансформироваться для размещения большего количества гостей. Подстолье украшено изысканным декоративным фризом с вертикальным рифлением, напоминающим античные колонны, что придает конструкции величественную строгость. Массивные, но при этом невероятно изящно выточенные ножки стола, каждая из которых увенчана фактурной резьбой, служат прочной и стильной опорой, завершая образ архитектурной гармонии.\n\nВ комплект органично вписываются стулья, выполненные в единой стилистике и цветовой палитре. Их каркасы, повторяющие светлый алебастровый или слоновой кости оттенок стола, имеют благородные изогнутые спинки и тонкие резные ножки, вторящие элементам стола. Обивка стульев выполнена из роскошного, глубокого темно-серого велюра, который не только великолепно смотрится, но и дарит несравненные тактильные ощущения. Мягкие сиденья и комфортные спинки приглашают насладиться долгими беседами и неспешными ужинами, обеспечивая максимальный комфорт.\n\n\"Стол Рим\" от Aura – это не просто мебель, это заявление о стиле, ваш личный портал в мир изысканных интерьеров. Он идеально впишется как в классические, так и в современные пространства, где ценятся качество, дизайн и способность создавать неповторимую, гостеприимную атмосферу. Этот ансамбль станет центральным элементом вашей столовой, приглашая к незабываемым моментам в кругу близких.\n\n---\n\n**Техническая информация:**\n\n*   **Тип:** Обеденная группа (стол + стулья)\n*   **Материал:**\n    *   Столешница: Высокоглянцевый МДФ.\n    *   Подстолье и ножки стола: Массив дерева (или высококачественный композитный материал под дерево).\n    *   Каркасы стульев: Массив дерева (или высококачественный композитный материал под дерево).\n    *   Обивка стульев: Велюр/Бархат.\n*   **Цвет:**\n    *   Столешница: Глянцевый белый.\n    *   Каркас стола и стульев: Светлый алебастр / Слоновая кость (или белый с легким серым оттенком).\n    *   Обивка стульев: Темно-серый / Графит.\n    *   Кант столешницы: Серебристый.\n*   **Особенности:**\n    *   Раскладная столешница (виден центральный стык).\n    *   Декоративный фриз подстолья с вертикальным рифлением.\n    *   Изящные резные точеные ножки стола и стульев.\n    *   Эргономичные изогнутые спинки стульев.\n    *   Мягкие сиденья и спинки стульев для дополнительного комфорта."},{"id":"VIqYgsiZSrDFcq2tjhWi","name":"Мария","price":99000,"imageUrls":["https://label-com.ru/images/virtuemart/product/marija_4,2.jpg"],"category":"Кухни","originalUrl":"https://label-com.ru/katalog/kukhni-1/mariya-detail.html","createdAt":"2025-11-24T15:26:21.838Z","updatedAt":"2025-11-24T15:26:21.838Z","rating":0,"reviews":[],"details":{"dimensions":"","material":"","care":""},"description":"Представляем вашему вниманию кухонный гарнитур \"Мария\" – истинное воплощение утонченной элегантности и безупречного стиля, созданное для тех, кто ценит гармонию классики и современности. Это не просто мебель, это сердце вашего дома, где каждое утро начинается с вдохновения, а каждый вечер наполнен уютом. \"Мария\" излучает свет и простор, преображая любое пространство в оазис чистоты и спокойствия, приглашая насладиться каждым моментом, проведенным на кухне.\n\nДизайн гарнитура выполнен в лучших традициях неоклассического стиля, сочетающего в себе изысканные детали и функциональность. Благородные белые матовые фасады, украшенные деликатной фрезеровкой, придают особый шарм и объем. Золотистые акценты в фурнитуре и смесителе не только добавляют нотку роскоши, но и создают эффектный контраст, подчеркивая безупречность линий. Особое внимание привлекают стеклянные витрины с уникальным геометрическим переплетом, напоминающим узоры эпохи ар-деко, которые позволяют изящно демонстрировать любимую посуду или декор.\n\nСтолешница и стеновая панель в нежном светло-сером оттенке идеально дополняют общую палитру, обеспечивая практичность и долговечность. Их матовая, слегка текстурированная поверхность имитирует натуральный камень, добавляя интерьеру природной красоты и сдержанности. Завершают образ декоративные карнизы по верхнему периметру, придающие гарнитуру законченный и величественный вид. \"Мария\" — это продуманное модульное решение, где каждая деталь служит созданию идеальной атмосферы для кулинарных шедевров и теплых семейных встреч, объединяя в себе функциональность современной кухни и timeless-дизайн.\n\n### Техническая информация:\n\n*   **Тип:** Кухонный гарнитур / Модульная кухня.\n*   **Стиль:** Неоклассика / Современная классика.\n*   **Материал:**\n    *   Фасады: МДФ с фрезеровкой (матовое покрытие).\n    *   Столешница и стеновая панель: Искусственный камень / Кварцевый композит (светло-серый).\n    *   Корпус: ЛДСП (предположительно).\n    *   Фурнитура: Металл (ручки, смеситель).\n    *   Витрины: Стекло.\n*   **Цвет:**\n    *   Фасады: Белый матовый.\n    *   Столешница и стеновая панель: Светло-серый.\n    *   Фурнитура (ручки, смеситель): Золотой/латунь.\n*   **Особенности:**\n    *   Профилированные (фрезерованные) фасады.\n    *   Декоративные карнизы по верхнему краю.\n    *   Стеклянные витрины с дизайнерским геометрическим переплетом.\n    *   Встроенная бытовая техника (варочная панель, вытяжка).\n    *   Высокий шкаф-витрина со стеклянными полками.\n    *   Интегрированная мойка.\n    *   Элегантные золотистые акценты в фурнитуре."},{"id":"VMNOy7CNempvmQi4cl38","name":"Вивальди","price":181500,"imageUrls":["https://label-com.ru/images/virtuemart/product/vivaldi.png"],"category":"Спальни","originalUrl":"https://label-com.ru/katalog/spalni/vivaldi-detail.html","createdAt":"2025-11-24T15:26:21.824Z","updatedAt":"2025-11-24T15:26:21.824Z","rating":0,"reviews":[],"details":{"dimensions":"325 ятно приятной на ощупь и устойчивой к повседневному использованию. Диван украшен роскошной каретной стяжкой на спинке и боковых частях подлокотников, что не только придает ему изысканный вид, но и обеспечивает дополнительный объем и упругость. Контрастная декоративная отстрочка по контуру всех элементов подчеркивает строгие линии и безупречное качество исполнения.\n\nОсобое внимание привлекают изящные деревянные акценты. Изогнутые элементы из натурального дерева теплых медовых оттенков элегантно обрамляют основание дивана и изгибы его подлокотников, добавляя нотку природной теплоты и утонченности. Кресла, с их высокими, эргономичными спинками и комфортными подлокотниками, завершают ансамбль, предлагая идеальное место для уединения или задушевных бесед. Их стройные конические ножки из того же теплого дерева легко приподнимают конструкцию над полом, придавая ей легкость и воздушность.\n\nКомплект \"БРУНО\" создан для тех, кто ценит не только эстетику, но и непревзойденный комфорт. Каждая подушка, будь то интегрированная в дизайн спинки или дополнительная декоративная, приглашает к расслаблению. Это больше, чем просто мебель – это обещание уюта, место для встреч с близкими и оазис спокойствия, который наполнит ваш дом гармонией и утонченным стилем.\n\n---\n\n**Техническая информация:**\n\n*   **Тип:** Комплект мягкой мебели для гостиной (диван и два кресла).\n*   **Материал:**\n    *   Обивка: Высококачественная экокожа или плотный износостойкий текстиль с матовой фактурой.\n    *   Каркас и декоративные элементы: Натуральное дерево с теплым оттенком.\n*   **Цвет:**\n    *   Обивка: Глубокий серый (дымчатый / графитовый).\n    *   Деревянные элементы: Теплый коричневый древесный оттенок.\n    *   Отстрочка: Светло-серая / бежевая (контрастная).\n*   **Особенности:**\n    *   Каретная стяжка (пуговицы) на спинке дивана и внешней стороне подлокотников.\n    *   Контрастная декоративная отстрочка по контуру всех элементов.\n    *   Изогнутые деревянные элементы вдоль осно
