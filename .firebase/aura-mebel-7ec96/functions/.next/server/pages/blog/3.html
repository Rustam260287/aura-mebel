т общую композицию, добавляя теплоты и подчеркивая его уникальный дизайн. Высокие эргономичные спинки кресел обещают исключительный комфорт и поддержку, а мягкие декоративные подушки завершают образ, предлагая дополнительное удобство. \"МЕРИДИАН 2\" — это не просто мебель, это приглашение окунуться в атмосферу гармонии и спокойствия, где стиль встречается с функциональностью, создавая идеальное пространство для жизни.\n\n### Техническая информация:\n\n*   **Тип:** Комплект мягкой мебели для гостиной (диван и два кресла).\n*   **Материал обивки:** Текстиль (визуально напоминает микровелюр или замшу).\n*   **Материал каркаса/опор:** Массив дерева (ножки, декоративные вставки, основание дивана).\n*   **Цвет обивки:** Темно-серый (антрацит).\n*   **Цвет отстрочки:** Светло-серый / Белый (контрастная).\n*   **Цвет деревянных элементов:** Темно-коричневый (оттенок ореха).\n*   **Особенности:**\n    *   Выразительная контрастная декоративная отстрочка.\n    *   Эргономичные, рельефные спинки и подлокотники.\n    *   Уникальный деревянный каркас-основание дивана с декоративными боковыми вставками.\n    *   Элегантные конические деревянные ножки у кресел.\n    *   Кресла с высокими фигурными спинками (\"ушами\").\n    *   Декоративные подушки в комплекте (для дивана и кресел).\n    *   Стиль: Современный с элементами классики."},{"id":"5KC3zQesteddE1FuOOKf","name":"Стул Вика","price":7000,"category":"Гостиная","originalUrl":"https://label-com.ru/katalog/gostinaya/stul-vika-detail.html","createdAt":"2025-11-24T15:26:21.850Z","updatedAt":"2025-11-24T15:26:21.850Z","rating":0,"reviews":[],"details":{"dimensions":"","material":"","care":""},"imageUrls":["https://label-com.ru/images/virtuemart/product/stol_vika9.jpg"],"description":"## Стул Вика: Икона Изысканности в Вашем Интерьере\n\nПозвольте представить \"Стул Вика\" — истинное воплощение роскоши и безупречного стиля, созданное, чтобы стать центральным акцентом вашей столовой или гостиной. Этот стул, представленный в составе элегантной обеденной группы, моментально приковывает взгляд своей величественной осанкой и безукоризненными линиями. Он идеально вписывается в концепцию современной классики с элементами гламура, где каждая деталь продумана для создания атмосферы утонченности и комфорта.\n\nОбивка \"Стула Вика\" выполнена из благородного велюра глубокого антрацитового или графитового оттенка, который переливается при свете, добавляя интерьеру динамизма и тактильной привлекательности. Спинка стула украшена изысканной каретной стяжкой, формирующей ромбовидный узор с глубокими пуговицами, что является данью классическому стилю Честерфилд. Такая техника не только придает стулу объем и пышность, но и подчеркивает его статус, обещая непревзойденный уровень комфорта во время долгих застолий и приятных бесед.\n\nИзящные, слегка изогнутые ножки \"Стула Вика\" выполнены в чистом белом цвете, что создает выразительный контраст с темной обивкой и гармонично сочетается с общим светлым фоном интерьера. Эта цветовая гамма — безупречное решение для пространств, стремящихся к воздушности и свежести, но при этом сохраняющих торжественность. Общая композиция, дополненная глянцевым белым столом и мраморным полом, создает ощущение пространства, наполненного светом, чистотой и ненавязчивой роскошью, где каждый элемент подчеркивает высокий вкус владельца.\n\n\"Стул Вика\" — это не просто предмет мебели, это заявление о стиле. Он приглашает вас окунуться в мир, где красота встречается с функциональностью, а каждый ужин превращается в маленький праздник. Добавьте его в свой интерьер, и он наполнится аристократическим шармом и изысканной элегантностью, становясь настоящим магнитом для восхищенных взглядов.\n\n---\n\n### Техническая информация:\n\n*   **Тип:** Обеденный стул\n*   **Материал:** Велюровая обивка, каркас и ножки из дерева (с белым покрытием)\n*   **Цвет:** Темно-серый (обивка), белый (ножки)\n*   **Особенности:** Высокая спинка с глубокой каретной стяжкой (пуговицы), фигурная форма спинки, изогнутые ножки."},{"id":"5kPraHjqToU12Dm7RSSm","name":"Борнео","price":175000,"imageUrls":["https://label-com.ru/images/virtuemart/product/borneo2.jpeg"],"category":"Мягкая мебель","originalUrl":"https://label-com.ru/katalog/myagkaya-mebel/borneo-detail.html","rating":0,"reviews":[],"createdAt":{"_seconds":1764053133,"_nanoseconds":131000000},"description":"Добро пожаловать в мир утонченного комфорта с коллекцией \"Борнео\" от Aura – воплощением элегантности и безупречного стиля, созданным для тех, кто ценит гармонию в каждой детали. Этот изысканный комплект мягкой мебели приглашает вас окунуться в атмосферу спокойствия и уюта, где современный дизайн идеально сочетается с классическими элементами, формируя пространство, наполненное светом и теплом. \"Борнео\" — это не просто мебель, это центральный акцент вашей гостиной, обещающий незабываемые моменты отдыха.\n\nДизайн коллекции \"Борнео\" отличают плавные, обтекаемые линии, которые придают ему воздушность и легкость. Мягкие, округлые подлокотники дивана и кресел создают ощущение обволакивающего комфорта, а их пропорции продуманы до мелочей, чтобы обеспечить идеальную эргономику. Обивка выполнена из высококачественной, приятной на ощупь текстурированной ткани в благородном светло-бежевом оттенке, которая легко вписывается в любую цветовую палитру интерьера и служит идеальным фоном для ярких акцентов. Контрастная темно-коричневая окантовка по периметру дивана деликатно подчеркивает его форму, добавляя глубины и завершенности образу.\n\nКресла из комплекта \"Борнео\" являются настоящим произведением искусства, где тепло натурального дерева встречается с современными деталями. Их каркас выполнен из темно-коричневого дерева с красивой текстурой, что придает каждому изделию особую прочность и визуальный вес. Изящные деревянные ножки завершаются стильными металлическими накладками серебристого цвета, которые вносят нотку современного шика и легкости. В качестве декоративных элементов на диване представлены подушки сочного терракотового оттенка, а также одна уникальная подушка с абстрактным, многоцветным узором, которая добавляет динамичности и художественной выразительности всему ансамблю.\n\n\"Борнео\" идеально впишется в интерьер в стиле современная классика, контемпорари или эклектика, создавая гармоничное и функциональное пространство. Этот комплект обещает стать любимым местом для семейных встреч, дружеских бесед или спокойного вечера наедине с собой. Он излучает спокойствие и уверенность, приглашая расслабиться и насладиться моментом, делая ваш дом настоящей гаванью уюта и стиля.\n\n***\n\n### Техническая информация:\n\n*   **Тип:** Мягкая мебель для гостиной / Комплект диван и кресла\n*   **Комплектация:** Диван 3-местный, 2 кресла 1-местных\n*   **Материал обивки:** Текстурированная мебельная ткань (вероятно, рогожка или похожий фактурный материал)\n*   **Материал каркаса/акцентов:** Натуральное дерево (видимые элементы кресел, подлокотники), металлические декоративные вставки (на ножках кресел), основание дивана предположительно из ДСП/МДФ с тканевой обтяжкой и декоративной вставкой.\n*   **Цвет обивки:** Светло-бежевый / Греж (светлый серо-бежевый)\n*   **Цвет деревянных элементов:** Темно-коричневый\n*   **Цвет металлических акцентов:** Серебристый / Хром\n*   **Цвет декоративной окантовки дивана:** Темно-коричневый\n*   **Дополнительные элементы:** Декоративные подушки в терракотовом оттенке (2 шт.) и одна многоцветная подушка с абстрактным узором.\n*   **Особенности:** Плавные, округлые формы, широкие подлокотники, видимый деревянный каркас у кресел, металлические декоративные накладки на ножках кресел, контрастная декоративная отделка по периметру нижней части дивана, съемные подушки сидений и спинок."},{"id":"60USAWEahuGOrrRV7oyg","name":"Gucci Premium","price":159500,"category":"Мягкая мебель","originalUrl":"https://label-com.ru/katalog/myagkaya-mebel/gucci-premium-detail.html","createdAt":"2025-11-24T15:26:21.843Z","updatedAt":"2025-11-24T15:26:21.843Z","rating":0,"reviews":[],"details":{"dimensions":"","material":"","care":""},"imageUrls":["https://label-com.ru/images/virtuemart/product/gucci-premium.jpg"],"description":"**Gucci Premium**\n\nПредставляем вашему вниманию \"Gucci Premium\" – изысканный ансамбль мягкой мебели, который мгновенно преобразит любое пространство, наполнив его атмосферой непревзойденной роскоши и современного шика. Этот комплект, состоящий из элегантного дивана и двух уютных кресел, воплощает в себе гармоничное сочетание утонченного дизайна и безупречного комфорта, становясь центральным акцентом интерьера. Его стиль уверенно балансирует между современным гламуром и вневременной классикой, создавая ощущение эксклюзивности и высокого вкуса.\n\nОсновой великолепия \"Gucci Premium\" является его обивка из благородного велюра глубокого темно-серого, почти угольного, оттенка. Этот материал не только невероятно приятен на ощупь, но и играет со светом, раскрывая свою глубину и фактуру, что придает мебели дополнительный объем и выразительность. Дополняют эту роскошь сверкающие акценты из полированного металла золотого цвета. Именно они придают комплекту особый шик: от уникальных изогнутых опор подлокотников дивана, плавно переходящих в ножки, до изящных миниатюрных опор кресел и тонкой декоративной полосы по периметру дивана.\n\nДизайн каждой детали продуман до мелочей, чтобы подчеркнуть статус и изысканность. Спинки дивана и кресел украшает элегантная вертикальная канальная прострочка, которая добавляет утонченности и визуально вытягивает силуэт, в то время как кресла обволакивают своей округлой формой, обещая максимальный уют. В комплекте идут мягкие декоративные подушки, а центральная подушка дивана выделяется особо, благодаря стильной золотой горизонтальной вставке, гармонично дополняющей общую цветовую палитру. На передней панели дивана расположена аккуратная золотистая эмблема, подтверждающая эксклюзивность модели.\n\n\"Gucci Premium\" — это не просто мебель, это заявление о стиле, показатель статуса и стремление к совершенству в каждой детали. Он идеально впишется в интерьеры, где ценятся элегантность, современный дизайн и высокий уровень комфорта, будь то роскошная гостиная, стильный холл или эксклюзивная зона отдыха, создавая неповторимую атмосферу уюта и благополучия.\n\n---\n\n**Техническая информация:**\n\n*   **Тип:** Диванная группа (3-местный диван и 2 кресла)\n*   **Материал обивки:** Высококачественный велюр (или аналог мебельной ткани с бархатистой фактурой)\n*   **Материал каркаса/декоративных элементов:** Металл (для видимых элементов и ножек)\n*   **Цвет обивки:** Темно-серый (угольный)\n*   **Цвет декоративных элементов/ножек:** Золотой (полированный)\n*   **Особенности:**\n    *   Вертикальная канальная прострочка на спинках дивана и кресел\n    *   Декоративные U-образные металлические элементы золотого цвета на подлокотниках дивана, интегрированные в ножки\n    *   Металлические ножки золотого цвета у кресел\n    *   В комплекте декоративные подушки, одна из которых с золотой горизонтальной вставкой\n    *   Декоративный металлический кант золотого цвета по нижней части дивана\n    *   Эмблема/логотип золотого цвета на передней панели дивана"},{"id":"6CNO1CTsw0ZW2B4anUcY","name":"PRADA","price":154000,"category":"Мягкая мебель","originalUrl":"https://label-com.ru/katalog/myagkaya-mebel/prada-detail.html","createdAt":"2025-11-24T15:26:21.844Z","updatedAt":"2025-11-24T15:26:21.844Z","rating":0,"reviews":[],"details":{"dimensions":"","material":"","care":""},"imageUrls":["https://label-com.ru/images/virtuemart/product/prada.jpg"],"description":"Добро пожаловать в мир безупречной элегантности с комплектом мебели \"PRADA\" от \"Aura\". Это не просто диванная группа, это воплощение изысканного вкуса, где современная классика встречается с роскошью, создавая атмосферу уюта и величия. Каждый элемент этого ансамбля тщательно продуман, чтобы превратить вашу гостиную в оазис стиля и комфорта, достойный самых высоких похвал.\n\nЦентральное место в коллекции занимают диван и два изящных кресла, обитые невероятно приятным на ощупь велюром нежного кремового оттенка. Особый шарм придает ромбовидная стежка, украшающая спинки, подлокотники и декоративные подушки, создавая эффект дорогой каретной стяжки и добавляя глубины текстуре. Изгибы мягких подлокотников акцентированы элегантными золотыми медальонами с витиеватым орнаментом, а по периметру основания пролегает тонкая золотая линия, которая идеально гармонирует с точеными ножками, выполненными в благородном золотом цвете.\n\nДовершает композицию уникальный круглый журнальный столик, чья столешница имитирует благородный белый мрамор с изящными серыми прожилками. Его основание — это настоящее произведение искусства: скульптурная конструкция из множества вертикальных элементов с золотистым, слегка состаренным покрытием, придающая столику неповторимый шарм и индивидуальность. Этот комплект \"PRADA\" станет не просто мебелью, а знаковым элементом вашего интерьера, говорящим о вашей любви к красоте и несомненном чувстве стиля.\n\nВ целом, комплект \"PRADA\" от \"Aura\" излучает спокойную роскошь и утонченность. Нейтральная палитра позволяет легко интегрировать его в различные дизайнерские решения, от неоклассических до более современных интерьеров с элементами шика. Он приглашает расслабиться в объятиях мягких подушек, насладиться тишиной или приятной беседой, создавая идеальное пространство для жизни, где каждая деталь дышит изяществом.\n\n---\n\n**Техническая информация:**\n\n*   **Тип:** Диванная группа (включает трехместный диван, два кресла, журнальный столик)\n*   **Материал:** Обивка – велюр/бархатная ткань; Каркас – массив дерева; Декоративные элементы и ножки – дерево с золотым покрытием; Столешница журнального столика – искусственный мрамор; Опора журнального столика – металл/дерево с золотым покрытием\n*   **Цвет:** Обивка – светло-бежевый (кремовый); Декоративные элементы и ножки – золотой; Столешница – белый с серыми прожилками\n*   **Особенности:** Ромбовидная (каретная) стежка на спинках, подлокотниках и подушках; Декоративные золотые медальоны на подлокотниках; Элегантные точеные ножки; Журнальный столик с мраморной столешницей и уникальной скульптурной основой"},{"id":"6XKW4xAN49kG4FVKWcKU","name":"Gucci","price":148500,"category":"Мягкая мебель","originalUrl":"https://label-com.ru/katalog/myagkaya-mebel/gucci-detail.html","createdAt":"2025-11-24T15:26:21.840Z","updatedAt":"2025-11-24T15:26:21.840Z","rating":0,"reviews":[],"details":{"dimensions":"","material":"","care":""},"imageUrls":["https://label-com.ru/images/virtuemart/product/gucci.jpg"],"description":"Добро пожаловать в мир утонченного стиля и безупречного комфорта с коллектом мягкой мебели \"Gucci\" от Aura. Этот ансамбль, состоящий из роскошного трехместного дивана и двух элегантных кресел, призван стать центральным элементом вашей гостиной, мгновенно преобразив пространство в оазис современного шика. Вдохновленный последними тенденциями в дизайне, \"Gucci\" гармонично сочетает в себе изысканную эстетику и функциональность, создавая атмосферу уюта и респектабельности.\n\nОсновной тон коллекции задает благородный светло-серый оттенок обивки, выполненной из высококачественного велюра. Его мягкая, бархатистая текстура не только невероятно приятна на ощупь, но и придает мебели глубокий, обволакивающий вид, который меняет оттенки при различном освещении. Этот нейтральный, но при этом выразительный цвет легко интегрируется в любую цветовую палитру интерьера, позволяя акцентам играть главную роль. Декоративные подушки вносят динамику: от классических вертикальных полос в бирюзово-кремовых тонах до современного геометрического орнамента в черно-бело-серых зигзагах, добавляя изысканный контраст и индивидуальность.\n\nОсобое внимание привлекают детали, которые делают коллекцию \"Gucci\" по-настоящему уникальной. Изящные металлические акценты с зеркальным блеском, будь то стройные боковые вставки на диване или оригинальные ножки кресел, выполненные в виде нанизанных хромированных сфер, подчеркивают современный характер мебели и её стремление к роскоши. Спинки и основания дивана и кресел украшены вертикальной канальной стежкой, создающей ритмичный узор и дополнительный объем, а также обеспечивающей превосходную поддержку. Этот комплект — не просто мебель, это заявление о вашем вкусе и стремлении к совершенству.\n\nКоллекция \"Gucci\" создана для тех, кто ценит гармонию формы, материалов и функциональности. Она идеально впишется в интерьеры в стиле неоклассики, современной элегантности или глэм-модерна, добавив им нотки эксклюзивности и гостеприимства. С ним ваша гостиная превратится в идеальное место для вечерних бесед, уютного отдыха или приема гостей, всегда оставляя неизгладимое впечатление благодаря своему безупречному стилю и комфорту.\n\n---\n\n### Техническая информация:\n\n*   **Тип:** Гостиный гарнитур (комплект мягкой мебели)\n*   **Состав комплекта:** Трехместный диван, два одноместных кресла.\n*   **Материал обивки:** Высококачественный велюр (бархатистая мебельная ткань).\n*   **Материал каркаса:** Предположительно дерево, МДФ.\n*   **Материал опор и декоративных элементов:** Полированный металл (хромированный, серебристый оттенок).\n*   **Цвет основной обивки:** Светло-серый.\n*   **Цвет акцентных подушек:** Бирюзовый/светло-синий, бежевый/кремовый (полосы); черный, белый, серый (геометрический узор \"зигзаг\"); светло-серый (вертикальная стежка).\n*   **Особенности:**\n    *   Вертикальная канальная стежка (риббинг) на спинках и основаниях дивана и кресел.\n    *   Декоративные боковые элементы из полированного металла на подлокотниках дивана.\n    *   Уникальные округлые ножки кресел с шарообразными элементами из полированного металла.\n    *   Изящные металлические ножки дивана.\n    *   Стилизованная металлическая эмблема/логотип на боковине дивана.\n    *   В комплект входят декоративные подушки (5 для дивана, по 1 для каждого кресла)."},{"id":"7tkckLd22xR2qvbxaZL0","name":"тв тумба Сэнди","price":15000,"category":"Гостиная","originalUrl":"https://label-com.ru/katalog/gostinaya/tv-tumba-sendi-detail.html","createdAt":"2025-11-24T15:26:21.850Z","updatedAt":"2025-11-24T15:26:21.850Z","rating":0,"reviews":[],"details":{"dimensions":"","material":"","care":""},"imageUrls":["https://label-com.ru/images/virtuemart/product/tv-tumba-sendi.png"],"description":"Добро пожаловать в мир утонченного дизайна и безупречной функциональности с ТВ тумбой \"Сэнди\" от \"Aura\". Это не просто предмет мебели, а центральный элемент вашего современного интерьера, созданный для того, чтобы гармонично дополнить пространство и подчеркнуть ваш безупречный вкус. Тумба \"Сэнди\" идеально вписывается в эстетику минимализма с элементами скандинавского стиля, где каждая деталь продумана для комфорта и визуальной легкости. Ее чистые линии и лаконичный силуэт мгновенно преображают комнату, создавая атмосферу спокойствия и современного шика.\n\nВизуальный акцент модели \"Сэнди\" строится на изящном контрасте текстур и оттенков. Гладкая, матовая поверхность боковых стенок и столешницы, выполненная в благородном светло-сером цвете, создает ощущение простора и свежести. Она идеально гармонирует с фасадами выдвижных секций, которые демонстрируют выразительную текстуру светлого натурального дерева. Этот дуэт привносит в интерьер теплоту и естественность, делая тумбу не только функциональной, но и невероятно привлекательной. Эргономичные ручки в цвете темной бронзы или меди тонко дополняют композицию, добавляя изысканный металлический акцент.\n\nТВ тумба \"Сэнди\" обладает продуманной конструкцией, предлагая вместительное пространство для хранения мультимедийной аппаратуры, книг или декоративных элементов. Ее низкий профиль и вытянутая форма идеально подходят для размещения широкоформатных телевизоров, а три просторные секции обеспечивают порядок и скрывают все лишнее от посторонних глаз. Устойчивые и элегантные черные металлические ножки не только гарантируют надежность конструкции, но и придают тумбе легкий индустриальный шарм, приподнимая ее над полом и визуально облегчая общий облик. \"Сэнди\" — это воплощение современной эстетики, где каждая линия служит цели, а каждый материал работает на создание ощущения гармонии и стиля.\n\n***\n\n### Техническая информация:\n\n*   **Тип:** ТВ тумба\n*   **Стиль:** Современный, Минимализм, Скандинавский\n*   **Материал:** Высококачественная ламинированная ДСП/МДФ (для каркаса и фасадов), Металл (для ножек)\n*   **Цвет:** Светло-серый (каркас и столешница), Натуральный древесный (светло-коричневый, фасады), Черный (ножки), Бронзовый/медный оттенок (ручки)\n*   **Количество секций:** 3 (с выдвижными ящиками или откидными дверцами)\n*   **Особенности:** Длинная низкая конструкция, Контраст гладких и древесных текстур, Элегантные металлические ручки, Угловые металлические ножки черного цвета."},{"id":"8SEboWplAGWDWBcV0bjQ","name":"НиццаLuxury","price":132000,"imageUrls":["https://label-com.ru/images/virtuemart/product/nitstsaluxury.png"],"category":"Мягкая мебель","originalUrl":"https://label-com.ru/katalog/myagkaya-mebel/nitstsaluxury-detail.html","rating":0,"reviews":[],"createdAt":{"_seconds":1764053475,"_nanoseconds":331000000},"description":"Добро пожаловать в мир утонченной роскоши с коллекцией \"НиццаLuxury\" от Aura. Представьте себе идеальное воплощение современного гламура, где классические формы обретают новое дыхание благодаря изысканным деталям и безупречному стилю. Эта мебельная группа, состоящая из элегантного дивана и двух уютных кресел, призвана стать сердцем вашего жилого пространства, наполняя его атмосферой спокойствия, достоинства и непревзойденного комфорта. Она гармонично впишется в интерьеры в стиле современной классики, ар-деко или нео-гламура, создавая поистине запоминающийся ансамбль.\n\nКаждая деталь коллекции \"НиццаLuxury\" тщательно продумана для создания визуального и тактильного наслаждения. Обивка из нежного, словно облако, велюра приковывает взгляд своим благородным блеском и обещает несравненную мягкость при каждом прикосновении. Пастельный лавандово-серый оттенок ткани создает ощущение воздушности и легкости, гармонично контрастируя с яркими акцентами. Особое внимание привлекают вертикальные объемные складки (флютинг) на внешних сторонах подлокотников кресел и спинки дивана, добавляющие фактурности и глубины дизайну.\n\nРоскошные золотые элементы выступают в качестве изящной окантовки, плавно подчеркивая изогнутые линии подлокотников и завершая облик мебели. Металлические основания и геометрические ножки дивана, выполненные в том же блестящем золотом цвете, придают конструкции легкость и одновременно внушительность, отражая свет и добавляя пространству сияния. В комплекте с мебелью идут стильные декоративные подушки, которые разнообразят текстуру и добавляют функциональности: от гладких с золотой полосой до мягких с тонкой вертикальной стежкой, и даже одна с эффектным пушистым покрытием, создающим дополнительный уют.\n\n\"НиццаLuxury\" – это не просто мебель, это манифест изысканного вкуса и стремления к совершенству. Она создает атмосферу безмятежного уединения и изящных приемов, где каждый момент становится особенным. Позвольте себе погрузиться в мир, где красота встречается с функциональностью, а каждая линия и каждый оттенок говорят о безупречном качестве и глубоком понимании современного дизайна.\n\n---\n\n**Техническая информация:**\n\n*   **Тип:** Гостиная группа (диван 3-местный, 2 кресла)\n*   **Стиль:** Современная классика, гламур, ар-деко\n*   **Материал обивки:** Велюр / Бархат\n*   **Материал акцентов/ножек:** Металл\n*   **Цвет обивки:** Нежный лавандово-серый / Светлый серо-голубой\n*   **Цвет металлических элементов:** Золотой\n*   **Особенности:**\n    *   Вертикальная стежка (флютинг/гофре) на внешних сторонах подлокотников и спинки дивана.\n    *   Золотистый металлический кант/окантовка по контуру подлокотников.\n    *   Геометрические золотые металлические ножки у дивана.\n    *   Сплошное золотое металлическое основание у кресел.\n    *   Декоративные подушки в комплекте (гладкие с золотой полосой, с вертикальной стежкой, с пушистой фактурой).\n    *   Мягкие, округлые формы подлокотников."},{"id":"8TAzZVdOg84YAqBDkxr2","name":"MOON FAMILY","price":162400,"category":"Мягкая мебель","originalUrl":"https://label-com.ru/katalog/myagkaya-mebel/moon-family-detail.html","createdAt":"2025-11-24T15:26:21.843Z","updatedAt":"2025-11-24T15:26:21.843Z","rating":0,"reviews":[],"details":{"dimensions":"","material":"","care":""},"imageUrls":["https://label-com.ru/images/virtuemart/product/MOON3.jpeg"],"description":"Добро пожаловать в мир безупречного комфорта и современного дизайна с мебелью \"MOON FAMILY\" от Aura. Взгляните на эту коллекцию, где каждая деталь пропитана идеей мягкости, уюта и гармонии. Перед вами не просто мебель, а настоящая ода плавным линиям и приглашению к расслаблению. Стиль \"MOON FAMILY\" идеально вписывается в концепцию современного минимализма с элементами скандинавского уюта, где функциональность сочетается с эстетикой и безмятежностью.\n\nКоллекция представлена роскошным модульным диваном и двумя обволакивающими креслами, каждый элемент которых словно создан для нежных объятий. Обивка выполнена из высококачественного текстиля с деликатным, почти бархатистым на ощупь ворсом, что придает ей особую тактильность и мягкое свечение под любым углом. Оттенок мебели — это изысканный светло-бежевый или \"грейдж\", который легко интегрируется в любую цветовую палитру интерьера, создавая ощущение простора и света. В сочетании с небольшими, светлыми, округлыми ножками дивана, эта коллекция кажется невесомой, словно парящей над полом.\n\n\"MOON FAMILY\" — это идеальное решение для тех, кто ценит не только внешний вид, но и непревзойденный комфорт. Пышные, закругленные формы, низкая посадка и объемные подушки спинки и сиденья приглашают погрузиться в атмосферу полного расслабления. Эргономичные, мягкие подлокотники на диване и обтекаемые силуэты кресел обеспечивают оптимальную поддержку, а съемные декоративные подушки с фактурной горизонтальной стежкой добавляют нотку домашнего тепла и уюта, контрастируя с гладкой основной обивкой. Эта мебель станет центром притяжения в вашей гостиной, собирая вокруг себя самых близких.\n\nПозвольте \"MOON FAMILY\" наполнить ваш дом атмосферой спокойствия и современного шика. Она не просто украшает пространство, она преображает его, делая каждый момент, проведенный дома, незабываемым. Откройте для себя идеальное сочетание утонченной эстетики и исключительного комфорта, которое прослужит вам долгие годы, оставаясь актуальным и любимым.\n\n---\n\n**Техническая информация:**\n\n*   **Тип:** Комплект мягкой мебели (модульный диван и два кресла)\n*   **Материал:** Мягкая текстильная обивка (вероятно, плюш, микровелюр или букле с коротким ворсом), каркас (скрыт), ножки (светлое дерево или качественный пластик).\n*   **Цвет:** Светло-бежевый / Грейдж (нейтральный серо-бежевый), кремовый (подушки).\n*   **Особенности:**\n    *   Закругленные, обтекаемые формы без острых углов.\n    *   Модульная конструкция дивана (предположительно, из двух секций).\n    *   Низкая посадка.\n    *   Мягкие, широкие подлокотники на диване.\n    *   Декоративные подушки с горизонтальной ребристой фактурой на креслах.\n    *   Минималистичные, округлые, светлые ножки (видно только на диване).\n    *   Обволакивающий, эргономичный дизайн кресел."},{"id":"8lq3O4YjowZkaFEuviyH","name":"Оливия","price":99000,"category":"Кухни","originalUrl":"https://label-com.ru/katalog/kukhni-1/oliviya-1-detail.html","createdAt":"2025-11-24T15:26:21.839Z","updatedAt":"2025-11-24T15:26:21.839Z","rating":0,"reviews":[],"details":{"dimensions":"","material":"","care":""},"imageUrls":["https://label-com.ru/images/virtuemart/product/oliviya-1.jpg"],"description":"Представляем вашему вниманию \"Оливия\" — воплощение утонченности и роскоши, созданное для тех, кто ценит безупречный стиль и функциональность в каждой детали. Этот изысканный ансамбль гармонично сочетает в себе черты современной классики и неоклассики, где величественная элегантность прошлого встречается с чистыми линиями и инновационными решениями настоящего. \"Оливия\" — это не просто мебель, это сердце вашего дома, призванное вдохновлять на кулинарные шедевры и уютные семейные вечера.\n\nКухонный гарнитур \"Оливия\" впечатляет своим благородным кремово-бежевым оттенком, который служит идеальным фоном для выразительных золотых акцентов. Фасады мебели украшены уникальными элементами: часть дверей имеет тонкую вертикальную или диагональную рифленую текстуру, а некоторые панели дополнены изящными золотыми линейными вставками, формирующими динамичные геометрические узоры. Эти детали, в сочетании с фигурными ручками под золото, придают гарнитуру особую изысканность. Довершает картину роскошная столешница и фартук из натурального камня с глубоким темно-коричневым оттенком и эффектными светлыми прожилками, создающими богатый, глянцевый контраст.\n\nДополняет великолепие кухонной зоны элегантная обеденная группа. Круглый стол на массивной, точеной центральной опоре из темного дерева приглашает к душевным беседам. В тон к столу подобраны стулья с прочными деревянными каркасами и мягкой обивкой спинки и сиденья. Светло-бежевый текстиль сидений с утонченным ромбовидным узором придает им дополнительный комфорт и стиль, перекликаясь с общей светлой палитрой интерьера. Общая атмосфера, создаваемая \"Оливией\", наполняется теплом, уютом и ощущением эксклюзивного комфорта, подчеркнутого каждой деталью, от богатого настенного декора до величественной люстры.\n\n\"Оливия\" — это продуманное до мелочей решение для тех, кто ищет не просто мебель, а полноценный дизайнерский концепт, способный преобразить пространство, наполнив его аристократическим шармом и современным удобством. Этот гарнитур идеально впишется в интерьеры, стремящиеся к балансу между классической роскошью и актуальными трендами, создавая поистине незабываемый образ вашего дома.\n\n---\n\n**Техническая информация:**\n\n*   **Тип:** Кухонный гарнитур, Обеденная группа (стол и стулья)\n*   **Материал:**\n    *   Фасады кухни: МДФ (вероятно, с эмалью или пленкой), с декоративными элементами.\n    *   Столешница и фартук: Натуральный камень (мрамор или гранит).\n    *   Обеденный стол и каркас стульев: Массив дерева (или высококачественный шпонированный МДФ).\n    *   Обивка стульев: Текстиль с узором.\n    *   Фурнитура и декор: Металл (золотого цвета).\n*   **Цвет:**\n    *   Фасады кухни: Кремово-бежевый / Светлый \"грейдж\".\n    *   Золотые акценты: Декоративные линейные вставки, ручки.\n    *   Столешница и фартук: Темно-коричневый с бежевыми и белыми прожилками.\n    *   Обеденный стол и каркас стульев: Темное дерево (венге или махагон).\n    *   Обивка стульев: Светло-бежевый.\n*   **Особенности:**\n    *   Фасады с выраженной вертикальной и диагональной рифленой (реечной) текстурой.\n    *   Декоративные золотые линейные вставки, образующие геометрические узоры на фасадах.\n    *   Фигурные металлические ручки золотого цвета.\n    *   Глянцевая поверхность столешницы и фартука.\n    *   Встроенная варочная панель.\n    *   Круглый обеденный стол на массивной точеной центральной опоре (ножке).\n    *   Мягкие стулья с высокой спинкой и сиденьем, обивка сиденья с ромбовидным узором.\n    *   Верхние шкафы с короной и золотым молдингом."},{"id":"8m8ietrzjnu4RFpg6qEv","name":"Ариана","price":165000,"category":"Спальни","originalUrl":"https://label-com.ru/katalog/spalni/ariana-detail.html","createdAt":"2025-11-24T15:26:21.820Z","updatedAt":"2025-11-24T15:26:21.820Z","rating":0,"reviews":[],"details":{"dimensions":"2480  x 1500  x 2050\n","material":"","care":""},"imageUrls":["https://label-com.ru/images/virtuemart/product/ariana.png"],"description":"Представляем \"Ариана\" от \"Aura\" – коллекцию, призванную преобразить вашу спальню в истинное святилище стиля и комфорта. Этот изысканный спальный гарнитур является воплощением современной классики с элементами ар-деко, где роскошная эстетика сочетается с безупречной функциональностью. \"Ариана\" создает атмосферу утонченной элегантности и спокойного достоинства, окутывая пространство мягкими отблесками света и благородными текстурами. Идеальное сочетание чистого белого, глубоких акцентных тонов и сияющих золотых деталей придает интерьеру особую выразительность и неповторимый шарм.\n\nЦентральным элементом коллекции выступает величественная кровать, притягивающая взгляд своим высоким мягким изголовьем. Оно обито высококачественным велюром глубокого шоколадного или сливового оттенка, который дарит ощущение мягкости и роскоши. Уникальная многогранная или ромбовидная стежка придает изголовью объем и динамичную структуру, а тонкий золотистый кант по периметру подчеркивает его изысканный контур, превращая в настоящее произведение мебельного искусства. Чистое белое основание кровати создает воздушный контраст, поддерживая общую гармонию дизайна.\n\nГарнитур дополняют элегантные прикроватные тумбы и грациозный туалетный столик, выполненные в единой стилистической концепции. Их глянцевые белые фасады с деликатной вертикальной текстурой отражают свет, визуально расширяя пространство и добавляя ему свежести. Каждый элемент украшен изящными золотыми ножками и акцентными круглыми ручками, а зеркальные вставки на фасадах прикроватных тумб добавляют глубины и блеска. Туалетный столик с большим зеркалом и компактным, но невероятно стильным пуфом, обитым в тон изголовья кровати, формирует идеальный уголок для ухода за собой.\n\nЗавершает ансамбль \"Ариана\" внушительный шестидверный шкаф, который не только обеспечивает обширное пространство для хранения, но и является важной частью декоративной композиции. Его фасады представляют собой чередование глянцевых белых секций с тонкой вертикальной фрезеровкой и больших зеркальных панелей, создающих игру света и отражений и визуально увеличивающих комнату. Золотые круглые ручки на всех дверцах служат последним штрихом, объединяя все компоненты гарнитура в единое целое, готовое наполнить вашу спальню атмосферой роскоши, комфорта и безупречного вкуса.\n\nТехническая информация:\n*   **Тип:** Спальный гарнитур (Комплект: двуспальная кровать, 2 прикроватные тумбы, 6-дверный шкаф, туалетный столик с зеркалом, пуф)\n*   **Материал:**\n    *   Каркасы и фасады: МДФ / ЛДСП (белый, глянцевое/лакированное покрытие)\n    *   Обивка: Велюр / Бархат (изголовье кровати, пуф)\n    *   Декоративные элементы: Металл (золотой/латунный оттенок), Зеркало\n*   **Цвет:** Белый (основной), Темно-коричневый / Сливовый (обивка), Золотой (акценты)\n*   **Особенности:**\n    *   Высокое мягкое изголовье кровати с геометрической (ромбовидной/граненой) стежкой и золотым металлическим кантом.\n    *   Зеркальные вставки на дверцах шкафа и фасадах прикроватных тумб.\n    *   Декоративные металлические элементы золотого цвета (ножки, ручки, рамки).\n    *   Глянцевая/лакированная отделка белых поверхностей.\n    *   Фасады шкафа, прикроватных тумб и туалетного столика с вертикальной текстурой/фрезеровкой.\n    *   Круглые золотые ручки на всех элементах."},{"id":"9HHLTzsNHrPIDP5bDbxM","name":"Ариэль","price":137500,"category":"Мягкая мебель","originalUrl":"https://label-com.ru/katalog/myagkaya-mebel/ariel-1-detail.html","createdAt":"2025-11-24T15:26:21.849Z","updatedAt":"2025-11-24T15:26:21.849Z","rating":0,"reviews":[],"details":{"dimensions":"","material":"","care":""},"imageUrls":["https://label-com.ru/images/virtuemart/product/555.png"],"description":"Добро пожаловать в мир утонченной роскоши с \"Аура\"! Представляем диван «Ариэль» — воплощение элегантности и безупречного стиля, созданное для тех, кто ценит изысканность в каждой детали. Его дизайн легко интегрируется в интерьеры от современной классики до ар-деко, привнося нотки неповторимого шарма и благородства. Это не просто диван, а центральный элемент, вокруг которого строится атмосфера комфорта и уюта вашей гостиной.\n\nОсобое внимание в модели «Ариэль» привлекает сочетание материалов и текстур. Мягкая, будто обволакивающая обивка из нежнейшего текстиля в оттенке пыльного голубого или светло-бирюзового цвета, напоминающего бархатный велюр, приглашает к безмятежному отдыху. Ее деликатный отблеск подчеркивает глубину цвета и богатство фактуры. Вертикальная канапе-стежка на спинке не только служит эффектным декоративным элементом, но и обеспечивает превосходную эргономику, создавая ощущение обволакивающей нежности и уюта.\n\nПодлокотники дивана «Ариэль» — это настоящее произведение искусства. Их внешняя сторона обтянута тем же мягким текстилем, но боковые панели выполнены из глянцевого материала глубокого темно-серого или черного цвета, украшенного завораживающим объемным рельефом в виде волн или радиальных линий. Этот динамичный узор придает дивану современную футуристическую нотку, эффектно контрастируя с классическими элементами. Изящный золотистый или бронзовый кант, обрамляющий подлокотники и основание дивана, подчеркивает геометрию форм и добавляет изделию благородный блеск, создавая ощущение завершенности и продуманной роскоши.\n\nДиван «Ариэль» способен трансформировать любое пространство, наполнив его атмосферой изысканности и эксклюзивности. Он идеально подойдет для создания лаунж-зоны в просторной гостиной, станет уютным уголком для вечерних чтений или местом для приема гостей, неизменно вызывая восхищение своим неповторимым стилем и высоким качеством исполнения. Дополнительная цилиндрическая подушка-валик на одном из подлокотников завершает образ, предлагая еще один уровень комфорта и удобства.\n\n---\n\n### Техническая информация:\n\n*   **Тип:** Диван\n*   **Материал:** Текстильная обивка с велюровым эффектом, глянцевые декоративные панели (на подлокотниках, вероятно, МДФ с лаковым покрытием), металлический декоративный кант.\n*   **Цвет:** Светло-бирюзовый / пыльно-голубой (обивка), темно-серый / черный (глянцевые панели подлокотников), золотистый / бронзовый (металлический кант).\n*   **Особенности:** Вертикальная канапе-стежка на спинке, объемный волнообразный рельеф на декоративных панелях подлокотников, декоративный металлический кант по периметру дивана и подлокотников, одна цилиндрическая подушка-валик в комплекте."},{"id":"A71PgAYYg7V2As6LPMKI","name":"Стол Голд","price":35000,"category":"Гостиная","originalUrl":"https://label-com.ru/katalog/gostinaya/stol-gold-detail.html","createdAt":"2025-11-24T15:26:21.847Z","updatedAt":"2025-11-24T15:26:21.847Z","rating":0,"reviews":[],"details":{"dimensions":"","material":"","care":""},"imageUrls":["https://label-com.ru/images/virtuemart/product/stol_gold.jpg"],"description":"Представляем вашему вниманию эксклюзивную обеденную группу \"Стол Голд\" от мебельного магазина \"Aura\" – воплощение несравненной роскоши и утонченного вкуса. Эта композиция, вдохновленная богатыми традициями классического стиля с элементами неоклассики и дворцовой эстетики, мгновенно преобразит любое пространство, наполнив его атмосферой торжественности и благородного шика. Каждый элемент здесь – это произведение искусства, созданное для тех, кто ценит безупречность и великолепие в каждой детали своего интерьера.\n\nСердцем коллекции выступает величественный стол, чья столешница притягивает взгляд своей многогранной формой и изысканным мраморным узором в элегантных серо-белых тонах. Глянцевая полировка поверхности придает ей завораживающий блеск, отражая свет и создавая ощущение воздушности. Монументальное основание стола, выполненное с поразительной детализацией, представляет собой колоннообразную опору, украшенную обильной ручной резьбой с витиеватыми завитками и классическими орнаментами. Все резные элементы покрыты благородным жемчужно-белым или светло-серым лаком с легкой серебристой патиной, что придает изделию аристократический и изысканный вид.\n\nОсобое внимание уделено стульям, которые идеально дополняют роскошь стола. Их изящные каркасы, вторящие стилистике стола, имеют плавно изогнутые ножки-кабриоль и роскошные резные спинки, украшенные сложными узорами. Обивка стульев выполнена из мягкого, глубокого велюра или бархата графитового оттенка, который придает им дополнительную глубину и тактильное наслаждение. Спинки стульев декорированы эффектной каретной стяжкой (капитоне), в каждую складку которой встроены сияющие декоративные пуговицы или кристаллы, добавляющие нотку гламура и мерцания.\n\nОбеденная группа \"Стол Голд\" – это не просто набор мебели, это приглашение к созданию интерьера, достойного королевских особ. Она идеально впишется в классические гостиные или столовые, придав им завершенный и по-нанастоящему люксовый вид. С ней каждое семейное торжество или дружеский ужин превратится в незабываемое событие, а ваш дом обретет неповторимый шарм и ощущение вечной красоты.\n\n---\n\n**Техническая информация:**\n*   **Тип:** Обеденная группа (стол и 6 стульев).\n*   **Стиль:** Классический, неоклассика, дворцовый.\n*   **Форма стола:** Прямоугольный с фацетированными (гранеными) углами.\n*   **Материал столешницы:** Искусственный или натуральный камень (имитация мрамора) с глянцевым лаковым покрытием.\n*   **Материал каркаса (стол и стулья):** Массив дерева или высокоплотный МДФ/композит с декоративной резьбой.\n*   **Материал обивки стульев:** Велюр / бархат.\n*   **Цвет каркаса:** Жемчужно-белый / светло-серый / слоновая кость с серебристой патиной.\n*   **Цвет обивки:** Графитовый / темно-серый.\n*   **Цвет столешницы:** Бело-серый мраморный узор.\n*   **Особенности:**\n    *   Изысканная декоративная резьба на каркасе стола и спинках стульев.\n    *   Массивная фигурная опора стола.\n    *   Каретная стяжка (капитоне) с декоративными пуговицами/кристаллами на спинках стульев.\n    *   Глянцевое лаковое покрытие всех деревянных элементов.\n    *   Изящные изогнутые (кабриоль) ножки стульев."},{"id":"Atkb6iqf8jhHkuNFck6w","name":"Santoni","price":128450,"category":"Мягкая мебель","originalUrl":"https://label-com.ru/katalog/myagkaya-mebel/santoni-detail.html","createdAt":"2025-11-24T15:26:21.845Z","updatedAt":"2025-11-24T15:26:21.845Z","rating":0,"reviews":[],"details":{"dimensions":"","material":"","care":""},"imageUrls":["https://label-com.ru/images/virtuemart/product/234.jpg"],"description":"Добро пожаловать в мир безупречного стиля и комфорта с мебельной коллекцией \"Santoni\" от Aura. Представляем вашему вниманию элегантный комплект мягкой мебели, который станет сердцем вашей гостиной, окутывая пространство атмосферой уюта и изысканности. Дизайн \"Santoni\" – это гармоничное слияние современной классики и винтажного шарма, созданное для тех, кто ценит вневременную эстетику и функциональность.\n\nКаждый элемент коллекции \"Santoni\" поражает своим глубоким, приглушенным оливковым оттенком, который придает мебели особую выразительность и благородство. Обивка выполнена из фактурной, износостойкой ткани, обладающей уникальным эффектом состаренности, что напоминает мягкую, выдержанную кожу или нубук, приглашая прикоснуться и ощутить ее нежность. Теплый контраст создает прочный деревянный каркас, выполненный из массива дерева насыщенного красновато-коричневого тона, чьи плавные линии и аккуратные ножки подчеркивают утонченность силуэта.\n\nДиван и кресла \"Santoni\" продуманы до мелочей, чтобы дарить непревзойденный комфорт. Пышные подушки сидений и спинок обещают расслабляющий отдых после долгого дня, а уникальная прострочка на валиках подлокотников дивана и на передней части основания кресел добавляет элегантности и структурности. Высокие спинки кресел обеспечивают отличную поддержку, превращая их в идеальное место для чтения или неспешной беседы. Дополнительные декоративные подушки с изысканным узором завершают образ, привнося нотку домашнего тепла.\n\nКоллекция \"Santoni\" не просто мебель, это приглашение к созданию интерьера, где каждый элемент говорит о вашем безупречном вкусе. Она с легкостью впишется как в классические, так и в более современные пространства, добавляя в них ощущение стабильности, спокойствия и природной красоты. Превратите вашу гостиную в оазис стиля и комфорта с \"Santoni\" – коллекцией, которая живет вне времени.\n\n---\n\n**Техническая информация:**\n\n*   **Тип:** Комплект мягкой мебели для гостиной (диван и два кресла).\n*   **Материал:**\n    *   **Обивка:** Фактурная износостойкая ткань с эффектом состаренности.\n    *   **Каркас/Ножки:** Массив дерева.\n*   **Цвет:**\n    *   **Обивка:** Глубокий оливковый / Приглушенный темно-зеленый.\n    *   **Деревянный каркас:** Насыщенный коричнево-красный (оттенок темного дерева).\n*   **Особенности:**\n    *   Высокие, эргономичные спинки кресел.\n    *   Декоративная вертикальная стежка на подлокотниках дивана и нижней части кресел.\n    *   Открытый деревянный каркас основания.\n    *   Пышные, съемные подушки сидений и спинок дивана.\n    *   Декоративные подушки с полосатым узором в комплекте.\n    *   Элегантный, современный классический стиль с винтажными элементами."},{"id":"BHJd4D6N1cJtJr2CFWKh","name":"Бренд Прямая","price":159500,"category":"Кухни","originalUrl":"https://label-com.ru/katalog/kukhni-1/brend-detail.html","createdAt":"2025-11-24T15:26:21.837Z","updatedAt":"2025-11-24T15:26:21.837Z","rating":0,"reviews":[],"details":{"dimensions":"4400  x 2270  x 550","material":"","care":""},"imageUrls":["https://label-com.ru/images/virtuemart/product/brend.png"],"description":"Добро пожаловать в мир безупречного стиля и функциональной роскоши с \"Бренд Прямая\" от мебельного магазина \"Aura\". Этот кухонный гарнитур, представленный в гармоничном ансамбле с обеденной зоной, является воплощением современной классики с элегантными нотками арт-деко. Он мгновенно преображает пространство, окутывая его атмосферой благородства и утонченности, создавая идеальное место как для кулинарных экспериментов, так и для уютных семейных трапез.\n\nВзгляд притягивает глубокий, теплый оттенок фасадов – изысканный бежевый, или скорее тауп, который дарит ощущение спокойствия и уюта. Особое очарование придают вертикальные фрезерованные панели, мастерски чередующиеся с гладкими рамочными элементами, каждый из которых подчеркнут тонким золотистым кантом. Эти золотые акценты, будь то изящные ручки-скобы или декоративные полосы, добавляют композиции шика и блеска, не перегружая ее, а лишь расставляя элегантные точки в безупречном дизайне.\n\nРабочая зона кухни впечатляет своим благородством: фартук и столешница выполнены в роскошной имитации белого мрамора с изящными серыми прожилками. Это решение придает интерьеру вечную классическую ноту и ощущение безупречной чистоты, а также обеспечивает практичность в повседневном использовании. Гарнитур демонстрирует продуманную эргономику с высокими шкафами для встроенной техники и обилием мест для хранения, обеспечивая идеальный порядок и функциональность.\n\nРядом с кухонным ансамблем расположилась обеденная группа, которая гармонично дополняет общую картину и приглашает к комфортным трапезам. Изящные стулья в глубоком черном велюре с характерной ромбовидной стежкой на спинках и тонкими золотыми ножками создают контрастный акцент, в то время как стол с белой столешницей и стильным металлическим основанием продолжает линию современного дизайна. \"Бренд Прямая\" от \"Aura\" – это не просто мебель, это целостное решение для тех, кто ценит красоту, долговечность и безупречный вкус, стремясь создать интерьер, который будет актуален долгие годы и дарить истинное эстетическое наслаждение.\n\n### Техническая информация:\n\n*   **Тип:** Кухонный гарнитур с интегрированной обеденной зоной.\n*   **Материал:**\n    *   Фасады кухни: Предположительно МДФ с эмалевым или ламинированным покрытием.\n    *   Столешница и фартук: Искусственный камень под мрамор (или натуральный мрамор).\n    *   Фурнитура (ручки, декоративные элементы): Металл с золотым покрытием.\n    *   Обеденные стулья: Обивка — велюр; каркас/ножки — металл.\n    *   Обеденный стол: Столешница — камень/искусственный камень; основание — металл.\n*   **Цвет:**\n    *   Основной цвет фасадов: Теплый бежевый / Греж / Светлый тауп.\n    *   Декоративные акценты: Золотой.\n    *   Столешница и фартук: Белый с серыми прожилками (мраморный рисунок).\n    *   Обеденные стулья: Черный.\n    *   Столешница обеденного стола: Белый.\n*   **Особенности:**\n    *   Вертикальные фрезерованные (рифленые/канавчатые) панели на части фасадов.\n    *   Рамочные фасады с декоративным золотым кантом.\n    *   Высокие колонны для встроенной техники.\n    *   Металлические ручки-скобы в золотом цвете.\n    *   Нижние шкафы с цоколем.\n    *   Обеденные стулья с ромбовидной стежкой на спинке.\n    *   Металлическое основание обеденного стола с геометричным дизайном."},{"id":"BPmVaRfVFu4r4SxEw2DK","name":"Стол Лапка","price":24000,"imageUrls":["https://label-com.ru/images/virtuemart/product/stol_lapka.jpg"],"category":"Гостиная","originalUrl":"https://label-com.ru/katalog/gostinaya/stol-lapka-detail.html","createdAt":"2025-11-24T15:26:21.847Z","updatedAt":"2025-11-24T15:26:21.847Z","rating":0,"reviews":[],"details":{"dimensions":"","material":"","care":""},"description":"Добро пожаловать в мир утонченной роскоши и безупречного стиля с обеденной группой \"Стол Лапка\" от мебельного магазина \"Aura\". Этот ансамбль – истинное воплощение величия и изысканности, призванный преобразить ваше пространство, наполнив его атмосферой аристократического шика и неподвластной времени элегантности. Каждая деталь комплекта тщательно продумана, чтобы создать гармоничное и впечатляющее зрелище, достойное центрального места в вашем доме.\n\nСердцем этого великолепного комплекта является просторный овальный стол, который величественно возвышается на массивной центральной опоре. Столешница, выполненная в глянцевом исполнении, завораживает своим изысканным мраморным рисунком в серых и белых тонах, придавая изделию не только благородный, но и практичный вид. Края столешницы и изящная колоннообразная основа стола щедро украшены объемной резьбой, создающей эффект старинного убранства. Именно в этих грациозных изгибах и тонких, словно вылепленных вручную узорах, кроется секрет названия \"Лапка\" – они придают всей конструкции легкость и одновременно надежную опору, словно бережное прикосновение.\n\nВ идеальном тандеме со столом выступают шесть стульев, каждый из которых является самостоятельным произведением искусства. Их каркасы, гармонично продолжающие стилистику стола, поражают своей фигурной резьбой и изящными, плавно изогнутыми ножками. Высокие спинки стульев обиты благородным велюром глубокого графитового оттенка, обещая необыкновенный комфорт и мягкость. Сиденья, выполненные из плотной, гладкой мебельной ткани более светлого серого тона с легким глянцевым блеском, создают выразительный контраст фактур, подчеркивая утонченность дизайна и приглашая окунуться в мир непревзойденного удобства.\n\nОбеденная группа \"Стол Лапка\" – это больше, чем просто мебель; это приглашение к созданию незабываемых моментов и теплых воспоминаний. Она станет идеальным решением для роскошных столовых, просторных гостиных или торжественных банкетных залов, где ценится красота, функциональность и долговечность. Выберите \"Стол Лапка\", чтобы привнести в свой интерьер дыхание классической роскоши, которая будет радовать глаз и дарить комфорт всем вашим гостям и членам семьи.\n\n---\n\n**Техническая информация:**\n\n*   **Тип:** Обеденная группа (стол и 6 стульев).\n*   **Форма столешницы:** Овальная.\n*   **Материал:**\n    *   **Каркас (стол и стулья):** Массив дерева с лаковым покрытием.\n    *   **Столешница:** Искусственный камень с мраморным рисунком, глянцевая.\n    *   **Обивка спинки стульев:** Велюр.\n    *   **Обивка сиденья стульев:** Плотная мебельная ткань с глянцевым эффектом.\n*   **Цвет:**\n    *   **Каркас (стол и стулья):** Светлый кремовый / Слоновая кость с серебристой патиной.\n    *   **Столешница:** Серо-белый мраморный рисунок.\n    *   **Обивка спинки стульев:** Темно-серый / Графитовый.\n    *   **Обивка сиденья стульев:** Средне-серый.\n*   **Особенности:**\n    *   Резные декоративные элементы на каркасе стола и стульев.\n    *   Фигурные (изогнутые) ножки стульев.\n    *   Массивная центральная опора стола (пьедестал) с вертикальным рифлением.\n    *   Изысканные, высокие спинки стульев с резным верхом в форме короны.\n    *   Комплект включает 1 стол и 6 стульев."},{"id":"BipaPraTexbgWsrd4RUJ","name":"Наоми","price":95700,"imageUrls":["https://label-com.ru/images/virtuemart/product/naomi_4,2.jpg"],"category":"Кухни","originalUrl":"https://label-com.ru/katalog/kukhni-1/naomi-detail.html","createdAt":"2025-11-24T15:26:21.839Z","updatedAt":"2025-11-24T15:26:21.839Z","rating":0,"reviews":[],"details":{"dimensions":"","material":"","care":""},"description":"Добро пожаловать в мир \"Наоми\" от Aura – где вневременная элегантность встречается с безупречной функциональностью, создавая сердце вашего дома. Этот кухонный гарнитур – истинное воплощение современной классики, призванное вдохновлять и радовать каждый день. При первом взгляде \"Наоми\" окутывает атмосферой света и простора, благодаря доминирующей палитре чистых белых и молочных оттенков, которые визуально расширяют пространство и наполняют его воздухом.\n\nИзысканные фасады, выполненные в светлых тонах, украшены классическими фрезерованными рамами, которые придают гарнитуру утонченный и благородный вид. Особое внимание привлекают верхние шкафы со стеклянными вставками, дополненными уникальными геометрическими решетками. Эти декоративные элементы не только служат акцентом, но и позволяют деликатно демонстрировать избранные предметы посуды или декора, добавляя кухне индивидуальности и легкости.\n\nКонтрастным и одновременно гармоничным дополнением к светлым фасадам служит столешница и фартук, выполненные из материала, имитирующего натуральный мрамор с выразительными серыми и черными прожилками. Глянцевая поверхность этих элементов не только придает кухне роскошный блеск, но и отражает свет, усиливая ощущение чистоты и свежести. Элегантные, минималистичные ручки серебристого оттенка идеально вписываются в общую концепцию, подчеркивая сдержанный шик и продуманность каждой детали.\n\n\"Наоми\" – это не просто набор мебели, это продуманная система хранения и организации пространства, где каждый элемент на своем месте. От высоких пеналов, способных вместить всю необходимую утварь, до удобных выдвижных ящиков и шкафов с распашными дверцами – все здесь создано для комфортной и приятной готовки, а также для создания уютной атмосферы, располагающей к теплым семейным встречам. \"Наоми\" от Aura – это обещание красоты, качества и стиля, которые останутся актуальными на долгие годы.\n\n---\n\n**Техническая информация:**\n\n*   **Тип:** Кухонный гарнитур\n*   **Стиль:** Современная классика / Неоклассика\n*   **Материал фасадов:** Окрашенный МДФ (или массив дерева с окрашенной поверхностью), стекло.\n*   **Материал столешницы и фартука:** Искусственный камень / Кварцевый агломерат (с имитацией мрамора), глянцевая поверхность.\n*   **Цвет:** Светло-серый / Белый (фасады), Белый с серыми/черными прожилками (столешница и фартук), Серебристый (фурнитура).\n*   **Особенности:**\n    *   Фрезерованные (рамочные) фасады.\n    *   Декоративные решетки на стеклянных дверцах (геометрический орнамент).\n    *   Верхние и нижние декоративные карнизы/плинтуса.\n    *   Интегрированная ниша для вытяжки.\n    *   Высокие шкафы-пеналы.\n    *   Металлическая фурнитура (ручки).\n    *   Прямая (линейная) конфигурация.\n    *   Глухие и остекленные секции."},{"id":"Btz6Gi5EsY84Ie5BoVqX","name":"Изабель","price":167200,"imageUrls":["https://label-com.ru/images/virtuemart/product/izabel.png"],"category":"Спальни","originalUrl":"https://label-com.ru/katalog/spalni/izabel-detail.html","createdAt":"2025-11-24T15:26:21.834Z","updatedAt":"2025-11-24T15:26:21.834Z","rating":0,"reviews":[],"details":{"dimensions":"2580  x 1280  x 2100\n","material":"","care":""},"description":"Представляем коллекцию \"Изабель\" от Aura – воплощение изысканной элегантности и безупречного вкуса, созданную для тех, кто ценит роскошь и комфорт в каждой детали. Этот спальный гарнитур словно соткан из света и воздушности, привнося в интерьер ощущение спокойствия и утонченного шика. Дизайн \"Изабель\" мастерски балансирует между современными трендами и классической грацией, создавая пространство, где каждая ночь обещает быть по-настоящему безмятежной, а каждое утро – вдохновляющим.\n\nЦентральное место в композиции занимает великолепная кровать с высоким мягким изголовьем, обтянутым благородной светлой тканью, напоминающей нежный велюр или плотную рогожку. Ее объемные формы приглашают к расслаблению, а безупречные линии каркаса повторяют общую эстетику гарнитура. Прикроватные тумбы, выполненные в сияющем белом глянце, украшены элегантной фрезеровкой в виде вертикальных рельефных полос на фасадах ящиков. Они покоятся на изящных золотистых ножках и дополнены утонченными металлическими ручками, которые переливаются мягким латунным блеском, добавляя штрихи роскоши.\n\nПросторный шкаф, поражающий своей функциональностью и стилем, продолжает белоснежную палитру, часть его фасадов также оформлена рельефной фрезеровкой, гармонирующей с остальными элементами. Особый шарм ему придают широкие горизонтальные вставки с зеркальным или металлизированным эффектом под золото, разделяющие секции и добавляющие глубину и световые акценты. Завершает ансамбль изящный туалетный столик с удобным прямоугольным зеркалом, повторяющий дизайн прикроватных тумб — глянцевые поверхности, рифленые фасады и золотистые акценты. Рядом с ним расположен компактный, но уютный пуф, обтянутый мягкой светлой тканью, который завершает гармоничный образ будуара.\n\nКоллекция \"Изабель\" — это не просто мебель, это целостное произведение искусства, способное преобразить любую спальню в личный оазис стиля и безмятежности. Сочетание светлых тонов, глянцевых фактур и теплых золотистых акцентов создает атмосферу легкости и роскоши, характерную для современного ар-деко или неоклассики, делая каждое утро началом прекрасного дня, а каждый вечер – идеальным завершением.\n\n---\n\n**Техническая информация:**\n\n*   **Тип:** Спальный гарнитур (Кровать, прикроватные тумбы, платяной шкаф, туалетный столик с зеркалом, пуф).\n*   **Стиль:** Современная классика / Неоклассика / Ар-деко.\n*   **Материал:**\n    *   Каркас и фасады корпусной мебели: МДФ с глянцевым покрытием (белый).\n    *   Обивка кровати и пуфа: Мягкая мебельная ткань (светло-серый, предположительно велюр или рогожка).\n    *   Декор и фурнитура: Металл (оттенок золота/латуни).\n*   **Цвет:** Белый, светло-серый (обивка), золотой/латунный (декоративные элементы).\n*   **Особенности:**\n    *   Высокое мягкое изголовье кровати.\n    *   Фактурная фрезеровка (рифление) на фасадах прикроватных тумб и туалетного столика.\n    *   Элегантные фигурные металлические ножки и ручки золотистого оттенка.\n    *   Шкаф с комбинированными фасадами: гладкие, с фрезеровкой и с горизонтальными зеркальными/металлизированными вставками.\n    *   Мягкий обитый пуф в комплекте с туалетным столиком."},{"id":"C3nYjEKBSZpEItmuyvpc","name":"KREYA","price":148700,"imageUrls":["https://label-com.ru/images/virtuemart/product/kreya1.jpeg"],"category":"Мягкая мебель","originalUrl":"https://label-com.ru/katalog/myagkaya-mebel/kreya-detail.html","createdAt":"2025-11-24T15:26:21.843Z","updatedAt":"2025-11-24T15:26:21.843Z","rating":0,"reviews":[],"details":{"dimensions":"","material":"","care":""},"description":"Добро пожаловать в мир утонченного стиля с комплектом мебели KREYA от \"Aura\". Этот изысканный ансамбль, представленный на изображении, воплощает собой идеальное сочетание современного дизайна и безупречного комфорта, создавая атмосферу спокойствия и элегантности в любом пространстве. С первого взгляда KREYA пленяет своей гармонией форм и текстур, становясь центральным элементом роскошной гостиной или изысканной зоны отдыха.\n\nВ основе коллекции KREYA лежит трехместный диван и два уютных кресла, обитые высококачественной матовой тканью глубокого темно-серого цвета. Этот оттенок антрацита придает мебели благородный и унив айн сидений и спинок.\n    *   Декоративные подушки в комплекте (на креслах).\n    *   Сужающиеся к низу деревянные ножки.\n    *   Журнальный столик с мягким основанием и стеклянной столешницей.\n    *   Вертикальная прострочка на обивке основания журнального столика.\n    *   Рельефная фактура обивки на подушках спинки дивана и кресел."},{"id":"CecTBGcuqB3bM2RFfUsv","name":"Оливия","imageUrls":["https://label-com.ru/images/virtuemart/product/oliviya-2.jpg"],"category":"Гостиная","originalUrl":"https://label-com.ru/katalog/gostinaya/oliviya-2-detail.html","createdAt":"2025-11-24T15:26:21.846Z","updatedAt":"2025-11-24T15:26:21.846Z","rating":0,"reviews":[],"details":{"dimensions":"","material":"","care":""},"price":99000,"description":"Представляем \"Оливию\" — коллекцию, которая мгновенно преобразит ваше пространство, наполнив его атмосферой изысканной роскоши и неустаревающей элегантности. Этот модульный гарнитур для гостиной, состоящий из двух утонченных витрин и центральной тумбы, воплощает собой современную классику с яркими нотами гламура и утонченности Арт-Деко. Каждый элемент коллекции \"Оливия\" создан, чтобы стать центральным акцентом вашего интерьера, притягивая взгляды своим безупречным стилем.\n\nОснову эстетики \"Оливии\" составляет гармоничное сочетание теплых оттенков слоновой кости и блистательного золота. Фасады мебели выполнены в глянцевом кремовом цвете, что придает им зеркальный блеск и визуальную легкость, усиливая ощущение света и простора. Изысканные золотые акценты — от тонкой окантовки до изящных металлических ножек V-образной формы и стильных декоративных вставок — подчеркивают благородство коллекции, добавляя ей шика и статусности.\n\nВитрины \"Оливии\" — это не просто места для хранения, это настоящие галереи для ваших ценностей. Их прозрачные стеклянные двери украшены оригинальным геометрическим узором, а внутренние зеркальные стенки с легким бронзовым отливом многократно усиливают сияние выставленных предметов. Центральная тумба продолжает тему роскоши, предлагая вместительные отделения, декорированные золотистыми панелями и эффектными вставками. Фактурные элементы с вертикальными и горизонтальными линиями на фасадах добавляют глубины и игры света, создавая утонченный рельеф.\n\n\"Оливия\" — это выбор тех, кто ценит великолепие и функциональность, кто стремится создать интерьер, в котором каждая деталь говорит о безупречном вкусе. Эта коллекция идеально впишется в просторную гостиную или столовую, где она сможет раскрыть весь свой потенциал, создавая атмосферу гостеприимства и праздника, каждый день наполняя ваш дом утонченным сиянием и ощущением непревзойденного комфорта.\n\n**Техническая информация:**\n*   **Тип:** Модульная система для гостиной (включает 2 витрины и 1 центральную тумбу).\n*   **Материал:**\n    *   Корпус и фасады: МДФ с глянцевым лаковым покрытием.\n    *   Декоративные элементы, ручки и ножки: Металл с золотым покрытием.\n    *   Двери витрин: Прозрачное стекло.\n    *   Внутренние задние панели витрин: Зеркальные (с бронзовым оттенком).\n*   **Цвет:** Основной – кремовый/слоновая кость (глянцевый); Акценты – золотой; Вставки – бронзовый.\n*   **Особенности:**\n    *   Глянцевое покрытие фасадов.\n    *   Металлические ножки V-образной формы золотого цвета.\n    *   Декоративные металлические вставки и окантовка золотого цвета.\n    *   Геометрический узор на стеклянных дверях витрин.\n    *   Фактурные фасады с вертикальными и горизонтальными линиями.\n    *   Зеркальные задние стенки витрин для усиления эффекта демонстрации предметов."},{"id":"Cm42Lo3owvF8CoKqaBly","name":"Стол Милана","price":25000,"imageUrls":["https://label-com.ru/images/virtuemart/product/stol_milana.jpg"],"category":"Гостиная","originalUrl":"https://label-com.ru/katalog/gostinaya/stol-milana-detail.html","createdAt":"2025-11-24T15:26:21.848Z","updatedAt":"2025-11-24T15:26:21.848Z","rating":0,"reviews":[],"details":{"dimensions":"","material":"","care":""},"description":"Представляем вашему вниманию \"Стол Милана\" – воплощение изысканности и утонченного стиля, который преобразит любую столовую в оазис элегантности. Этот обеденный комплект, вдохновленный неоклассической эстетикой, создает атмосферу торжественности и в то же время домашнего уюта. Гармоничное сочетание мягких линий и благородных материалов делает его центральным акцентом интерьера, приглашающим к неспешным беседам и незабываемым трапезам.\n\nСтол \"Милана\" и шесть идеально подобранных стульев представляют собой изысканный тандем, выполненный в нежной палитре. Каркасы стола и стульев окрашены в благородный оттенок слоновой кости (айвори) с легким глянцем, который прекрасно сочетается с теплой золотистой отделкой. Глянцевая столешница стола, также цвета айвори, отражает свет, добавляя пространству легкости и воздушности. Особую привлекательность комплекту придает обивка стульев из мягчайшего велюра глубокого пыльно-голубого цвета, который контрастирует с основным тоном, привнося нотку свежести и роскоши.\n\nКаждая деталь комплекта \"Милана\" продумана до мелочей. Изящные точеные ножки стола и стульев украшены вертикальными каннелюрами и акцентированы золотистыми элементами, что придает им легкость и утонченность, характерную для классической мебели. Периметр царги стола дополнен изящной фрезеровкой, напоминающей миниатюрные колонны, усиливая античный шарм. Овальные спинки стульев не только обеспечивают комфорт, но и служат самостоятельным декоративным элементом, обрамленным золотистым кантом.\n\n\"Стол Милана\" — это не просто мебель, это инвестиция в красоту и комфорт вашего дома. Он идеально впишется в интерьеры, где ценятся классические формы, утонченная эстетика и высокое качество. Созданный для тех, кто ищет гармонию и хочет наполнить свое пространство атмосферой респектабельности и уюта, этот комплект станет сердцем вашей гостиной или столовой, где будут собираться близкие, чтобы разделить радость общения.\n\n***\n\n### Техническая информация:\n\n*   **Тип:** Обеденная группа (Стол и стулья)\n
