толья, создавая ощущение гармонии и монолитности. Тонкие серебристые акцентные полосы, обрамляющие основание и царгу стола, добавляют изделию легкий шик и современное сияние.\n\nГармонично дополняющие \"Стол Вика\" стулья представляют собой шедевр комфорта и стиля. Их высокие, изящно изогнутые спинки украшены глубокой каретной стяжкой (капитоне), создающей роскошный объем и визуальную мягкость. Обивка из благородного темно-серого велюра или бархата не только невероятно приятна на ощупь, но и придает обеденной зоне глубину и утонченность. Светлые, изящно изогнутые ножки стульев перекликаются с основным цветом стола, завершая образ идеальной обеденной группы, где каждая деталь продумана до мелочей для создания атмосферы уюта и праздника.\n\n\"Стол Вика\" идеально впишется в интерьеры, оформленные в современном классическом стиле, ар-деко или гламур, став эпицентром для семейных ужинов, дружеских встреч и торжественных мероприятий. Он не просто мебель, это приглашение к красивой жизни, к созданию незабываемых моментов в окружении безупречного вкуса.\n\n---\n\n### Техническая информация:\n\n*   **Тип:** Обеденный стол (представлен как часть обеденной группы).\n*   **Стиль:** Современная классика, гламур, неоклассика.\n*   **Материал:**\n    *   Столешница и основание: Вероятно, МДФ с высокоглянцевым лаковым покрытием или аналогичный композитный материал.\n    *   Декоративные элементы: Металл (серебристый/хром).\n    *   Обивка стульев: Велюр или бархат.\n    *   Каркас стульев: Дерево (ножки стульев).\n*   **Цвет:**\n    *   Столешница, основание стола и ножки стульев: Белый глянец.\n    *   Обивка стульев: Темно-серый (антрацит).\n    *   Декоративные элементы: Серебристый/хром.\n*   **Особенности:**\n    *   **Стол:** Глянцевая столешница со скругленными углами, массивная центральная опора-постамент, декоративное вертикальное рифление на основании и подстолье (царге), хромированные/серебристые декоративные вставки по периметру.\n    *   **Стулья (в комплекте/на фото):** Высокие спинки с каретной стяжкой (капитоне), велюровая/бархатная обивка, элегантные изогнутые ножки."},{"id":"FM3lBY7OAJtpf20HYwFo","name":"РАЙХАНА","price":151800,"imageUrls":["https://label-com.ru/images/virtuemart/product/rajkhana.jpg"],"category":"Мягкая мебель","originalUrl":"https://label-com.ru/katalog/myagkaya-mebel/rajkhana-detail.html","rating":0,"reviews":[],"createdAt":{"_seconds":1764053492,"_nanoseconds":24000000},"description":"**РАЙХАНА: Гармония Элегантности и Комфорта**\n\nПредставляем вашему вниманию \"РАЙХАНА\" – воплощение утонченности и комфорта, созданное для истинных ценителей безупречного стиля. Этот изысканный комплект мягкой мебели мгновенно преобразит вашу гостиную, наполнив ее атмосферой современной роскоши и безмятежности. Дизайн \"РАЙХАНА\" смело сочетает в себе строгие линии неоклассики с актуальными тенденциями, предлагая идеальный баланс между классической грацией и современным шиком. Это не просто мебель, это центральный элемент вашего интерьера, место, где собираются близкие, где рождаются новые идеи и где каждый день наполнен красотой и комфортом.\n\nЦветовая палитра комплекта – глубокий, благородный дымчато-серый в гармоничном дуэте со светлым, почти перламутровым оттенком, создает ощущение спокойствия и изысканности. Обивка выполнена из высококачественных тканей: матовая, приятная на ощупь текстура основного тона эффектно дополняется бархатистым переливом велюра на сиденьях и внутренних частях спинки. Этот контраст фактур придает мебели особую глубину и объем, приглашая к расслаблению и наслаждению каждым моментом домашнего уюта.\n\nВнимание к деталям – визитная карточка \"РАЙХАНА\". Изящный серебристый металлический кант очерчивает каждый элемент, подчеркивая строгие, но обволакивающие формы дивана и кресел. Фигурные металлические ножки, выполненные в тон канту, добавляют конструкции легкости и визуальной устойчивости. Особого шарма комплекту придают декоративные подушки с уникальным стеганым узором, напоминающим изящное переплетение, и деликатной металлической полосой, которая становится центральным акцентом и завершающим штрихом в этой симфонии стиля.\n\nЭргономичные формы, мягкие подлокотники с элегантными металлическими вставками и комфортные валикообразные подголовники обеспечивают идеальную поддержку и максимальный уют. Каждая деталь \"РАЙХАНА\" призвана дарить ощущение исключительности и полного расслабления. Позвольте себе роскошь создать дом, который отражает вашу индивидуальность, дом, где красота и комфорт живут в полной гармонии.\n\n**Техническая информация:**\n*   **Тип:** Комплект мягкой мебели (гостиная группа)\n*   **Состав комплекта:** Трехместный диван, два кресла.\n*   **Материал обивки:** Комбинированная обивка (предположительно велюр/бархат для светлых частей, мебельная ткань для основных частей).\n*   **Декоративные элементы:** Металлический кант по периметру, декоративные металлические вставки на подлокотниках.\n*   **Ножки:** Металлические, фигурные, серебристого цвета.\n*   **Цвет:** Дымчато-серый, светло-серый (с перламутровым отливом).\n*   **Особенности:**\n    *   Декоративные подушки со стеганым (фактурным) узором и горизонтальной металлической полосой.\n    *   Валикообразные подголовники на спинках.\n    *   Хромированные/серебристые металлические акценты."},{"id":"FPlegKmHmajLFUpQmTpc","name":"УГОЛ АMARO","price":147800,"imageUrls":["https://label-com.ru/images/virtuemart/product/amaro1.jpeg"],"category":"Мягкая мебель","originalUrl":"https://label-com.ru/katalog/myagkaya-mebel/ugol-amaro-detail.html","rating":0,"reviews":[],"createdAt":{"_seconds":1764053546,"_nanoseconds":425000000},"description":"Добро пожаловать в мир безупречного стиля и абсолютного комфорта с \"УГОЛ AMARO\" от мебельного магазина \"Aura\".\n\nПредставляем вам \"УГОЛ AMARO\" – воплощение современного комфорта и безупречного стиля, созданного для тех, кто ценит гармонию и изысканность в интерьере. Этот угловой диван не просто мебель, это архитектурный акцент, преображающий пространство. Его мягкие, органичные изгибы и полное отсутствие острых углов мгновенно притягивают взгляд, обещая максимальное расслабление. \"AMARO\" легко вписывается в эстетику современного минимализма, скандинавского шика или концепции \"cozy chic\", становясь центром притяжения в любой гостиной.\n\nОщущение невесомости и невероятной мягкости дивану придает высококачественная, плотная текстурная ткань, напоминающая благородное букле или деликатную рогожку. Ее меланжевый светло-серый оттенок играет полутонами, добавляя глубины и уюта, создавая при этом универсальный фон для любого декора. Горизонтальная прострочка спинки не только формирует четкий визуальный ритм, но и поддерживает идеальную форму, обеспечивая эргономичную поддержку. В комплекте с диваном идут мягкие декоративные подушки – как однотонные, так и с элегантным графическим узором, а также очаровательный круглый пуф, выполненный в схожей текстуре, который служит идеальным дополнением для ног или как дополнительное место для сидения.\n\n\"УГОЛ AMARO\" — это приглашение к абсолютному релаксу. Его обволакивающие формы создают атмосферу уединения и комфорта, идеальную для чтения книги, просмотра фильма или неспешной беседы с близкими. Низкая, устойчивая посадка и объемные сиденья дарят ощущение защищенности и тепла, превращая гостиную в настоящий оазис спокойствия. Этот диван – не просто предмет интерьера, а обещание комфорта, стиля и неповторимой атмосферы, где каждая минута наполнена уютом, а дизайн говорит сам за себя.\n\n---\n\n**Техническая информация:**\n\n*   **Тип:** Угловой диван (секционный/модульный)\n*   **Материал:** Текстурная мебельная ткань (визуально напоминающая букле или крупную рогожку), мягкий наполнитель.\n*   **Цвет:** Светло-серый меланж (основной диван), очень светло-серый/почти белый меланж (пуф), черно-белый/серый (узорчатые декоративные подушки).\n*   **Особенности:** Изогнутые, округлые формы без острых углов; модульная конструкция; горизонтальная прострочка на спинке; низкая посадка (без видимых ножек); комплект декоративных подушек (различной формы и с графическим узором); круглый пуф в комплекте (или как дополнение)."},{"id":"FcKqc4EdfdHR2KvMC35u","name":"Армада","price":160000,"imageUrls":["https://label-com.ru/images/virtuemart/product/19.jpg"],"category":"Мягкая мебель","originalUrl":"https://label-com.ru/katalog/myagkaya-mebel/armada-detail.html","rating":0,"reviews":[],"createdAt":{"_seconds":1764053091,"_nanoseconds":82000000},"description":"Добро пожаловать в мир безупречного стиля и исключительного комфорта от \"Aura\"! Представляем вашему вниманию \"Армада\" — диван, созданный, чтобы стать сердцем вашей гостиной и воплощением современного дизайна.\n\n\"Армада\" — это больше, чем просто мебель; это произведение искусства, выполненное в стиле современной элегантности. Его лаконичные формы и изысканные детали гармонично сочетают функциональность и визуальную привлекательность. Основу стиля составляет светлая, воздушная обивка, которая придает дивану легкость и объем, делая его идеальным акцентом как для светлых, так и для контрастных интерьеров. Каждая линия здесь продумана, чтобы создать ощущение простора и ненавязчивой роскоши.\n\nОбивка дивана выполнена из высококачественной текстильной ткани нежного светло-серого оттенка, которая визуально выглядит мягкой и приятной на ощупь, приглашая к отдыху. Особого внимания заслуживают широкие подлокотники, украшенные уникальной вертикальной рельефной стежкой, добавляющей текстурную глубину и изысканность. Элегантное основание из темного дерева контрастирует со светлой обивкой, создавая эффектный акцент и подчеркивая безупречный вкус владельца. Ножки, выполненные в оригинальном двухцветном дизайне – темное дерево с белыми наконечниками – добавляют дивану индивидуальности и современного шарма.\n\nДиван \"Армада\" является модульной системой, что позволяет создавать различные конфигурации, идеально вписываясь в любое пространство. В комплект входят мягкие декоративные подушки: одни в тон основной обивке, другие — с динамичным черно-белым геометрическим узором, которые добавляют динамики и завершенности образу. Этот диван – идеальное решение для тех, кто ценит эстетику, функциональность и комфорт в каждом элементе своего дома.\n\n***\n\n### Техническая информация:\n\n*   **Тип:** Угловой диван (модульный)\n*   **Материал:** Текстильная обивка (ткань), дерево (основание и ножки)\n*   **Цвет:** Светло-серый (основная обивка), темно-коричневый (деревянное основание и часть ножек), белый (наконечники ножек), серый и черно-белый (декоративные подушки)\n*   **Особенности:** Угловая конфигурация, модульная конструкция, широкие подлокотники с вертикальной рельефной стежкой, открытое деревянное основание, конические двухцветные ножки (дерево с белым наконечником), комплект декоративных подушек."},{"id":"GCRHCbo0yqdpueOiv6f8","name":"Анжелика","price":192500,"imageUrls":["https://label-com.ru/images/virtuemart/product/angelika2.jpg"],"category":"Спальни","originalUrl":"https://label-com.ru/katalog/spalni/anzhelika-1-detail.html","createdAt":"2025-11-24T15:26:21.819Z","updatedAt":"2025-11-24T15:26:21.819Z","rating":0,"reviews":[],"details":{"dimensions":"","material":"","care":""},"description":"Добро пожаловать в мир утонченной роскоши с мебельным магазином \"Aura\"! Представляем вашему вниманию поистине королевский гарнитур \"Анжелика\", созданный, чтобы дарить вдохновение и воплощать мечты об идеальной спальне. С первого взгляда он очаровывает своей грациозностью и величием, перенося вас в эпоху дворцовой элегантности и романтики. Этот гарнитур — ода классическому стилю с явными элементами барокко и рококо, где каждая деталь служит торжеству красоты и изысканности.\n\nЦентральное место в коллекции занимает величественная кровать, притягивающая взгляд своим высоким, пышно декорированным изголовьем. Оно украшено глубокой каретной стяжкой (капитоне) из мягкой, бархатистой ткани цвета шампань, что придает ей невероятно притягательный и уютный вид. Резные элементы, изображающие цветочные гирлянды и пышные завитки, щедро покрыты золотой патиной, создавая эффект антикварной роскоши и благородства. Изножье кровати не уступает изголовью по богатству декора, повторяя его резные узоры и изящные изгибы, которые словно обнимают ложе, обещая безмятежный сон.\n\nГарнитур дополняют изящные прикроватные тумбы и грандиозный туалетный столик с зеркалом. Каждый предмет мебели выполнен в единой стилистике: основной цвет — благородная слоновая кость, подчеркнутая золотистыми акцентами на резных деталях и изысканной фурнитуре. Столешницы тумб и туалетного столика имеют глянцевое покрытие с тонким, мраморным рисунком, добавляя функциональности и шарма. Фигурные ножки, характерные для классического стиля, завершают образ, привнося легкость и утонченность, несмотря на массивность и прочность конструкции. Зеркало в богато декорированной раме, повторяющей узоры кровати, становится венцом туалетного столика, отражая великолепие всей композиции.\n\n\"Анжелика\" – это не просто мебель, это целый ансамбль, который преобразит вашу спальню в настоящий будуар. Он создает атмосферу абсолютного комфорта, неги и торжественного спокойствия, где каждая линия, каждый изгиб и каждое золотое прикосновение говорит о внимании к деталям и бескомпромиссном качестве. Этот гарнитур предназначен для тех, кто ценит вечную классику, стремится окружить себя предметами искусства и жаждет превратить свою спальню в личное святилище роскоши и гармонии.\n\n**Техническая информация:**\n\n*   **Тип:** Спальный гарнитур (включает кровать, две прикроватные тумбы, туалетный столик с зеркалом, пуф).\n*   **Стиль:** Классический, барокко, рококо.\n*   **Материал:**\n    *   **Корпус:** Высококачественный МДФ / массив дерева (с глянцевым покрытием).\n    *   **Отделка:** Пышная ручная резьба, золоченое патинирование (золотой акцент), лаковое покрытие.\n    *   **Обивка:** Велюр / бархат (или аналогичная мягкая ткань) на изголовье и пуфе.\n    *   **Столешницы:** Глянцевое покрытие с имитацией рисунка натурального камня (мрамора).\n    *   **Фурнитура:** Изящные металлические ручки золотого/бронзового оттенка.\n*   **Цвет:** Слоновая кость / Кремовый (основной), Золотой (акценты), Шампань / Светло-бежевый (обивка).\n*   **Особенности:**\n    *   Высокое изголовье с каретной стяжкой (капитоне).\n    *   Обильное декоративное резное оформление на всех элементах гарнитура (цветы, завитки, вензеля).\n    *   Фигурные резные ножки.\n    *   Зеркало в резной, массивной раме.\n    *   Ящики с декоративными фасадами.\n    *   Глянцевые, износостойкие поверхности."},{"id":"GMpqMrqLP6Os4zdrylwU","name":"ЗАРИФА","price":135000,"imageUrls":["https://label-com.ru/images/virtuemart/product/zarifa2.jpeg"],"category":"Мягкая мебель","originalUrl":"https://label-com.ru/katalog/myagkaya-mebel/zarifa-2210-detail.html","rating":0,"reviews":[],"createdAt":{"_seconds":1764053209,"_nanoseconds":202000000},"description":"Добро пожаловать в мир утонченности и непревзойденного комфорта с коллекцией \"ЗАРИФА\" от мебельного магазина \"Aura\". Представляем вашему вниманию гарнитур, который мгновенно преобразит вашу гостиную, наполнив ее атмосферой спокойствия и изысканной роскоши. \"ЗАРИФА\" — это воплощение современной классики, где гармонично сплелись элегантность вне времени и актуальные дизайнерские решения. Идеальные пропорции и продуманные детали делают этот комплект не просто мебелью, а центральным элементом, притягивающим взгляды и приглашающим к отдыху.\n\nВ основе коллекции \"ЗАРИФА\" лежит безупречное сочетание материалов и текстур. Обивка выполнена из плотной, но при этом невероятно мягкой и приятной на ощупь фактурной ткани в благородном оттенке светло-серого или теплого бежево-серого (грейж). Этот нейтральный цвет создает идеальный фон для любого интерьера, привнося ощущение света и простора. Каркас и изящные конусные ножки выполнены из натурального дерева глубокого темно-коричневого оттенка, который создает эффектный контраст с мягкой обивкой, подчеркивая естественную красоту линий и придавая комплекту солидность. Глянцевые деревянные вставки на подлокотниках дивана добавляют нотку современного шика.\n\nКаждый элемент коллекции \"ЗАРИФА\" проработан до мелочей. Диван, с его чистыми линиями и двумя декоративными подушками, выглядит одновременно современно и невероятно уютно. Его минималистичный дизайн компенсируется вниманием к комфорту и качеству. Кресла же, напротив, демонстрируют классическую элегантность: высокие изогнутые спинки, глубокие сиденья и, конечно же, изысканная каретная стяжка с пуговицами, которая придает им особый шарм и королевский вид. Эта деталировка не только украшает, но и создает ощущение объема и мягкости, обещая максимальный комфорт.\n\n\"ЗАРИФА\" — это больше, чем просто мягкая мебель. Это инвестиция в ваш уют и стиль, приглашение насладиться каждым моментом, проведенным дома. Она идеально впишется в интерьер просторной гостиной, создавая зону релаксации и общения, где каждая деталь говорит о хорошем вкусе и внимании к качеству. Позвольте \"ЗАРИФЕ\" стать сердцем вашего дома, источником вдохновения и местом, где собираются самые дорогие люди.\n\n---\n\n### Техническая информация:\n\n*   **Тип:** Мягкая мебель для гостиной (гарнитур: диван и два кресла)\n*   **Материал:**\n    *   Обивка: Фактурная мебельная ткань\n    *   Каркас и ножки: Массив дерева\n    *   Декоративные вставки: Дерево (глянцевое)\n*   **Цвет:**\n    *   Обивка: Светло-серый / Бежево-серый (грейж)\n    *   Деревянные элементы: Темно-коричневый\n*   **Особенности:**\n    *   Диван: Двухместный, с двумя декоративными подушками, открытый деревянный каркас по низу, деревянные декоративные вставки на подлокотниках.\n    *   Кресла: С высокими спинками и каретной стяжкой (пуговицами), обивка с кантом, изящные конусные деревянные ножки.\n    *   Общее: Современный классический стиль, износостойкая обивка, прочные деревянные ножки."},{"id":"GUQvVAIQr0uJ9Lcvbz8R","name":"СТЕФАНИ","price":148500,"imageUrls":["https://label-com.ru/images/virtuemart/product/stefani.jpg"],"category":"Мягкая мебель","originalUrl":"https://label-com.ru/katalog/myagkaya-mebel/stefani-detail.html","rating":0,"reviews":[],"createdAt":{"_seconds":1764053536,"_nanoseconds":423000000},"description":"**«СТЕФАНИ» – Где классика встречается с современностью**\n\nПредставляем вашему вниманию комплект мягкой мебели «СТЕФАНИ» от Aura – воплощение безупречного вкуса и современного комфорта. Этот ансамбль, состоящий из роскошного трехместного дивана и двух изящных кресел, гармонично сочетает в себе элегантность неоклассического стиля с функциональностью современных решений. «СТЕФАНИ» создан для тех, кто ценит утонченность линий и стремится наполнить свой дом атмосферой изысканного уюта, где каждая деталь говорит о статусе и внимании к деталям.\n\nВ основе эстетики «СТЕФАНИ» лежит благородная палитра и тактильно приятные материалы. Обивка выполнена из высококачественной плотной ткани глубокого графитового оттенка, который с легким синеватым подтоном создает ощущение респектабельности и спокойствия. Идеальным дополнением служат вставки из натурального дерева, выполненные в теплом темно-коричневом цвете с выраженной текстурой, которые придают каркасу дивана и кресел особый шарм и тепло. Завершают образ изящные конические ножки с деликатными золотистыми наконечниками, добавляющие легкости и роскоши в общий ансамбль.\n\nКаждая деталь комплекта «СТЕФАНИ» продумана до мелочей, подчеркивая мастерство исполнения. Эргономичные спинки дивана украшены оригинальной горизонтальной строчкой или тиснением, создающим динамичный рисунок, тогда как кресла восхищают классической каретной стяжкой на своих объемных спинках. Это не только эстетический элемент, но и залог исключительного комфорта и поддержки. Широкие подлокотники дивана с деревянными акцентами и удобные сиденья приглашают расслабиться, а продуманная форма подголовников кресел обеспечивает идеальную поддержку для головы и шеи.\n\nКомплект «СТЕФАНИ» преобразит вашу гостиную, сделав ее центральным местом притяжения. Он идеально впишется в интерьеры, где ценится баланс между классической элегантностью и современным комфортом, будь то просторная городская квартира или загородный дом. С «СТЕФАНИ» вы создадите пространство, где каждая встреча с близкими или момент уединения будет наполнен истинным удовольствием, безупречным стилем и ощущением полной гармонии.\n\n---\n\n**Техническая информация:**\n\n*   **Тип:** Комплект мягкой мебели для гостиной (диван и два кресла)\n*   **Стиль:** Неоклассика / Современная классика\n*   **Обивка:** Высококачественная обивочная ткань\n*   **Цвет обивки:** Глубокий графитовый серый (с синеватым подтоном)\n*   **Материал декоративных элементов:** Натуральное дерево (темно-коричневый оттенок), Металл (золотистые наконечники на ножках)\n*   **Особенности:**\n    *   **Диван:** Трехместный, с декоративным горизонтальным тиснением/прострочкой на спинке, комплектуется двумя поясничными подушками.\n    *   **Кресла:** Высокие спинки с каретной стяжкой (капитоне), объемные подлокотники.\n    *   **Общие элементы:** Деревянные вставки в подлокотниках дивана, изящные конические ножки из дерева с металлическими золотистыми наконечниками."},{"id":"GcgUn6MuhOVdb2lw2B5H","name":"Стул Рим 2","price":8500,"imageUrls":["https://label-com.ru/images/virtuemart/product/stol_rim22.jpg"],"category":"Гостиная","originalUrl":"https://label-com.ru/katalog/gostinaya/stul-rim-2-detail.html","rating":0,"reviews":[],"createdAt":{"_seconds":1764053794,"_nanoseconds":517000000},"description":"Приветствуем вас в мире изысканного стиля от мебельного магазина \"Aura\"! Представляем вашему вниманию \"Стул Рим 2\" – воплощение роскоши и утонченности, созданное для тех, кто ценит великолепие в каждой детали. Основываясь на представленном изображении, мы видим, что этот стул идеально вписывается в интерьер в стиле современной классики с элементами неоклассики и гламура, привнося в любое пространство атмосферу аристократического шика и безупречного вкуса.\n\nКаждый \"Стул Рим 2\" — это произведение искусства, облаченное в мягкий, благородный велюр или бархат. Обивка стульев представлена в двух вариациях, что позволяет создать динамичный и многогранный ансамбль. Одни стулья пленяют взгляды изысканной ромбовидной (каретной) стежкой на спинке, дополненной элегантным металлическим кольцом золотистого цвета в верхней части – акцент, придающий особый шарм и индивидуальность. Другие же стулья воплощают утонченность в строгих вертикальных линиях прошивки, создавая более лаконичный, но не менее роскошный и обволакивающий образ. Объемные сиденья и высокие, эргономично изогнутые спинки обещают непревзойденный комфорт и поддержку.\n\nЦветовая палитра стульев \"Рим 2\" – это гармоничное сочетание теплых и спокойных оттенков. Основные тона обивки варьируются от светлого бежевого до глубокого таупового (коричнево-серого), что позволяет легко интегрировать их в различные интерьерные решения. Особый шарм стульям придают крепкие, изящно точеные ножки кремового или слоновой кости цвета, которые в нижней части завершаются сверкающими золотыми наконечниками. Эти металлические акценты не только добавляют устойчивости, но и служат роскошным декоративным элементом, подчеркивая статус и великолепие мебели. \"Стул Рим 2\" от \"Aura\" – это не просто предмет мебели, а центральный элемент вашего обеденного пространства, приглашающий к долгим, приятным беседам и наслаждению каждым моментом.\n\n---\n\n### Техническая информация:\n\n*   **Тип:** Обеденный стул\n*   **Материал:** Велюр (или бархат), деревянный каркас (ножки), металл (декоративные элементы)\n*   **Цвет:** Светло-бежевый, тауп (коричнево-серый), кремовый / слоновая кость (ножки), золотой (декоративные элементы)\n*   **Особенности:**\n    *   Высокая, эргономичная спинка.\n    *   Мягкая, плюшевая обивка.\n    *   Два варианта дизайна спинки:\n        *   Ромбовидная (каретная) стежка с декоративным металлическим кольцом на спинке.\n        *   Вертикальная стежка.\n    *   Изящные точеные ножки.\n    *   Золотые наконечники на ножках (феррулы).\n    *   Обивка контрастного оттенка на верхней части спинки (для модели с ромбовидной стежкой)."},{"id":"H3o1VlVmieL1o9jtXc7v","name":"Женева угловая","price":132000,"imageUrls":["https://label-com.ru/images/virtuemart/product/kg_geneva_ugol.jpg"],"category":"Кухни","originalUrl":"https://label-com.ru/katalog/kukhni-1/zheneva-uglovaya-detail.html","createdAt":"2025-11-24T15:26:21.838Z","updatedAt":"2025-11-24T15:26:21.838Z","rating":0,"reviews":[],"details":{"dimensions":"","material":"","care":""},"description":"Представляем вашему вниманию кухонный гарнитур \"Женева угловая\" от мебельного магазина \"Aura\" – воплощение изысканности и функциональности, созданное для тех, кто ценит безупречный стиль и комфорт. Этот угловой гарнитур мгновенно преобразит вашу кухню в светлое и просторное убежище, где каждый элемент продуман до мелочей. Его дизайн, выполненный в стиле современной классики, сочетает в себе вневременную элегантность с актуальными тенденциями, предлагая идеальный баланс между эстетикой и практичностью.\n\n\"Женева угловая\" пленяет своей белоснежной палитрой, которая визуально расширяет пространство и наполняет его светом. Фасады, скорее всего выполненные из МДФ с эмалевым покрытием, обладают благородным блеском и фрезеровкой, придающей им классическую объемность и утонченность. Верхние шкафы дополнены прозрачными стеклянными вставками с декоративной раскладкой, позволяющими изящно выставить любимую посуду или декор, добавляя легкости и воздушности общей композиции. Дополняют образ элегантные металлические ручки, которые гармонично вписываются в светлый ансамбль.\n\nОсобое внимание привлекает кухонный фартук, выполненный под натуральный мрамор с изящными серыми прожилками, который создает завораживающий контраст с белоснежными фасадами и подчеркивает эксклюзивность гарнитура. Светлая, глянцевая столешница, перекликаясь с общим стилем, обеспечивает не только прекрасный внешний вид, но и удобную поверхность для кулинарных творений. Интегрированная техника — от встроенной варочной поверхности и духового шкафа до микроволновой печи — аккуратно вписана в общую структуру, сохраняя чистоту линий и порядок. Этот гарнитур от \"Aura\" — не просто мебель, это сердце вашего дома, где рождаются кулинарные шедевры и теплые семейные моменты.\n\n**Техническая информация:**\n*   **Тип:** Угловой кухонный гарнитур\n*   **Стиль:** Современная классика / Неоклассика\n*   **Материал:**\n    *   Фасады: Предположительно МДФ с фрезеровкой, белая эмаль/глянцевое покрытие\n    *   Фартук: Кварц/Керамогранит с эффектом белого мрамора и серыми прожилками\n    *   Столешница: Глянцевая, светлая, предположительно искусственный камень или влагостойкий ламинат\n    *   Ручки: Металлические, серебристого оттенка\n    *   Верхние шкафы: Стекло с декоративной раскладкой\n*   **Цвет:** Белый (фасады, корпус, встроенная техника), белый с серыми прожилками (фартук), светлый (столешница), серебристый (фурнитура)\n*   **Особенности:**\n    *   Угловая конфигурация для оптимизации пространства\n    *   Фрезерованные (филенчатые) фасады\n    *   Верхние шкафы со стеклянными вставками и декоративной решеткой\n    *   Встроенная бытовая техника (духовой шкаф, микроволновая печь, варочная панель)\n    *   Декоративная вытяжка, скрытая за фасадом\n    *   Выдвижные ящики\n    *   Цоколь в цвет фасадов"},{"id":"HXPGDQaAWbcBAGcflgN2","name":"тумба тв Ницца","price":31000,"imageUrls":["https://label-com.ru/images/virtuemart/product/tumba-tv-nitstsa.png"],"category":"Гостиная","originalUrl":"https://label-com.ru/katalog/gostinaya/tumba-tv-nitstsa-detail.html","createdAt":"2025-11-24T15:26:21.849Z","updatedAt":"2025-11-24T15:26:21.849Z","rating":0,"reviews":[],"details":{"dimensions":"2250  x 530  x 520","material":"","care":""},"description":"Приветствуем вас в мире безупречного стиля и совершенства от \"Aura\"! Представляем вашему вниманию тумбу ТВ «Ницца» – центральный элемент, способный преобразить вашу гостиную в оазис изысканной роскоши. Ее дизайн уверенно черпает вдохновение из эстетики современной классики с отчетливыми элементами ар-деко, предлагая идеальный баланс между смелыми геометрическими линиями и утонченными деталями. Тумба «Ницца» – это воплощение респектабельности, призванное мгновенно придать пространству ощущение элитного и продуманного интерьера, где каждая деталь говорит о безупречном вкусе.\n\nКаждая деталь тумбы «Ницца» продумана до совершенства, создавая визуальную и тактильную гармонию. Фасады тумбы украшены изящной вертикальной фрезеровкой, которая придает поверхности объем и игру света, подчеркивая ее уникальный характер и создавая динамичный, но при этом гармоничный вид. Гладкая, будто атласная столешница, выполненная в благородном светло-сером или бежевом оттенке, создает идеальный контраст с фактурными фасадами и служит безупречной платформой для декора или дополнительных устройств, привнося нотку утонченности. Завершает образ элегантное золотистое металлическое основание, которое не только придает конструкции легкость и устойчивость, но и вносит акцент роскоши и гламура, характерный для самых дорогих интерьеров.\n\nЦветовая палитра тумбы «Ницца» отличается благородством и сдержанностью. Основной тон – это изысканный серо-бежевый (грейдж), который легко интегрируется в любую цветовую схему, добавляя теплоты и уюта, при этом сохраняя безукоризненную нейтральность. Золотые акценты блестяще дополняют этот спокойный фон, создавая ощущение достатка и изысканности. Особого внимания заслуживает настенная панель для ТВ, выполненная в идентичном стиле и цвете, она идеально обрамляет ваш телевизор, превращая его в часть единой, гармоничной композиции и завершая образ элитного медиацентра.\n\nТумба ТВ «Ницца» от \"Aura\" не просто предлагает место для вашего оборудования; она создает целую атмосферу утонченности и комфорта. Это предмет, который говорит о безупречном вкусе владельца, его стремлении к красоте и функциональности без компромиссов. Позвольте этому произведению мебельного искусства стать сердцем вашей гостиной, вдохновляя вас каждый день на новые открытия в мире комфорта и стиля.\n\n### Техническая информация:\n\n*   **Тип:** Тумба ТВ / Медиаконсоль.\n*   **Материал:**\n    *   Корпус и фасады: МДФ с высококачественным покрытием (вероятно, эмаль или ламинат).\n    *   Столешница: Гладкий материал с матовым или полуглянцевым покрытием (предположительно МДФ с эмалью или композит).\n    *   Основание и декоративные элементы: Металл.\n*   **Цвет:**\n    *   Основной: Светло-серый / Серо-бежевый (грейдж).\n    *   Акценты: Золотой (металлическое основание и элементы декора).\n*   **Особенности:**\n    *   Фасады с выразительной вертикальной рельефной фрезеровкой.\n    *   Элегантное металлическое основание золотистого цвета.\n    *   Гладкая, однотонная столешница.\n    *   Настенная панель для ТВ овальной формы, выполненная в тон тумбе.\n    *   Визуально состоит из двух модулей (одна открытая секция/ниша слева и закрытая секция с тремя горизонтальными линиями, имитирующими ящики, справа)."},{"id":"HlSnFl30eF99vPQy4oPF","name":"Агата","price":165000,"imageUrls":["https://label-com.ru/images/virtuemart/product/agata.png"],"category":"Спальни","originalUrl":"https://label-com.ru/katalog/spalni/agata-detail.html","createdAt":"2025-11-24T15:26:21.815Z","updatedAt":"2025-11-24T15:26:21.815Z","rating":0,"reviews":[],"details":{"dimensions":"2220  x 1440  x 2040\n","material":"","care":""},"description":"Коллекция \"Агата\" — спальный гарнитур, где каждая деталь продумана до совершенства, чтобы превратить Вашу спальню в настоящий оазис роскоши и умиротворения. Этот ансамбль мебели виртуозно сочетает в себе элегантность современной классики с притягательным блеском гламура, создавая атмосферу изысканного комфорта и благородного шика. Гармоничное слияние мягких кремовых оттенков с сияющими золотыми акцентами придает коллекции особую легкость и воздушность, наполняя пространство светом и ощущением безупречного стиля.\n\nВ центре композиции — величественная кровать, привлекающая взгляд своим неповторимым мягким изголовьем. Обитое роскошным велюром нежного кремового цвета, оно украшено уникальной, плавно расходящейся волнообразной стежкой, напоминающей лучи солнца, исходящие от центральной золотой декоративной вставки. Это дизайнерское решение не только создает ощущение обволакивающего уюта, но и становится ярким акцентом интерьера. Прикроватные тумбы вторят изяществу кровати: их глянцевые поверхности, изысканные золотые ручки в форме веера и утонченные конусовидные ножки из металла подчеркивают общую эстетику и функциональность.\n\nЗавершают ансамбль вместительный шкаф для одежды и элегантный туалетный столик с зеркалом. Шкаф поражает своей монументальностью и продуманным дизайном: его высокие глянцевые фасады чередуются с зеркальными дверями, зрительно расширяющими пространство и наполняющими комнату светом. Золотистые вертикальные акценты и интегрированные ручки придают шкафу особую графичность и шарм. Туалетный столик, оснащенный функциональными ящиками и большим зеркалом в стильной раме, в комплекте с очаровательным мягким пуфом на золотистом основании, создает идеальное место для утренних ритуалов красоты. Коллекция \"Агата\" — это не просто мебель, это приглашение окунуться в мир абсолютного комфорта и эстетического наслаждения, где каждая линия и фактура говорят о высоком вкусе и стремлении к совершенству.\n\n---\n\n**Техническая информация:**\n\n*   **Тип:** Спальный гарнитур\n*   **Комплектация:** Кровать двуспальная, две прикроватные тумбы, шкаф для одежды, туалетный столик с зеркалом, мягкий пуф.\n*   **Стиль:** Современная классика, Неоклассика, Гламур.\n*   **Материал:**\n    *   Корпусная мебель (тумбы, шкаф, столик): Высококачественный МДФ с глянцевым лаковым покрытием.\n    *   Изголовье кровати и пуф: Мягкая обивка из велюра.\n    *   Декоративные элементы, ручки, ножки: Металл с золотистым покрытием.\n    *   Фасады шкафа и зеркало трюмо: Зеркальное полотно.\n*   **Цвет:**\n    *   Основной: Кремовый / Светло-бежевый (корпуса мебели, обивка).\n    *   Акценты: Золотой (декор, фурнитура, ножки).\n*   **Особенности:**\n    *   Мягкое изголовье кровати с эксклюзивной волнообразной / веерной стежкой и центральным золотым акцентом.\n    *   Глянцевые, легко моющиеся поверхности фасадов.\n    *   Элегантные металлические ножки конусовидной формы на всех элементах.\n    *   Уникальная золотая фурнитура в форме раковины или веера.\n    *   Зеркальные фасады шкафа для визуального расширения пространства.\n    *   Функциональный туалетный столик с выдвижными ящиками и мягким пуфом в комплекте."},{"id":"I8uDXiQkQu5zFV5iompe","name":"Ирис, сатин, 6 пред.","price":169550,"imageUrls":["https://label-com.ru/images/virtuemart/product/15.jpg"],"category":"Спальни","originalUrl":"https://label-com.ru/katalog/spalni/iris-2c-satin-2c-6-pred-detail.html","createdAt":"2025-11-24T15:26:21.835Z","updatedAt":"2025-11-24T15:26:21.835Z","rating":0,"reviews":[],"details":{"dimensions":"","material":"","care":""},"description":"Добро пожаловать в мир утонченной элегантности и непревзойденного комфорта с коллекцией \"Ирис, сатин\" от \"Aura\". Этот спальный гарнитур, состоящий из шести предметов, воплощает собой идеальный баланс между современной эстетикой и мягкой роскошью. С первого взгляда он очаровывает своими плавными линиями и обволакивающей нежностью, создавая атмосферу спокойствия и уюта, где каждая деталь продумана для вашего максимального расслабления. Это не просто мебель – это приглашение в оазис личного пространства, где безупречный стиль встречается с функциональностью.\n\nСердцем коллекции является двуспальная кровать с уникальным мягким изголовьем. Его объемные, закругленные формы, обтянутые роскошной тканью светло-кремового оттенка, словно нежное объятие, обещают безмятежный сон. Низкое основание кровати также обито, что придает ей цельный и завершенный вид. Прикроватные тумбы гармонично дополняют композицию: их светлые фасады с т \" призвана стать блистательным акцентом вашей гостиной, наполнив её атмосферой изысканности и безграничного комфорта.\n\nВ основе \"ИМПЕРИИ\" лежит мастерски выполненный каркас, поражающий обилием филигранной резьбы. Изящные флористические мотивы, витиеватые завитки и классические орнаменты, характерные для стилей барокко и рококо, вручную выточены из дерева и покрыты благородным оттенком шампань или светлого золота, который мягко переливается на свету, подчеркивая каждый изгиб. Эта рама не только служит надежной опорой, но и является ключевым элементом декора, придающим всему комплекту королевский вид.\n\nОбивка гарнитура выполнена из высококачественной, плотной мебельной ткани, узор которой напоминает старинный дамаск или жаккард с классическими медальонами и арабесками. Мягкий, мерцающий бежево-золотистый оттенок обивки идеально гармонирует с цветом каркаса, создавая единый, обволакивающий ансамбль. Спинки дивана и кресел украшены глубокой каретной стяжкой (капитоне), добавляющей объём, тактильную мягкость и дополнительный шарм. Многочисленные декоративные подушки, разных форм и с узорами, усиливают ощущение уюта и приглашают погрузиться в мир безмятежного отдыха.\n\n\"ИМПЕРИЯ\" — это больше, чем просто комплект мебели; это инвестиция в атмосферу роскоши, комфорта и непреходящей красоты вашего дома. Она идеально впишется в интерьеры, оформленные в классическом, неоклассическом или дворцовом стиле, став их величественным сердцем. С этим гарнитуром каждый момент, проведенный дома, будет наполнен ощущением исключительности и утонченного вкуса.\n\n---\n\n### Техническая информация:\n\n*   **Тип:** Гостиный гарнитур (Комплект мягкой мебели).\n*   **Состав комплекта:** Трехместный диван – 1 шт., кресло – 2 шт.\n*   **Стиль:** Барокко / Рококо / Классический.\n*   **Материал каркаса:** Предположительно массив дерева с объемным резным декором и покрытием под благородный металл (оттенок шампань/светлое золото/серебристо-бежевый).\n*   **Материал обивки:** Высококачественная мебельная ткань (вероятно, жаккард или дамаск) с классическим орнаментом.\n*   **Цвет:** Шампань / Светло-золотистый / Бежевый (для каркаса и обивки), с более насыщенными акцентами в узоре.\n*   **Особенности:**\n    *   Массивная резная рама с витиеватым декоративным узором.\n    *   Глубокая каретная стяжка (капитоне) на спинках дивана и кресел.\n    *   Фигурные резные ножки.\n    *   Комплект декоративных подушек (квадратные и круглые) с различными узорами.\n    *   Мягкие, комфортные подлокотники и сиденья."},{"id":"IqDjwNjaGOJpmevHF5Wg","name":"Модель Новелла","price":168000,"imageUrls":["https://label-com.ru/images/virtuemart/product/NOVELLA1.jpeg"],"category":"Мягкая мебель","originalUrl":"https://label-com.ru/katalog/myagkaya-mebel/model-novella-detail.html","rating":0,"reviews":[],"createdAt":{"_seconds":1764053413,"_nanoseconds":687000000},"description":"Представляем вашему вниманию \"Модель Новелла\" – истинное воплощение роскоши и безупречного вкуса, которое перенесет вас в эпоху дворцовой элегантности. Этот изысканный комплект мебели для гостиной моментально преображает пространство, наполняя его атмосферой величия и утонченного комфорта. Он идеально впишется в интерьеры, выполненные в классическом стиле, барокко или неоклассицизме, становясь центральным акцентом и предметом восхищения.\n\nВзгляните на великолепный резной деревянный каркас, выполненный из благородного темного дерева, напоминающего глубокий оттенок ореха или венге. Каждая деталь – от фигурных ножек и изящно изогнутых подлокотников до величественной спинки дивана и кресел – украшена сложной, виртуозной резьбой. Цветочные мотивы, стилизованные листья и рокайльные орнаменты создают ощущение ручной работы и высочайшего мастерства, придавая мебели поистине царственный облик. Полированная поверхность дерева мягко поблескивает, подчеркивая глубину узора.\n\nОбивка комплекта \"Новелла\" не уступает каркасу в своей роскоши. Основной текстиль представляет собой плотную, высококачественную ткань с утонченным узором \"дамаск\" в нежных золотисто-бежевых тонах. Этот благородный орнамент гармонично сочетается с мягкой, однотонной обивкой светло-кремового или жемчужно-серого оттенка, которая подчеркивает изгибы подлокотников и обрамляет подушки. Дополнительные подушки различной формы, включая круглую с декоративной утяжкой и прямоугольные с изысканной бахромой, создают дополнительный объем и уют, а съемные чехлы на подлокотниках, украшенные элегантными кистями, добавляют последний штрих к этому великолепному ансамблю.\n\n\"Модель Новелла\" – это не просто мебель, это приглашение в мир комфорта и эстетического наслаждения. Она обещает не только изысканный внешний вид, но и невероятную мягкость сидений и спинок, создавая идеальные условия для долгих бесед, уютных вечеров с книгой или приема почетных гостей. Позвольте себе окружить себя предметами, которые воплощают вечную красоту и непревзойденное качество.\n\n---\n\n**Техническая информация:**\n\n*   **Тип:** Гостиный гарнитур (комплект, включающий диван и два кресла).\n*   **Материал:** Массив дерева (для каркаса и декоративных элементов), высококачественный текстиль (жаккард с узором дамаск, однотонный велюр/микровелюр).\n*   **Цвет:** Тёмно-коричневый (каркас, оттенок ореха/венге), золотисто-бежевый (основная обивка с узором), светло-кремовый/жемчужно-серый (дополнительная однотонная обивка и подушки).\n*   **Особенности:**\n    *   Глубокая, детализированная ручная резьба по дереву (цветочные и рокайльные мотивы) на каркасе, подлокотниках и ножках.\n    *   Фигурные ножки.\n    *   Основная обивка с классическим узором \"дамаск\".\n    *   Декоративные подушки различных форм и размеров (прямоугольные, квадратные, круглая с утяжкой).\n    *   Бахрома на некоторых декоративных подушках.\n    *   Съемные чехлы-накидки на подлокотники с декоративными кистями-подхватами.\n    *   Изогнутые формы спинок и подлокотников, характерные для классического стиля."},{"id":"IzIr15wwO5QkOC1ytYcR","name":"ГРАНАДА","price":143000,"imageUrls":["https://label-com.ru/images/virtuemart/product/granada.jpg"],"category":"Мягкая мебель","originalUrl":"https://label-com.ru/katalog/myagkaya-mebel/granada-detail.html","rating":0,"reviews":[],"createdAt":{"_seconds":1764053183,"_nanoseconds":400000000},"description":"Представляем вашему вниманию \"ГРАНАДА\" – воплощение современного комфорта и утонченной элегантности от мебельного магазина \"Aura\". Этот роскошный комплект мягкой мебели, вдохновленный принципами современной классики, призван стать центральным элементом вашей гостиной, предлагая не просто место для отдыха, а целую философию уютного и стильного пространства. Его изящные линии и обволакивающие формы создают атмосферу спокойствия и благополучия, приглашая окунуться в мир абсолютного комфорта.\n\nВзгляд моментально притягивает благородная палитра и тактильные материалы. Основная обивка выполнена из высококачественного, приятного на ощупь фактурного текстиля, представленного в универсальном и глубоком оттенке грейдж – идеальном балансе между серым и бежевым, который легко интегрируется в любой интерьер. Контраст светлого основания, оттенка топленого молока, придает композиции легкость и завершенность, а тонкие, изящные ножки из натурального светлого дерева подчеркивают естественность и лаконичность дизайна. Дополнительные подушки молочного цвета расставляют мягкие акценты, усиливая ощущение уюта.\n\nКомплект \"ГРАНАДА\" демонстрирует продуманную модульность и функциональность. Диванная группа состоит из нескольких элементов, включая центральный диван, два элегантных кресла с закругленными формами и круглый пуф-оттоманку, который может служить как подставкой для ног, так и дополнительным местом для сидения или даже кофейным столиком. Каждый элемент отличает мягкая, объемная посадка и эргономичный дизайн, обеспечивающие максимальный релакс. Округлые очертания подлокотников и спинок добавляют дизайну нежности и приглашающей мягкости, делая \"ГРАНАДА\" идеальным выбором для долгих вечеров в кругу семьи или дружеских бесед.\n\n\"ГРАНАДА\" – это не просто мебель, это инвестиция в ваше самочувствие и эстетику домашнего очага. Она привносит в пространство ощущение гармонии, роскоши без излишеств и исключительного комфорта. Создайте в своей гостиной оазис спокойствия и безупречного стиля, где каждая деталь работает на создание идеальной атмосферы для жизни и отдыха.\n\n### Техническая информация:\n\n*   **Тип:** Модульная диванная группа для гостиной.\n*   **Материал обивки:** Фактурный текстиль.\n*   **Материал ножек:** Натуральное дерево.\n*   **Цвет основной обивки:** Серо-бежевый (грейдж).\n*   **Цвет основания:** Светло-бежевый / Молочный.\n*   **Цвет акцентных подушек:** Светло-кремовый / Молочный.\n*   **Особенности:** Модульная конструкция, округлые формы, мягкие объемные подушки, контрастное основание, деревянные ножки."},{"id":"JSx03m8i9cLKbM19iH31","name":"Богемия-нью","price":84150,"imageUrls":["https://label-com.ru/images/virtuemart/product/bogemia.jpg"],"category":"Спальни","originalUrl":"https://label-com.ru/katalog/spalni/bogemiya-nyu-detail.html","createdAt":"2025-11-24T15:26:21.823Z","updatedAt":"2025-11-24T15:26:21.823Z","rating":0,"reviews":[],"details":{"dimensions":"","material":"","care":""},"description":"Добро пожаловать в мир утонченной роскоши с мебельной коллекцией \"Богемия-нью\" от \"Aura\". Этот спальный гарнитур – воплощение неоклассического стиля, где вечная элегантность встречается с современным комфортом и глянцевым шиком. Каждый элемент коллекции тщательно продуман, чтобы создать атмосферу изобилия и спокойствия, превращая вашу спальню в настоящий королевский будуар. Золотистые акценты и изысканные детали переплетаются с мягкими линиями и светлыми оттенками, придавая интерьеру неповторимую харизму.\n\nЦентральным элементом \"Богемия-нью\" является великолепная кровать, манящая своим роскошным изголовьем. Оно выполнено в технике глубокой каретной стяжки (капитоне), обитой благородным текстилем цвета шампань, который переливается под светом, создавая игру теней. Вставки с декоративными элементами и блестящими пуговицами подчеркивают изысканность, а золотистая рама завершает образ, придавая кровати монументальность и величие. Основание кровати также украшено изящными декоративными панелями, продолжающими общую стилистику, обеспечивая гармонию и завершенность ансамбля.\n\nФункциональность и красота идеально сочетаются в вместительном шкафу-купе и элегантном комоде. Шкаф-купе, выполненный в нежном кремовом цвете, оснащен раздвижными дверями, одна из которых представляет собой цельное зеркальное полотно, визуально расширяющее пространство и добавляющее света. Декоративные квадратные вставки с золотистой окантовкой на фасадах и изящный карниз по верхней части шкафа перекликаются с деталями кровати. Комод с тремя выдвижными ящиками, украшенный аналогичными золотистыми рамками и декоративными элементами, дополнен большим зеркалом в шикарной раме, создавая идеальное место для утренних ритуалов.\n\nГарнитур \"Богемия-нью\" — это не просто мебель, это целостная концепция, способная преобразить любое пространство, наполнив его аристократическим духом и комфортом. Изысканная палитра светлых тонов в сочетании с теплыми золотистыми акцентами создает ощущение легкости и воздушности, при этом подчеркивая высокий статус и безупречный вкус владельца. Позвольте себе погрузиться в атмосферу утонченной роскоши и безмятежности с этим великолепным комплектом.\n\n***\n\n### Техническая информация:\n\n*   **Тип:** Спальный гарнитур\n*   **Состав комплекта (видимые элементы):** Кровать двуспальная, Шкаф-купе, Комод с тремя ящиками, Зеркало настенное/настольное (для комода), Прикроватная тумба (частично видна).\n*   **Материал:**\n    *   Корпус и фасады: Гладкая поверхность из ЛДСП/МДФ в кремовом/светло-бежевом оттенке.\n    *   Изголовье кровати: Обивка из мягкого текстиля (предположительно велюр/микровелюр) в бежево-шампань тонах.\n    *   Декоративные элементы: Золотистые молдинги и квадратные вставки (предположительно из пластика или МДФ с глянцевым покрытием).\n    *   Зеркала: Стеклянные полотна.\n*   **Цвет:**\n    *   Основной: Кремовый / Светло-бежевый / Слоновая кость.\n    *   Акценты: Золотой.\n    *   Обивка изголовья: Бежевый / Шампань.\n*   **Особенности:**\n    *   Изголовье кровати с глубокой каретной стяжкой (капитоне) и декоративными пуговицами/кристаллами.\n    *   Золотистая окантовка и декоративные квадратные вставки на всех элементах гарнитура.\n    *   Шкаф-купе с раздвижными дверями, включая одну зеркальную дверь.\n    *   Элегантный декоративный карниз на шкафу.\n    *   Зеркало в массивной золотистой раме.\n    *   Высокое качество исполнения и внимание к деталям."},{"id":"Jx7Lf0kYKbvQxS2fyHru","name":"Стол Роза","price":25000,"imageUrls":["https://label-com.ru/images/virtuemart/product/stol_Roza2.jpg"],"category":"Гостиная","originalUrl":"https://label-com.ru/katalog/gostinaya/stol-roza-1-detail.html","rating":0,"reviews":[],"createdAt":{"_seconds":1764053734,"_nanoseconds":359000000},"description":"Добро пожаловать в \"Aura\" – мир изысканной мебели, где каждый предмет искусства создан, чтобы дарить красоту и комфорт. Представляем вам обеденный гарнитур \"Стол Роза\" – воплощение элегантности и классического шика, вдохновленного традициями дворцового стиля и неоклассики. Этот ансамбль, словно жемчужина, готов стать центральным украшением вашей столовой, наполняя ее атмосферой торжественности и утонченного вкуса, где каждое семейное торжество или дружеская встреча превратятся в незабываемое событие.\n\nСердцем этого великолепия является просторный стол с безупречно гладкой глянцевой столешницей, выполненной в сияющем молочно-белом оттенке. Ее слегка закругленные края и отражающая свет поверхность создают ощущение простора и воздушности, визуально увеличивая пространство. Столешница опирается на две массивные фигурные опоры, каждая из которых является образцом искусной работы: их объемные формы украшены витиеватой резьбой, имитирующей изящные завитки и растительные мотивы, что придает столу особую монументальность и благородство.\n\nИдеальным дополнением к столу выступают шесть стульев, выполненных в едином стилевом решении. Прочные каркасы стульев, выкрашенные в тон столу – ослепительный белый, – увенчаны высокими фигурными спинками. Их верхняя часть украшена классическим греческим узором \"меандр\", а в центре каждой спинки красуется выразительный резной медальон, который придает изделию аристократический вид. Сиденья стульев обиты гладким материалом глубокого графитового оттенка, который создает эффектный контраст с белым каркасом, подчеркивая чистоту линий и обеспечивая комфортную посадку.\n\n\"Стол Роза\" от \"Aura\" – это не просто обеденная группа, это заявление о безупречном вкусе и стремлении к совершенству. Он идеально впишется в интерьеры, тяготеющие к классике, неоклассике или ар-деко, привнося в ваш дом ощущение роскоши, гармонии и элегантности, неподвластной времени. Позвольте себе погрузиться в мир истинного благородства с этим великолепным гарнитуром.\n\n**Техническая информация:**\n\n*   **Тип:** Обеденная группа (стол и 6 стульев)\n*   **Стиль:** Неоклассический / Классический\n*   **Форма столешницы:** Овальная с закругленными углами\n*   **Цвет каркаса и столешницы:** Белый / Молочно-белый (глянцевый финиш)\n*   **Материал столешницы:** Глянцевое покрытие (визуально похоже на лак или эмаль на МДФ)\n*   **Материал каркаса стола и стульев:** Массив дерева / Высококачественный МДФ (резные элементы)\n*   **Материал обивки сидений:** Глянцевая экокожа или текстиль (темно-серый / графитовый)\n*   **Особенности:**\n    *   Изысканная резьба на ножках стола в виде растительных орнаментов.\n    *   Фигурные спинки стульев с резными элементами: классический узор меандра и центральный стилизованный медальон.\n    *   Глянцевая, отражающая свет поверхность столешницы.\n    *   Комплект рассчитан на комфортное размещение 6 персон."},{"id":"K4xYzxHKbq9Fe6NWymb6","name":"Женева","price":104500,"imageUrls":["https://label-com.ru/images/virtuemart/product/kg_geneva.jpg"],"category":"Кухни","originalUrl":"https://label-com.ru/katalog/kukhni-1/zheneva-detail.html","createdAt":"2025-11-24T15:26:21.838Z","updatedAt":"2025-11-24T15:26:21.838Z","rating":0,"reviews":[],"details":{"dimensions":"","material":"","care":""},"description":"Добро пожаловать в мир утонченности и функциональности с кухонным гарнитуром \"Женева\" от Aura!\n\nПредставляем вашему вниманию кухонный гарнитур \"Женева\" – истинное воплощение современной классики, призванное стать сердцем вашего дома. Изысканный и светлый, он дарит ощущение простора и свежести, идеально вписываясь в интерьеры, где ценятся элегантность и продуманный дизайн. Безупречные линии и гармоничные пропорции создают атмосферу спокойствия и благородства, приглашая вас наслаждаться каждым моментом, проведенным на вашей кухне.\n\nГарнитур выполнен в чистом белом цвете, который излучает свет и визуально расширяет пространство. Фасады сочетают в себе гладкие поверхности и деликатные рамные элементы, подчеркивая неоклассический стиль. Особое внимание привлекает акцентный фартук с драматическим мраморным узором, где на белом фоне разворачиваются выразительные темно-серые или черные прожилки, придающие композиции динамичность и роскошь. Столешница, выполненная в более спокойном светло-сером мраморном рисунке, гармонично дополняет общую палитру, предлагая не только эстетическую привлекательность, но и практичность.\n\nПродуманные детали выделяют \"Женеву\" среди других. Высокие витрины со стеклянными дверцами, разделенными изящной решеткой, демонстрируют внутренние стеклянные полки, создавая идеальное пространство для демонстрации вашей посуды. Некоторые выдвижные ящики украшены вертикальной фрезеровкой, добавляющей текстурную игру и дополнительный шарм. Завершающим штрихом служат элегантные ручки-скобы золотистого оттенка, которые создают теплый металлический акцент на белоснежных фасадах, подчеркивая статус и внимание к деталям. Этот гарнитур не просто мебель, это произведение искусства, созданное для комфортной и красивой жизни.\n\n### Техническая информация:\n\n*   **Тип:** Кухонный гарнитур\n*   **Материал:**\n    *   Фасады и корпус: Высококачественный материал с матовым покрытием белого цвета (предположительно МДФ).\n    *   Столешница: Искусственный камень или ЛДСП с принтом под светлый мрамор.\n    *   Фартук: Декоративная панель с выраженным мраморным узором (белый фон с черными/серыми прожилками).\n    *   Дверцы: Глухие и стеклянные (с декоративной решеткой).\n    *   Ручки: Металлические, золотистого/латунного цвета.\n    *   Внутренние полки в витринах: Стекло.\n*   **Цвет:**\n    *   Основной: Белый (фасады, корпус).\n    *   Столешница: Светло-серый с мраморным узором.\n    *   Фартук: Белый с контрастными темно-серыми/черными прожилками.\n    *   Фурнитура: Золотистый/латунный.\n*   **Особенности:**\n    *   Стиль: Современная классика / Неоклассика.\n    *   Включает высокие шкафы-витрины со стеклянными дверцами и внутренними стеклянными полками.\n    *   Элегантный карниз по верхнему краю гарнитура.\n    *   Декоративные вертикальные фрезерованные элементы (рифление) на некоторых фасадах ящиков и верхней секции.\n    *   Современные ручки-скобы.\n    *   Общая длина: 4 метра 80 сантиметров."},{"id":"K9pcSHEQ69iJhp9aMokN","name":"Адалия","price":189200,"imageUrls":["https://label-com.ru/images/virtuemart/product/adaliya.jpg"],"category":"Спальни","originalUrl":"https://label-com.ru/katalog/spalni/adaliya-detail.html","createdAt":"2025-11-24T15:26:21.818Z","updatedAt":"2025-11-24T15:26:21.818Z","rating":0,"reviews":[],"details":{"dimensions":"","material":"","care":""},"description":"Добро пожаловать в мир утонченной роскоши и величественного комфорта с коллекцией \"Адалия\" от мебельного магазина \"Aura\". Этот спальный гарнитур — подлинное произведение мебельного искусства, созданное для тех, кто ценит дворцовый шик и неподвластную времени элегантность. С первого взгляда \"Адалия\" переносит нас в эпоху роскошных балов и аристократических салонов, где каждая деталь интерьера говорила о высоком статусе и безупречном вкусе владельца. Здесь классические мотивы витиеватой резьбы и богатого декора, присущие стилям необарокко и классицизма, гармонично сочетаются, создавая поистине королевскую атмосферу.\n\nЦентральным элементом гарнитура, бесспорно, является кровать с её грандиозным изголовьем. Массивная рама, отделанная под благородное золото с тонкой патиной, поражает обилием резных элементов: причудливые завитки, цветочные орнаменты и акцентированные короны венчают ложе. В контраст золоту, изголовье и изящная банкетка у изножья обтянуты мягчайшим велюром насыщенного бирюзового или глубокого аквамаринового цвета, выполненным в технике каретной стяжки (капитоне), что придает им дополнительный объем и роскошный вид. Этот бархатистый акцент приглашает к отдыху и неге, обещая незабываемые моменты уюта.\n\nПрикроватные тумбы и монументальный платяной шкаф вторят этому великолепию, создавая единый ансамбль. Их фасады выполнены из светлого кремово-бежевого материала с тонкой текстурой, напоминающей мрамор или дорогой шелк, украшенные золотистой росписью и витиеватыми рамами. Элементы золоченой резьбы и фигурные ножки, характерные для дворцового стиля, придают мебели легкость и изящество. Особое внимание уделено фурнитуре: изысканные ручки с инкрустацией под перламутр или кристалл завершают образ, добавляя финальные штрихи к этой симфонии роскоши. Просторный четырехдверный шкаф, с двумя центральными зеркальными дверцами, не только функционален, но и визуально расширяет пространство, наполняя его светом и отражая великолепие окружающего интерьера.\n\nКоллекция \"Адалия\" — это не просто мебель, это возможность создать в своей спальне уголок абсолютной гармонии, где каждый элемент работает на создание ощущения уюта, благородства и изысканного стиля. Сочетание глубокого бирюзового, сияющего золота и нежных кремовых оттенков создает атмосферу безмятежности и роскоши, превращая вашу спальню в личное убежище, достойное королевских особ.\n\n***\n\n### Техническая информация:\n\n*   **Тип:** Спальный гарнитур\n*   **Состав комплекта (видимый на фото):** Двуспальная кровать с высоким изголовьем и изножьем, две прикроватные тумбы, банкетка у изножья, четырехдверный платяной шкаф.\n*   **Материал:**\n    *   Каркас и декоративные элементы: Высококачественный МДФ или массив дерева с золотым лаковым покрытием / патиной и резным декором.\n    *   Обивка: Мягкий велюр / бархат.\n    *   Фасады: МДФ с кремовым лаковым покрытием и золотистой росписью/узором.\n    *   Столешницы тумб: Глянцевое лаковое покрытие.\n    *   Зеркала: На центральных дверцах шкафа.\n    *   Фурнитура: Металл с инкрустацией (под кристалл/перламутр).\n*   **Цвет:** Золотой, бирюзовый/аквамариновый, кремово-бежевый.\n*   **Особенности:**\n    *   Богатый резной декор в стиле барокко/классицизма.\n    *   Каретная стяжка (капитоне) на изголовье кровати и банкетке.\n    *   Фигурные резные ножки.\n    *   Глянцевые поверхности.\n    *   Зеркальные вставки на шкафу.\n    *   Изысканные ручки с декоративными элементами.\n    *   Узоры на фасадах тумб и шкафа."},{"id":"KOIzNgCLnhR9MusoCdJd","name":"Капри","price":187000,"imageUrls":["https://label-com.ru/images/virtuemart/product/kapri.png"],"category":"Спальни","originalUrl":"https://label-com.ru/katalog/spalni/kapri-detail.html","createdAt":"2025-11-24T15:26:21.835Z","updatedAt":"2025-11-24T15:26:21.835Z","rating":0,"reviews":[],"details":{"dimensions":"2100  x 1630  x 2080\n","material":"","care":""},"description":"Добро пожаловать в мир утонченной роскоши с коллекцией \"Капри\" от Aura. Представляем вашему вниманию совершенный спальный гарнитур, где каждая деталь призвана создать атмосферу безмятежного шика и комфорта. Эта коллекция — воплощение современной классики с отчетливыми элементами стиля ар-деко, гармонично сочетающая величественность форм и легкость светлых оттенков. Оттенки слоновой кости и мягкий бежевый доминируют, искусно дополненные золотыми акцентами, которые придают ансамблю изысканное сияние.\n\nЦентральное место в коллекции занимает роскошная кровать, манящая своим величественным изголовьем. Оно обито нежной тканью, напоминающей высококачественный велюр или бархат, и украшено элегантной ромбовидной стежкой, каждый ромб которой акцентирован сияющим золотым элементом. По бокам изголовье обрамляют высокие зеркальные вставки, визуально расширяющие пространство и отражающие мягкий свет. Интегрированные прикроватные тумбы продолжают эту изысканную линию, предлагая функциональность в безупречном стиле с чистыми линиями и деликатными золотыми ручками.\n\nПродолжают ансамбль величественный шкаф и изящный туалетный столик, выполненные в единой стилистике. Фасады шкафа и туалетного столика украшены уникальной ребристой отделкой, создающей игру света и тени и придающей поверхности динамичность. Центральные двери шкафа оснащены зеркальными панелями, что делает его не только вместительным хранилищем, но и визуальным акцентом, добавляющим глубины комнате. Золотые круглые ручки-диски на всех элементах гарнитура служат функциональным и эстетическим завершением, подчеркивая общую роскошную эстетику. Туалетный столик с его стройными золотыми ножками и удобным мягким пуфом на золотом основании приглашает насладиться моментами заботы о себе.\n\nКоллекция \"Капри\" от Aura – это не просто мебель, это философия жизни, где каждая де деталь продумана для создания идеального пространства для отдыха и релаксации. Общая атмосфера, которую создает этот гарнитур, наполнена спокойствием и достоинством. Теплые оттенки, тактильно приятные материалы и продуманные золотые акценты формируют интерьер, достойный самых взыскательных ценителей красоты и уюта.\n\n---\n\n**Техническая информация:**\n\n*   **Тип:** Спальный гарнитур / Комплект для спальни\n*   **Материал:**\n    *   Корпус: Вероятно, МДФ/ЛДСП с матовой или полуглянцевой отделкой и выраженной ребристой фрезеровкой.\n    *   Обивка: Мягкая мебельная ткань (предположительно велюр или схожий материал) на изголовье кровати и пуфе.\n    *   Акценты: Металлические элементы под золото/латунь, зеркальные вставки.\n*   **Цвет:** Оттенок слоновой кости / Светло-бежевый / Кремовый (основной), Золотой (акценты).\n*   **Особенности:**\n    *   Кровать с высоким мягким изголовьем, декорированным ромбовидной стежкой и золотыми вставками.\n    *   Интегрированные прикроватные тумбы с гладкой поверхностью и золотыми ножками/акцентами, обрамленные высокими зеркальными панелями.\n    *   Четырехдверный шкаф с ребристыми внешними фасадами и двумя центральными зеркальными дверцами.\n    *   Туалетный столик с ребристой отделкой, одним выдвижным ящиком и золотыми металлическими ножками/акцентами.\n    *   Круглое настенное зеркало в раме с ребристой фактурой.\n    *   Мягкий цилиндрический пуф на золотом основании.\n    *   Круглые ручки-диски золотого цвета на всех элементах корпуса.\n    *   Декоративные металлические полоски золотого цвета на прикроватных тумбах и туалетном столике."},{"id":"KmHtvUBrP7ZXYEigns8d","name":"Стол Милана","imageUrls":["https://label-com.ru/images/virtuemart/product/stol_milana8.jpg"],"category":"Гостиная","originalUrl":"https://label-com.ru/katalog/gostinaya/stol-milana-1-detail.html","createdAt":"2025-11-24T15:26:21.848Z","updatedAt":"2025-11-24T15:26:21.848Z","rating":0,"reviews":[],"details":{"dimensions":"","material":"","care":""},"price":25000,"description":"## Стол Милана: Воплощение Изящества и Роскоши\n\nПредставляем вашему вниманию обеденную группу \"Милана\" – истинное произведение мебельного искусства, призванное стать центральным элементом вашей столовой. Этот ансамбль, выполненный в лучших традициях неоклассического стиля, сочетает в себе величественную элегантность и современную утонченность. Каждый элемент здесь дышит благородством, приглашая вас и ваших гостей окунуться в атмосферу изысканного комфорта и несравненной красоты, где каждый ужин превращается в торжество стиля.\n\nСердце композиции – стол \"Милана\" – восхищает своей овальной столешницей с безупречно глянцевой поверхностью цвета слоновой кости, которая мягко отражает свет, создавая ощущение простора и воздушности. Изящный периметр столешницы и фризовая часть украшены тонким золотистым кантом, подчеркивающим плавность линий и добавляющим нотку роскоши. Массивные, но при этом изящные ножки стола, выполненные в том же кремовом оттенке, декорированы деликатной резьбой в виде вертикальных желобков и завершаются золотистыми акцентами, придавая всей конструкции солидность и аристократический шарм.\n\nШесть стульев, входящих в гарнитур, являются идеальным дополнением к столу, продолжая его стилистическое единство. Их каркасы, повторяющие светлый оттенок и золотые детали стола, отличаются изящными резными ножками и округлыми спинками. Обивка стульев выполнена из благородного велюра глубокого синего цвета, создающего восхитительный контраст с основным светлым тоном мебели. Мягкие сиденья и спинки обещают исключительный комфорт, а бархатистая текстура добавляет тактильного наслаждения, делая каждую трапезу по-настоящему особенной.\n\nОбеденная группа \"Милана\" — это не просто мебель, это манифест вкуса, способный преобразить любое пространство, наполнив его шармом ушедших эпох и актуальной роскошью. Она идеально впишется в интерьер, где ценят классические формы, высокое качество и неповторимый стиль, становясь свидетельством вашего безупречного чувства прекрасного.\n\n### Техническая информация:\n\n*   **Тип:** Обеденная группа (стол + 6 стульев)\n*   **Материал:**\n    *   Столешница: Глянцевое покрытие (предположительно МДФ с эмалью)\n    *   Каркас стола и стульев: Массив дерева с эмалевым покрытием\n    *   Обивка стульев: Велюр\n*   **Цвет:**\n    *   Каркас/Столешница: Цвет слоновой кости / Кремовый\n    *   Обивка: Глубокий синий / Лазурный\n    *   Декор: Золотой\n*   **Особенности:**\n    *   Неоклассический стиль с элементами барокко\n    *   Овальная форма столешницы\n    *   Глянцевая поверхность стола\n    *   Резные/рифленые ножки стола и стульев\n    *   Золотистые акценты и окантовка\n    *   Мягкие стулья с округлыми спинками\n    *   Велюровая обивка стульев"},{"id":"LDZudkeFDKtTxQaIproM","name":"Верона","price":159750,"imageUrls":["https://label-com.ru/images/virtuemart/product/verona.jpg"],"category":"Мягкая мебель","originalUrl":"https://label-com.ru/katalog/myagkaya-mebel/verona-detail.html","rating":0,"reviews":[],"createdAt":{"_seconds":1764053161,"_nanoseconds":569000000},"description":"Представляем вам \"Верону\" — истинное воплощение утонченной элегантности и безукоризненного комфорта от мебельного магазина \"Aura\". Этот мебельный ансамбль мгновенно притягивает взгляд своей гармоничной формой и обещает непревзойденный уют в вашем доме. Идеально вписываясь в концепцию современной классики или минималистичного шика, \"Верона\" создает атмосферу спокойствия и изысканности, становясь бесспорным центром вашей гостиной.\n\nОбивка комплекта выполнена из роскошного, тактильно приятного материала, напоминающего нежный велюр или мягкий микровелюр, в благородном оттенке светло-бежевого, который легко комбинируется с любой палитрой интерьера. Плавные, слегка округлые линии подлокотников дивана и кресел словно приглашают к расслаблению, а аккуратные вертикальные швы на боковинах подчеркивают безупречное качество исполнения и внимание к деталям. Открытое деревянное основание и изящные конические ножки из натурального дерева теплого коричневого оттенка добавляют конструкции легкости и природного шарма, создавая визуальный контраст с мягкой обивкой.\n\nКаждая деталь \"Вероны\" продумана для вашего максимального комфорта. Глубокие, мягкие сиденья и съемные подушки спинки обеспечивают оптимальную поддержку, а дополняющие их контрастные декоративные подушки с графическим черно-белым зигзагообразным узором не только придают комплекту индивидуальность, но и служат стильным акцентом. Этот набор – не просто мебель, это приглашение замедлиться, насладиться моментом, провести время в кругу близких или уединиться с любимой книгой.\n\n\"Верона\" от Aura – это обещание стиля, уюта и долговечности, способное преобразить ваш дом в оазис комфорта и красоты.\n\n### Техническая информация:\n\n*   **Тип:** Мягкая мебель для гостиной (диван и кресла).\n*   **Материал:** Текстильная обивка (предположительно, велюр или микровелюр), каркас и ножки из массива дерева.\n*   **Цвет:** Обивка: светло-бежевый/грейдж; Деревянные элементы: натуральный коричневый; Декоративные подушки: узор в черно-белой гамме (черный, белый, серый, бежевый).\n*   **Особенности:** Современный дизайн с плавными линиями, открытое деревянное основание, конические деревянные ножки, съемные подушки спинки, декоративные подушки с геометрическим зигзагообразным узором."},{"id":"LX3hqNswivsiOuKPObvX","name":"Бруклин","price":83600,"imageUrls":["https://label-com.ru/images/virtuemart/product/bruklin.png"],"category":"Спальни","originalUrl":"https://label-com.ru/katalog/spalni/bruklin-detail.html","createdAt":"2025-11-24T15:26:21.823Z","updatedAt":"2025-11-24T15:26:21.823Z","rating":0,"reviews":[],"details":{"dimensions":"1900  x 1280  x 2060\n","material":"","care":""},"description":"**Коллекция \"Бруклин\" от Aura – Изысканность в Каждой Детали**\n\nПредставляем коллекцию \"Бруклин\" от Aura – воплощение современного комфорта и безупречного стиля, созданное для тех, кто ценит гармонию и функциональность в интерьере. Этот спальный гарнитур мгновенно преобразит вашу комнату в оазис спокойствия и изысканности, предлагая идеальное пространство для отдыха и восстановления сил. Вдохновленный лаконичностью современного дизайна, \"Бруклин\" гармонично сочетает в себе практичность и эстетику, создавая при этом атмосферу уюта и легкости, где каждая деталь продумана до совершенства.\n\nВ основе дизайна \"Бруклин\" лежит искусная игра контрастов и текстур. Теплые, натуральные древесные оттенки корпуса, напоминающие светлый дуб или орех, придают мебели естественное очарование и домашний уют, приглашая к расслаблению. Эти природные тона элегантно дополнены матовыми светло-серыми фасадами, которые привносят в интерьер нотки скандинавской свежести и минимализма. Особое внимание привлекает высокое мягкое изголовье кровати, выполненное в глубоком антрацитовом цвете с аккуратной вертикальной стежкой – оно не только обеспечивает исключительный комфорт, но и служит выразительным акцентом, подчеркивающим современный характер коллекции.\n\nКоллекция \"Бруклин\" представляет собой тщательно продуманное до мелочей комплексное решение для спальни. Функциональный шкаф с широким зеркалом в полный рост, визуально расширяющим пространство и добавляющим света, удобные прикроватные тумбы с плавными выдвижными ящиками и элегантный туалетный столик с зеркалом – каждый элемент гарнитура способствует созданию упорядоченного и стильного интерьера. Сдержанные, но выразительные черные ручки на фасадах подчеркивают утонченный дизайн и обеспечивают удобство использования. \"Бруклин\" – это не просто мебель, это приглашение в мир, где каждый день начинается и заканчивается в атмосфере спокойной роскоши и безупречного вкуса.\n\n---\n\n**Техническая информация:**\n\n*   **Тип:** Спальный гарнитур.\n    *   Включает: Кровать двуспальная, две прикроватные тумбы, шкаф для одежды, туалетный столик с зеркалом.\n*   **Материал:**\n    *   Корпус: Высококачественное ЛДСП/МДФ с фактурой под натуральное дерево (светло-коричневый оттенок).\n    *   Фасады: ЛДСП/МДФ в матовом светло-сером цвете.\n    *   Изголовье кровати: Мягкое, обитое мебельной тканью (велюр/рогожка) в темно-сером/антрацитовом цвете.\n    *   Зеркальные элементы: Встроенное зеркало на дверце шкафа, зеркало в деревянной раме для туалетного столика.\n    *   Фурнитура: Металлические ручки черного цвета.\n*   **Цвет:** Сочетание натурального древесного оттенка, матового светло-серого и глубокого темно-серого (антрацитового).\n*   **Особенности:**\n    *   Мягкое изголовье кровати с элегантной вертикальной стежкой.\n    *   Вместительный шкаф с одной зеркальной дверью в полный рост.\n    *   Ящики прикроватных тумб и туалетного столика оснащены современными ручками.\n    *   Комплексное решение для создания гармоничного и функционального интерьера спальни.\n    *   Современный дизайн с элементами минимализма и скандинавского стиля."},{"id":"MbVBNZhnh2oKuedJbUJ0","name":"Венеция","price":96800,"imageUrls":["https://label-com.ru/images/virtuemart/product/venecija_4,2.jpg"],"category":"Кухни","originalUrl":"https://label-com.ru/katalog/kukhni-1/venetsiya-detail.html","createdAt":"2025-11-24T15:26:21.837Z","updatedAt":"2025-11-24T15:26:21.837Z","rating":0,"reviews":[],"details":{"dimensions":"","material":"","care":""},"description":"Добро пожаловать в мир утонченной элегантности с кухонным гарнитуром \"Венеция\" от Aura. Этот шедевр мебельного искусства перенесет вас в атмосферу дворцовой роскоши и вневременной классики, где каждый элемент пропитан изысканностью и вниманием к деталям. \"Венеция\" – это не просто кухня, это сердце вашего дома, созданное для тех, кто ценит красоту, функциональность и уют в каждой линии.\n\nФасады гарнитура выполнены в благородном оттенке слоновой кости или светлого крема, придавая пространству легкость и воздушность. Глубокая фрезеровка с рамочной конструкцией, подчеркнутая деликатной патиной, имитирует эффект старины и придает объем. Декоративные пилястры, резные карнизы и величественный портал вытяжки с центральным орнаментом в стиле барокко или рококо, становятся главными акцентами, отсылая к архитектурным шедеврам европейских столиц. Особое очарование придают верхние шкафы со вставками из матового стекла, украшенными изящным витиеватым узором, а также перфорированные панели, добавляющие легкости и воздушности.\n\nВеличественный светлый ансамбль гармонично дополняется контрастной столешницей и фартуком глубокого черного или темно-серого цвета, создающими эффектный акцент и подчеркивающими практичность рабочей зоны. Этот контраст придает кухне современное звучание, не нарушая при этом классической гармонии. Фурнитура в виде темных фигурных ручек идеально вписывается в общую концепцию, напоминая об антикварных изделиях и завершая образ изысканной роскоши. Высокие пеналы по бокам обеспечивают внушительные возможности для хранения, сохраняя при этом эстетическую целостность и симметрию композиции.\n\n\"Венеция\" от Aura – это обещание не только функциональности, но и эстетического наслаждения. Она создана, чтобы вдохновлять на кулинарные подвиги и собирать вокруг себя самых близких, превращая обыденные моменты в драгоценные воспоминания. Позвольте себе погрузиться в атмосферу утонченной роскоши, которую предлагает этот уникальный кухонный гарнитур.\n\n### Техническая информация:\n\n*   **Тип:** Кухонный гарнитур / Модульная кухня\n*   **Стиль:** Классический / Неоклассический / Барокко\n*   **Материал:**\n    *   Фасады: Возможно, МДФ с фрезеровкой и патиной / Массив дерева (покраска)\n    *   Столешница и фартук: Темный искусственный или натуральный камень (например, гранит)\n    *   Вставки: Матовое стекло с декоративным узором, перфорированные панели\n    *   Фурнитура: Металл (темный, под \"античную бронзу\" или \"черный\")\n*   **Цвет:**\n    *   Фасады: Светло-кремовый / Слоновая кость\n    *   Столешница и фартук: Черный / Темно-серый\n    *   Декоративные элементы и узоры: Светлый (на фасадах и стекле), темный (на ручках)\n*   **Особенности:**\n    *   Декоративные резные элементы: пилястры, карнизы, корона над вытяжкой\n    *   Фрезерованные фасады с патиной\n    *   Встроенная вытяжка с декоративным порталом и центральным орнаментом\n    *   Стеклянные вставки с изящным витиеватым узором на верхних шкафах\n    *   Перфорированные вставки на дверцах некоторых верхних шкафов\n    *   Высокие шкафы-пеналы для встраиваемой техники или хранения\n    *   Контрастное сочетание светлых фасадов с темными столешницей и фартуком\n    *   Фигурные металлические ручки."},{"id":"NIZOKOKROlKYo4qqXPQI","name":"Граффити","price":104500,"imageUrls":["https://label-com.ru/images/virtuemart/product/graffiti.png"],"category":"Спальни","originalUrl":"https://label-com.ru/katalog/spalni/graffiti-detail.html","createdAt":"2025-11-24T15:26:21.825Z","updatedAt":"2025-11-24T15:26:21.825Z","rating":0,"reviews":[],"details":{"dimensions":"","material":"","care":""},"description":"**Коллекция \"Граффити\" – Искусство Вашей Спальни от Aura**\n\nПозвольте представить спальный гарнитур \"Граффити\" – воплощение современного стиля, где каждая деталь продумана для создания атмосферы утонченной роскоши и комфорта. Эта коллекция призвана стать не просто мебелью, а полноценным художественным заявлением в вашем интерьере, сочетающим в себе строгие линии и выразительные акценты. \"Граффити\" идеально подходит для тех, кто ценит элегантность, функциональность и индивидуальность в дизайне своего личного пространства.\n\nЦентральное место в гарнитуре занимает массивная кровать с высоким, мягким изголовьем, обтянутым благородным велюром насыщенного серого оттенка. Дизайн изголовья завораживает своим уникальным рельефным узором, напоминающим плавные, органичные линии или абстрактное граффити, придавая спальному месту динамику и неповторимый характер. Это не просто декор, а тактильно приятный элемент, приглашающий к полному расслаблению. Каркас кровати, выполненный в единой цветовой гамме, подчеркивает ее основательность и современную лаконичность.\n\nДополняют ансамбль вместительный платяной шкаф, две элегантные прикроватные тумбы и функциональный туалетный столик с широким зеркалом, в комплекте с которым идет мягкий пуф. Все корпусные элементы выполнены в глубоком темно-сером цвете, их гладкие, безупречные фасады создают ощущение целостности и порядка. Главной изюминкой коллекции, оправдывающей ее название, являются боковые панели мебели, украшенные эффектным геометрическим орнаментом в золотисто-бронзовых тонах. Этот стильный узор придает каждому предмету особый шик ло-бежевый (основной), золотой (декоративные элементы), темно-синий с золотым (декоративные подушки).\n*   **Особенности:** Ромбовидная стежка (капитоне) на внешних сторонах кресел и спинке дивана, золотистая окантовка/кант, фигурные металлические ножки, декоративные подушки с геометрическим орнаментом."},{"id":"P5eBgMhdJqkG7mk91NLC","name":"Мария","price":104500,"imageUrls":["https://label-com.ru/images/virtuemart/product/marija_4,8.jpg"],"category":"Кухни","originalUrl":"https://label-com.ru/katalog/kukhni-1/mariya-1-detail.html","createdAt":"2025-11-24T15:26:21.838Z","updatedAt":"2025-11-24T15:26:21.838Z","rating":0,"reviews":[],"details":{"dimensions":"","material":"","care":""},"description":"**Мария - Симфония света и стиля в вашем доме**\n\nПредставляем вашему вниманию кухонный гарнитур \"Мария\" — воплощение изысканности и функциональности, созданный для тех, кто ценит чистоту линий и светлое пространство. Этот ансамбль, выполненный в стиле современной классики с легкими нотками Ар-деко, мгновенно преображает интерьер, наполняя его воздухом и утонченным шармом. Доминирующий белый цвет фасадов создает ощущение простора и свежести, делая кухню не просто местом для приготовления еды, но истинным сердцем дома, где царят гармония и уют.\n\nОсобое внимание привлекают детали, формирующие неповторимый облик \"Марии\". Гладкие, вероятно, эмалированные фасады шкафов дополнены тонкими фрезерованными рамками, придающими им элегантность и глубину. Изюминкой гарнитура являются высокие витринные шкафы с прозрачными стеклянными вставками, украшенными сложным геометрическим переплетом. Эти элементы не только добавляют легкости и света, но и позволяют изящно продемонстрировать ваш фарфор или декоративные предметы. В контраст к белоснежным фасадам выступает практичная светло-серая столешница, а завершающие штрихи в виде изящной золотистой фурнитуры и смесителя подчеркивают роскошь и статусность комплекта.\n\n\"Мария\" — это не только красота, но и продуманная эргономика. Много
