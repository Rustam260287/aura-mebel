e":30000,"imageUrls":["https://label-com.ru/images/virtuemart/product/tumba-tv-monako.png"],"category":"Гостиная","originalUrl":"https://label-com.ru/katalog/gostinaya/tumba-tv-monako-detail.html","createdAt":"2025-11-24T15:26:21.849Z","updatedAt":"2025-11-24T15:26:21.849Z","rating":0,"reviews":[],"details":{"dimensions":"2000  x 520  x 450","material":"","care":""},"description":"Добро пожаловать в мир изысканного вкуса и безупречного стиля с мебелью от \"Aura\". Представляем вашему вниманию тумбу ТВ \"Монако\" – воплощение роскоши и функциональности, созданное для ценителей истинной красоты.\n\nЭта тумба ТВ \"Монако\" мгновенно приковывает взгляд своим элегантным и утонченным дизайном, сочетающим в себе неоклассические мотивы с современной эстетикой. Прямые линии и идеальные пропорции создают гармоничный силуэт, а блеск глянцевых поверхностей придает интерьеру особую торжественность и воздушность. Она станет центральным элементом вашей гостиной, вдохнув в пространство атмосферу элитного бутика или фешенебельного отеля.\n\nКаждая деталь \"Монако\" продумана до мелочей: фасады тумбы украшены изящным вертикальным рифлением, которое переливается под светом, создавая игру теней и добавляя фактурности. Тонкие золотистые акценты, обрамляющие каждую секцию и проходящие по контуру столешницы и основания, подчеркивают благородство изделия и придают ему неповторимое очарование. Изящные конические ножки, также подчеркнутые золотыми деталями, не только обеспечивают надежную опору, но и визуально облегчают конструкцию, придавая ей грацию и легкость.\n\nИспользуемая палитра – это симфония света и роскоши: благородный оттенок слоновой кости или светлого крема, усиленный глянцевым блеском, великолепно гармонирует с теплыми золотистыми элементами. Этот цветовой дуэт не просто украшает пространство, но и визуально расширяет его, наполняя светом и воздухом. Тумба \"Монако\" идеально впишется как в классические, так и в современные интерьеры, став безусловным акцентом, который говорит о безупречном вкусе своего владельца. Три вместительные секции позволяют удобно разместить мультимедийную аппаратуру и хранить все необходимые предметы в идеальном порядке, сохраняя безупречную эстетику вашей гостиной.\n\n### Техническая информация:\n\n*   **Тип:** Тумба ТВ\n*   **Стиль:** Неоклассика, Современная классика, с элементами Ар-деко\n*   **Материал:** Высококачественное МДФ с глянцевым лаковым покрытием; Металлические декоративные элементы и ручки; Ножки, предположительно, из массива дерева или прочного композита с лаковым покрытием.\n*   **Цвет:** Светло-кремовый / Слоновая кость (глянцевый); Золотой (декоративные вставки, ручки, акценты на ножках).\n*   **Особенности:** Глянцевая столешница и боковины; Фасады с рельефным вертикальным рифлением; Три секции для хранения (вероятно, с распашными дверцами); Элегантные конические ножки с золотыми акцентами; Золотистый декоративный молдинг по периметру тумбы.\n*   **Конструкция:** На высоких ножках."},{"id":"hiqiq6V84iSBRZCPbcDs","name":"Марсель","price":189200,"imageUrls":["https://label-com.ru/images/virtuemart/product/marsel.png"],"category":"Спальни","originalUrl":"https://label-com.ru/katalog/spalni/marsel-detail.html","createdAt":"2025-11-24T15:26:21.835Z","updatedAt":"2025-11-24T15:26:21.835Z","rating":0,"reviews":[],"details":{"dimensions":"2150  x 1190  x 2100\n","material":"","care":""},"description":"Приветствуем в мире изысканного стиля от мебельного магазина \"Aura\"! Представляем вашему вниманию коллекцию \"Марсель\" – шедевр современного дизайна, созданный для тех, кто ценит гармонию, функциональность и безупречную эстетику в интерьере. Основанный исключительно на визуальной чистоте и продуманности линий, этот спальный гарнитур превращает любую комнату в оазис спокойствия и утонченной роскоши. Коллекция \"Марсель\" демонстрирует идеальный баланс между строгими формами минимализма и теплотой комфорта, предлагая истинно элегантное решение для вашей спальни.\n\nЦентральное место в ансамбле занимает величественная кровать с высоким, выразительным изголовьем. Обитая в благородный темно-серый текстиль, предположительно велюр или плотную мебельную ткань, она излучает уют и приглашает к безмятежному отдыху. Объемные формы изголовья и мягкая поверхность каркаса кровати создают ощущение защищенности, становясь при этом эффектной фокусной точкой комнаты. Глубокий оттенок антрацита не только придает коллекции статусность, но и позволяет ей легко вписаться в современный интерьер, гармонируя с различными цветовыми акцентами.\n\nАнсамбль \"Марсель\" искусно дополняют прикроватные тумбы, вместительный платяной шкаф и функциональный туалетный столик. Их фасады украшены эффектной вертикальной фрезеровкой – рифленым узором, который придает мебели динамичность и современный шик, играя светом и тенью. Зеркальные вставки на центральных дверцах шкафа не только практичны, позволяя оценить образ в полный рост, но и визуально расширяют пространство, наполняя его светом. Все элементы корпусной мебели покоятся на изящных, тонких металлических опорах черного цвета, подчеркивающих легкость и невесомость конструкции. Завершает композицию круглое настенное зеркало и компактный мягкий пуф, создавая целостный и функциональный уголок для утренних ритуалов.\n\nКоллекция \"Марсель\" от \"Aura\" — это не просто мебель, это тщательно продуманная система, призванная ежедневно дарить вам ощущение уюта и вдохновения. Она идеально подходит для создания интерьера в стиле современного минимализма или элегантного городского шика, где каждая деталь служит общей идее комфорта и безупречной эстетики. Позвольте \"Марсель\" стать воплощением вашей мечты об идеальной спальне, где функциональность встречается с красотой.\n\n---\n\n**Техническая информация:**\n\n*   **Тип:** Спальный гарнитур (полный комплект мебели для спальни)\n*   **Состав комплекта (видимые элементы):** Кровать с мягким изголовьем, 2 прикроватные тумбы, четырехдверный платяной шкаф, туалетный столик с ящиками и открытой полкой, круглое настенное зеркало, прикроватный пуф.\n*   **Материал:**\n    *   Каркасы и фасады корпусной мебели: Высококачественная ЛДСП/МДФ с матовым/полуматовым покрытием.\n    *   Обивка кровати и пуфа: Износостойкий мебельный текстиль (предположительно, велюр или плотная рогожка).\n    *   Фасады: Декоративная фрезеровка (вертикальный рифленый узор), зеркальное полотно (на центральных дверцах шкафа и настенном зеркале).\n    *   Опоры: Металлические, черного цвета.\n*   **Цвет:**\n    *   Основной: Темно-серый / Антрацит.\n    *   Акценты: Черный (опоры и ручки), Зеркальный.\n*   **Особенности:**\n    *   Высокое мягкое изголовье кровати с закругленными верхними углами.\n    *   Декоративные рифленые фасады на прикроватных тумбах, боковых секциях шкафа и элементах туалетного столика.\n    *   Центральные дверцы платяного шкафа с зеркальными вставками в полный рост.\n    *   Длинные вертикальные ручки на шкафу, интегрированные в дизайн.\n    *   Элегантные тонкие металлические опоры на всех элементах корпусной мебели.\n    *   Круглое настенное зеркало в лаконичном обрамлении.\n    *   Мягкий пуф цилиндрической формы, обтянутый в тон кровати.\n    *   Туалетный столик с выдвижными ящиками и открытой полкой-нишей."},{"id":"hup9UdblWocl1jPHOZ0G","name":"GUCCI 777","price":175000,"imageUrls":["https://label-com.ru/images/virtuemart/product/gucci6.jpeg"],"category":"Мягкая мебель","originalUrl":"https://label-com.ru/katalog/myagkaya-mebel/gucci-777-detail.html","createdAt":"2025-11-24T15:26:21.842Z","updatedAt":"2025-11-24T15:26:21.842Z","rating":0,"reviews":[],"details":{"dimensions":"","material":"","care":""},"description":"Представляем вашему вниманию мебельный гарнитур \"GUCCI 777\" от \"Aura\" — истинное воплощение роскоши и безупречного вкуса. Этот ансамбль, выполненный в стиле современной классики, безупречно сочетает в себе элегантность традиционных форм с изяществом и функциональностью актуального дизайна. \"GUCCI 777\" создан для тех, кто ценит комфорт, утонченность и стремится придать своему интерьеру атмосферу спокойной роскоши и уюта, превращая любую гостиную в оазис стиля.\n\nКаждый элемент коллекции обит высококачественной мебельной тканью с матовой, тактильно приятной текстурой, напоминающей благородный нубук или бархатистый микровельвет. Глубокий, сложный тауповый или серо-коричневый оттенок обивки является идеальным нейтральным фоном, способным гармонично вписаться как в светлые, так и в более насыщенные интерьерные решения, добавляя пространству глубины и респектабельности. Основание и изящные конусные ножки выполнены из натурального дерева темного оттенка, что придает комплекту солидность и подчеркивает естественную красоту материалов.\n\nДизайн \"GUCCI 777\" демонстрирует тщательное внимание к деталям. Диван и одно из кресел украшены классической каретной стяжкой, которая создает объем и придает мебели аристократический шарм, при этом сохраняя современный силуэт. Второе кресло отличается более сдержанным, но не менее элегантным дизайном с плавными, обволакивающими формами, разработанными для максимального комфорта. Комплект дополнен мягкими декоративными подушками, одна из которых акцентирована стильным металлическим кольцом золотого цвета, добавляя изысканный блеск и нотку эксклюзивности.\n\nЭтот мебельный гарнитур не просто предмет интерьера, а центральный элемент вашей гостиной, приглашающий к расслаблению и приятному времяпрепровождению. Высокие спинки с интегрированной поддержкой для головы, мягкие подлокотники и продуманная эргономика каждой детали гарантируют непревзойденный уровень комфорта. \"GUCCI 777\" — это выбор тех, кто ищет идеальное сочетание долговечности, стиля и непревзойденного уюта, способного преобразить ваш дом и радовать глаз долгие годы.\n\n**Техническая информация:**\n*   **Тип:** Гарнитур мягкой мебели для гостиной (диван и два кресла).\n*   **Материал обивки:** Высококачественная мебельная ткань с матовой, тактильно приятной текстурой (визуально напоминает нубук или микровельвет).\n*   **Материал каркаса/ножек:** Натуральное дерево (видимые элементы ножек и декоративные вставки на подлокотниках).\n*   **Цвет обивки:** Тауп / серо-коричневый (нейтральный, благородный оттенок).\n*   **Цвет ножек:** Темное дерево (оттенки ореха или венге).\n*   **Особенности:**\n    *   Декоративная каретная стяжка (глубокие пуговицы) на диване и одном из кресел.\n    *   Два различных дизайна кресел в комплекте, обеспечивающих разнообразие стилей и уровней комфорта.\n    *   В комплекте декоративные подушки, одна из которых с металлическим акцентом в виде золотого кольца.\n    *   Эргономичная высокая спинка с выраженной зоной для головы.\n    *   Плавные, обволакивающие формы, создающие ощущение уюта."},{"id":"ic8R41D0uvUJa4P5wz3f","name":"ЗАРИФА","price":147000,"imageUrls":["https://label-com.ru/images/virtuemart/product/zarifa2.jpeg"],"category":"Мягкая мебель","originalUrl":"https://label-com.ru/katalog/myagkaya-mebel/zarifa-detail.html","rating":0,"reviews":[],"createdAt":{"_seconds":1764053221,"_nanoseconds":529000000},"description":"Представляем \"ЗАРИФА\" от Aura – не просто мебель, а центральный элемент вашей гостиной, способный преобразить любое пространство в оазис комфорта и стиля. Этот элегантный гарнитур, состоящий из утонченного дивана и двух гармоничных кресел, воплощает в себе лучшие черты современной классики, умело сочетая проверенную временем эстетику с актуальными тенденциями дизайна. \"ЗАРИФА\" создана для тех, кто ценит безупречное качество, утонченный вкус и атмосферу изысканного уюта.\n\nГарнитур выполнен в нежном серо-бежевом оттенке, который придает ему универсальность и позволяет легко вписаться в самую разнообразную цветовую палитру интерьера. Обивка представляет собой высококачественный фактурный текстиль, напоминающий плотный велюр или благородную рогожку, тактильно приятный и визуально привлекательный благодаря своей глубине и матовой поверхности. Элементы из массива темного дерева – изящные конические ножки и выразительные вставки на подлокотниках дивана – создают контраст, добавляя облику мебели теплоты, прочности и благородства.\n\nДизайн \"ЗАРИФА\" продуман до мельчайших деталей, которые подчеркивают его эксклюзивность. Спинки кресел украшены глубокой каретной стяжкой, отсылающей к классическим образцам мебельного искусства и придающей им особый шарм. Мягкие элементы гарнитура по контуру обрамлены декоративным кантом, что придает формам четкость и завершенность. В нижней части дивана и кресел видна деликатная горизонтальная прострочка, добавляющая объема и изысканной фактуры. Диван дополнен двумя мягкими декоративными подушками, которые приглашают к полному расслаблению и дополнительному комфорту.\n\n\"ЗАРИФА\" – это идеальный выбор для создания уютной и представительной зоны отдыха, где каждая минута будет наполнена наслаждением. Обтекаемые формы, широкие комфортные подлокотники и продуманная эргономика обеспечивают максимальное удобство как для повседневного отдыха, так и для приема гостей. Выберите \"ЗАРИФА\", чтобы наполнить ваш дом атмосферой непревзойденного стиля, тепла и гостеприимства, где каждая деталь говорит о вашем безупречном вкусе.\n\n---\n\n**Техническая информация:**\n*   **Тип:** Гарнитур для гостиной\n*   **Комплектация:** Двухместный диван, два кресла\n*   **Материал обивки:** Текстурный текстиль (предположительно фактурный велюр или рогожка)\n*   **Материал каркаса/ножек:** Массив дерева\n*   **Цвет обивки:** Серо-бежевый / Светло-серый\n*   **Цвет деревянных элементов:** Темно-коричневый\n*   **Особенности:**\n    *   Каретная стяжка на спинках кресел\n    *   Декоративные подушки (2 шт. на диване)\n    *   Деревянные вставки на подлокотниках дивана\n    *   Конические деревянные ножки\n    *   Декоративный кант по контуру мягких элементов\n    *   Горизонтальная прострочка/плиссировка в нижней части\n    *   Широкие, комфортные подлокотники\n    *   Высокие спинки у кресел"},{"id":"igwn6tBA8zv74jP1Si1q","name":"Стул Роза","price":4500,"imageUrls":["https://label-com.ru/images/virtuemart/product/stol_Roza7.jpg"],"category":"Гостиная","originalUrl":"https://label-com.ru/katalog/gostinaya/stul-roza-detail.html","rating":0,"reviews":[],"createdAt":{"_seconds":1764053805,"_nanoseconds":597000000},"description":"Погрузитесь в мир изысканной элегантности с обеденным стулом \"Роза\" от Aura. Этот предмет мебели — воплощение утонченной классики, призванный стать центром притяжения в вашей столовой или гостиной. С первого взгляда стул \"Роза\" очаровывает своей благородной осанкой и безупречным стилем, отсылая к дворцовым интерьерам и вечным канонам красоты. Его дизайн, гармонично сочетающий строгие линии и богатый декор, идеально впишется в пространство, где ценят роскошь и внимание к деталям.\n\nКаркас стула выполнен в ослепительно белом или молочном оттенке с глянцевым покрытием, которое придает ему особую торжественность и визуально расширяет пространство. Это покрытие не только подчеркивает чистоту цвета, но и дарит стулу легкое сияние, отражая свет и создавая игру бликов. Главным акцентом является высокая, величественная спинка: ее верхняя и нижняя части украшены изысканным орнаментом \"греческий ключ\", символом бесконечности и постоянства. В центре спинки расположен крупный резной медальон, напоминающий стилизованный цветок или распустившийся бутон, что вполне оправдывает название \"Роза\" и придает изделию уникальный, запоминающийся характер.\n\nСиденье стула \"Роза\" обито плотной, гладкой тканью или высококачественной экокожей глубокого антрацитового или темно-серого цвета. Этот контрастный оттенок не только придает стулу графичность и современную строгость, но и создает ощущение практичности и уюта. Гладкая текстура обивки мягко отражает свет, гармонируя с глянцевым каркасом, а ее насыщенный тон прекрасно оттеняет белоснежную основу, подчеркивая ее чистоту. Каждая деталь стула \"Роза\" говорит о мастерстве и стремлении к совершенству, обещая не только визуальное наслаждение, но и комфортное времяпрепровождение за столом.\n\nСтул \"Роза\" — это не просто мебель, это инвестиция в атмосферу вашего дома. Он способен преобразить любое пространство, добавив ему аристократического шарма и ощущения роскоши. Идеально подходящий для торжественных ужинов и повседневных семейных трапез, он станет прекрасным дополнением к обеденному столу с резными элементами, создавая завершенный и гармоничный ансамбль, который будет радовать глаз и дарить комфорт долгие годы.\n\n### Техническая информация:\n\n*   **Тип:** Обеденный стул\n*   **Материал каркаса:** Дерево или высококачественный композитный материал с глянцевым лакокрасочным покрытием.\n*   **Материал обивки сиденья:** Искусственная кожа / Экокожа / Плотная синтетическая ткань с гладкой текстурой.\n*   **Цвет каркаса:** Белый / Молочно-белый / Светлый айвори (глянцевый).\n*   **Цвет обивки сиденья:** Темно-серый / Антрацит.\n*   **Особенности:**\n    *   Высокая резная спинка с центральным орнаментальным медальоном.\n    *   Декоративный геометрический орнамент \"греческий ключ\" (меандр) на спинке.\n    *   Прямые элегантные ножки.\n    *   Классический / Неоклассический стиль с элементами барокко.\n    *   Глянцевое покрытие каркаса."},{"id":"iwQIPiOI8V3ZPMjZMwZ2","name":"Стол Голд","price":39000,"imageUrls":["https://label-com.ru/images/virtuemart/product/stol_gold22.jpg"],"category":"Гостиная","originalUrl":"https://label-com.ru/katalog/gostinaya/stol-gold-2-detail.html","createdAt":"2025-11-24T15:26:21.847Z","updatedAt":"2025-11-24T15:26:21.847Z","rating":0,"reviews":[],"details":{"dimensions":"","material":"","care":""},"description":"Добро пожаловать в мир безупречной элегантности от мебельного магазина \"Aura\". Представляем вашему вниманию обеденную группу \"Стол Голд\" — ансамбль, который превзойдет все ваши ожидания и станет подлинным украшением вашей столовой. Это не просто мебель, это заявление о вашем безупречном вкусе и стремлении к роскоши, воплощенное в каждой линии и каждом элементе декора.\n\n\"Стол Голд\" искусно сочетает в себе величественные черты стиля барокко с изысканностью современной классики. Центральное место в композиции занимает стол с массивной, монументальной столешницей, имитирующей благородный серый мрамор. Ее глянцевая поверхность с уникальными прожилками и скошенными восьмиугольными углами притягивает взгляд, создавая ощущение глубины и престижа. Опорой служит грандиозное пьедестальное основание, щедро украшенное сложной, филигранной резьбой и покрытое сияющим лаком цвета слоновой кости, которое буквально излучает торжественность и величие.\n\nГармоничным дополнением выступают шесть изящных стульев, каждый из которых является произведением мебельного искусства. Их фигурные рамы повторяют мотивы и оттенок стола, демонстрируя мастерство резчиков и внимание к деталям. Спинки стульев обиты роскошным велюром насыщенного темно-серого оттенка, украшенным глубокой каретной стяжкой (капитоне) с мерцающими пуговицами, напоминающими ограненные кристаллы. Сиденья выполнены в более светлом, гладком сером материале, что добавляет контраста и тактильного комфорта.\n\nОбеденная группа \"Стол Голд\" от \"Aura\" создает атмосферу дворцового великолепия и изысканной торжественности. Это идеальное решение для тех, кто ценит не только функциональность, но и неповторимый стиль, способный преобразить пространство и наполнить каждый день ощущением праздника. Позвольте себе окружить себя этой непревзойденной красотой, где каждая трапеза становится особенным событием, а каждый момент наполняется утонченной роскошью.\n\n---\n\n**Техническая информация:**\n\n*   **Тип:** Обеденная группа (стол + 6 стульев)\n*   **Стиль:** Современная классика, Неоклассика, Барокко.\n*   **Материал:**\n    *   Каркас стола и стульев: Резное дерево (или высококачественная имитация) с глянцевым лаковым покрытием.\n    *   Столешница: Искусственный камень или высококачественный МДФ с глянцевым покрытием \"под мрамор\".\n    *   Обивка стульев: Текстиль (предположительно велюр/бархат для спинок, гладкая ткань для сидений).\n    *   Декоративные элементы: Кристаллы или стразы (пуговицы).\n*   **Цвет:**\n    *   Каркас: Глянцевый белый / слоновая кость.\n    *   Столешница: Оттенки серого с белыми прожилками (мраморный узор).\n    *   Обивка спинок: Темно-серый.\n    *   Обивка сидений: Светло-серый.\n    *   Акценты: Серебристые (декоративные пуговицы, возможно, патина на резьбе).\n*   **Особенности:**\n    *   Столешница с восьмиугольными скошенными углами и резным декоративным кантом.\n    *   Массивное, богато резное пьедестальное основание стола с орнаментами.\n    *   Эргономичные стулья с фигурными резными рамами и изящными изогнутыми ножками (кабриоль).\n    *   Декоративная каретная стяжка (капитоне) на спинках стульев с вставками-пуговицами.\n    *   Изысканный резной декор на изголовьях стульев, ножках и основании стола, подчеркивающий стиль."},{"id":"j1EaqG9rANFKocjbUQ28","name":"Maserati","price":164000,"imageUrls":["https://label-com.ru/images/virtuemart/product/mazerati7.jpeg"],"category":"Мягкая мебель","originalUrl":"https://label-com.ru/katalog/myagkaya-mebel/maserati-detail.html","createdAt":"2025-11-24T15:26:21.843Z","updatedAt":"2025-11-24T15:26:21.843Z","rating":0,"reviews":[],"details":{"dimensions":"","material":"","care":""},"description":"Добро пожаловать в мир безупречного комфорта и стиля с коллекцией \"Maserati\" от \"Aura\". Представляем вашему вниманию элегантный мягкий гарнитур, где каждая деталь продумана для создания атмосферы роскоши и уюта в вашем доме. Этот комплект, состоящий из просторного трехместного дивана и двух изящных кресел, воплощает собой современную классику, умело сочетая мягкие линии с акцентными декоративными элементами. Он не просто мебель, это приглашение окунуться в оазис спокойствия и утонченности.\n\nОснову внешнего облика \"Maserati\" составляет обивка из высококачественной, невероятно приятной на ощупь ткани, напоминающей нежную искусственную замшу или бархатистый микровелюр. Ее приглушенный серо-бежевый оттенок, или \"грейж\", создает универсальный и элегантный фон, который легко интегрируется в любую цветовую палитру интерьера, привнося с собой ощущение тепла и света. Объемные подушки сидений и спинок, а также широкие, обволакивающие подлокотники дивана и кресел обещают максимальный уровень комфорта, приглашая расслабиться после долгого дня.\n\nОсобое внимание привлекают детали: изысканная каретная стяжка (капитоне) на передней панели дивана и внешних боковинах подлокотников придает комплекту классическую утонченность. Деревянные элементы, выполненные из темного массива с четко выраженной текстурой, украшают основание дивана и изящные фигурные ножки, обеспечивающие устойчивость и легкость конструкции. Инновационная вставка из того же дерева, плавно изгибающаяся вдоль подлокотников дивана, не только является оригинальным дизайнерским решением, но и может служить удобной поверхностью для чашки кофе или книги. Завершают образ две декоративные подушки с абстрактным, контрастным рисунком, добавляющие динамичности и индивидуальности общему ансамблю.\n\n\"Maserati\" — это не просто мебель, это инвестиция в ваше благополучие и эстетическое наслаждение. Он идеально впишется в просторные гостиные, оформленные в современном, неоклассическом или даже минималистичном стиле, где ценится функциональность, комфорт и безупречный дизайн. Позвольте этому комплекту стать центральным элементом вашей зоны отдыха, местом, где собираются близкие, ведутся задушевные беседы и создаются незабываемые воспоминания.\n\n---\n\n**Техническая информация:**\n\n*   **Тип:** Гарнитур для гостиной (Трехместный диван и два кресла).\n*   **Материал:** Текстильная обивка (предположительно, искусственная замша или микровелюр), каркас из дерева/ДСП, ножки и декоративные элементы из массива дерева.\n*   **Цвет:** Серо-бежевый (обивка), темно-коричневый (деревянные элементы), бежевый/коричневый/черный (декоративные подушки с абстрактным узором).\n*   **Особенности:**\n    *   Декоративная каретная стяжка (капитоне) на нижних панелях дивана и подлокотниках.\n    *   Изогнутые фигурные ножки из массива дерева.\n    *   Деревянные вставки в подлокотники дивана, выполняющие эстетическую и функциональную роль.\n    *   Широкие, мягкие подлокотники и объемные подушки спинок и сидений.\n    *   Дополнительные подушки для поясничной поддержки/головы на креслах.\n    *   Контрастная декоративная прострочка на обивке.\n    *   Две декоративные подушки с выразительным принтом."},{"id":"jMm2zB8U4fGBnTzduWWs","name":"ЭСТЕЛЬ","price":154000,"imageUrls":["https://label-com.ru/images/virtuemart/product/estel4.jpg"],"category":"Мягкая мебель","originalUrl":"https://label-com.ru/katalog/myagkaya-mebel/estel-detail.html","createdAt":"2025-11-24T15:26:21.848Z","updatedAt":"2025-11-24T15:26:21.848Z","rating":0,"reviews":[],"details":{"dimensions":"","material":"","care":""},"description":"Представляем вашему вниманию \"ЭСТЕЛЬ\" — воплощение изысканного вкуса и безупречного комфорта, созданное, чтобы стать сердцем вашего дома. Этот гостиный гарнитур, где каждая деталь продумана до мелочей, излучает элегантность современной классики, умело сочетая плавные линии с функциональной красотой. Он призван преобразить любое пространство в оазис стиля и гостеприимства, приглашая к моментам истинного расслабления и наслаждения.\n\nДиван и кресла \"ЭСТЕЛЬ\" обтянуты благородным текстилем глубокого серого оттенка, который мягко играет со светом, создавая ощущение уюта и тепла. Этот универсальный цвет идеально гармонирует с теплыми древесными тонами ножек и изящных вставок на подлокотниках, привнося в интерьер природную гармонию. Дополнительный акцент в виде тонкой, но выразительной металлической полосы золотистого цвета по периметру основания добавляет легкий шик и подчеркивает эксклюзивность модели.\n\nДизайн \"ЭСТЕЛЬ\" отличается тщательно продуманными деталями. Эргономичные спинки с мягкими, изогнутыми линиями и поддерживающими подушками, украшенными вертикальной декоративной стежкой, обещают исключительный комфорт. Подобная стежка повторяется и на внутренних частях подлокотников кресел, создавая единую, завершенную композицию. Полированные деревянные элементы на внешних сторонах подлокотников не только добавляют изысканности, но и являются практичным решением, приглашая удобно расположиться.\n\nКаждая линия, каждый изгиб в коллекции \"ЭСТЕЛЬ\" говорит о мастерстве и стремлении к совершенству. Этот гарнитур не просто мебель; это заявление о стиле, обещание долговечности и приглашение наслаждаться каждым могом, проведенным в его объятиях. Он создан для тех, кто ценит красоту, комфорт и индивидуальность в каждой детали своего дома, делая ваш интерьер поистине незабываемым.\n\n---\n\n### Техническая информация:\n\n*   **Тип:** Гостиный гарнитур (Диван трехместный + 2 кресла)\n*   **Материал обивки:** Высококачественный мебельный текстиль (возможно, микровельвет или плотная рогожка)\n*   **Материал каркаса и ножек:** Массив дерева\n*   **Цвет обивки:** Серый (светлый/средний оттенок)\n*   **Цвет деревянных элементов:** Коричневый (теплый древесный оттенок)\n*   **Цвет декоративных акцентов:** Золотистый/латунный (металлическая окантовка)\n*   **Особенности:**\n    *   Элегантная вертикальная декоративная стежка на спинках и подлокотниках.\n    *   Полированные деревянные вставки на внешних сторонах подлокотников.\n    *   Тонкая металлическая декоративная планка по периметру основания.\n    *   Конические (зауженные к низу) деревянные ножки.\n    *   В комплекте две декоративные подушки для дивана, выполненные в тон обивке.\n    *   Округлые, эргономичные формы спинок и подлокотников."},{"id":"jTdCv73LNvWhRvyu7NB7","name":"Стол Лапка","imageUrls":["https://label-com.ru/images/virtuemart/product/stol_lapka7.jpg"],"category":"Гостиная","originalUrl":"https://label-com.ru/katalog/gostinaya/stol-lapka-1-detail.html","createdAt":"2025-11-24T15:26:21.847Z","updatedAt":"2025-11-24T15:26:21.847Z","rating":0,"reviews":[],"details":{"dimensions":"","material":"","care":""},"price":24000,"description":"Представляем вашему вниманию обеденную группу \"Стол Лапка\" — истинное воплощение роскоши и утонченности, способное преобразить любую столовую в дворцовые апартаменты. Этот ансамбль, выполненный в благородном классическом стиле с выраженными элементами барокко и неоклассики, не просто мебель, а центральный акцент, который задает тон всему пространству. Каждая деталь здесь продумана до мелочей, чтобы создать атмосферу величия и изысканного вкуса, идеально подходящую для торжественных приемов и теплых семейных вечеров.\n\nСердцем комплекта является овальный стол с величественной столешницей. Ее глянцевая поверхность имитирует натуральный мрамор в нежных серых тонах, создавая эффект глубины и изысканности. Кажется, будто на столешнице застыли облака или причудливые узоры камня, отражая свет и придавая блеск интерьеру. Край столешницы украшен искусной резьбой, вторящей витиеватым узорам на массивном основании. Стол опирается на элегантную центральную колонну с канелюрами, переходящую в изящные фигурные ножки-лапки, каждая из которых является произведением мебельного искусства.\n\nШесть изысканных стульев, входящих в комплект, гармонично дополняют стол. Их высокие, изогнутые спинки увенчаны великолепной резьбой, напоминающей корону или искусный орнамент. Обивка спинок выполнена из мягкого, бархатистого велюра глубокого серого оттенка, который дарит тактильное наслаждение и придает уюта. Сиденья стульев контрастируют с бархатом спинок благодаря глянцевому покрытию того же темно-серого цвета, создавая эффектное сочетание текстур. Фигурные ножки стульев повторяют изгибы ножек стола, завершая целостный и гармоничный образ. Один из стульев комплектуется подлокотниками, добавляя функциональности и еще большего комфорта.\n\nОбеденная группа \"Стол Лапка\" в цвете слоновой кости с серой обивкой и мраморной столешницей — это не просто место для трапезы, это пространство, где рождаются незабываемые моменты. Она излучает благородство и вечную красоту, становясь символом вашего безупречного вкуса и гостеприимства. С этим комплектом ваш дом наполнится атмосферой изысканности, достойной самых высоких похвал.\n\n---\n\n**Техническая информация:**\n\n*   **Тип:** Обеденная группа (стол и шесть стульев).\n*   **Материал:**\n    *   Каркас стола и стульев: Массив дерева / Высококачественная МДФ с резным декором.\n    *   Столешница: Глянцевая, с имитацией натурального камня (мрамора).\n    *   Обивка спинок стульев: Велюр / Бархат.\n    *   Обивка сидений стульев: Глянцевое покрытие (возможно, экокожа или лак).\n*   **Цвет:**\n    *   Каркас: Светло-серый / Оттенок слоновой кости.\n    *   Обивка спинок и сидений: Темно-серый.\n    *   Столешница: Светло-серый с мраморным узором.\n*   **Особенности:**\n    *   Изысканный резной декор ручной работы на каркасах стола и стульев.\n    *   Фигурные ножки-кабриоль.\n    *   Высокие, орнаментированные спинки стульев.\n    *   Овальная форма столешницы.\n    *   Массивное центральное основание стола с колоннообразной опорой.\n    *   Включает один стул с подлокотниками (кресло) и пять стульев без подлокотников."},{"id":"joB0fSTrDHicF9ZWDzcp","name":"Сидней, сатин, 6 пред.","price":178350,"imageUrls":["https://label-com.ru/images/virtuemart/product/8.jpg"],"category":"Спальни","originalUrl":"https://label-com.ru/katalog/spalni/sidnej-2c-satin-2c-6-pred-detail.html","rating":0,"reviews":[],"createdAt":{"_seconds":1764052752,"_nanoseconds":110000000},"description":"**Сидней, сатин, 6 предметов**\n\nПреобразите вашу спальню в оазис спокойствия и безупречного стиля с гарнитуром \"Сидней\". Этот комплект, пропитанный духом современного минимализма и утонченной элегантности, призван создать атмосферу гармонии и комфорта, где каждая деталь служит продолжением единой концепции. Плавные линии, продуманные формы и изысканные цветовые сочетания сплетаются в единую симфонию, приглашая к расслаблению и наслаждению истинной красотой.\n\nЦентральное место в ансамбле занимает кровать с высоким изголовьем, обтянутым благородным светлым текстилем, напоминающим сатин, с деликатной вертикальной прострочкой, добавляющей объема и тактильной привлекательности. Контрастное обрамление изголовья из темного дерева, с характерными закругленными углами, задает тон всему комплекту, перекликаясь с элегантными прикроватными тумбами и туалетным столиком. Эти предметы мебели виртуозно сочетают светлые матовые поверхности с фасадами из темного дерева, текстура которого подчеркивает природную красоту материала, а интегрированные ручки-вырезы придают им современный и лаконичный вид.\n\nЗавершает композицию вместительный платяной шкаф, гармонично продолжающий общую эстетику. Его фасады из темного дерева с элегантными ручками обрамляют две центральные зеркальные секции, которые не только функциональны, но и визуально расширяют пространство, наполняя комнату светом и воздухом. Круглое зеркало над туалетным столиком в светлой раме, дополненное компактным пуфом в тон обивке кровати, создает идеальную зону для ухода за собой, подчеркивая внимание к деталям и обеспечивая полную функциональность. \"Сидней\" — это не просто мебель, это тщательно продуманное пространство, где каждая вещь на своем месте, создавая ощущение завершенности и безмятежной роскоши.\n\n**Техническая информация:**\n\n*   **Тип:** Спальный гарнитур (6 предметов: кровать, 2 прикроватные тумбы, туалетный столик, зеркало, платяной шкаф).\n*   **Стиль:** Современный, минимализм, элегантный.\n*   **Материал:**\n    *   Каркасы кровати, тумб, столика, шкафа: ЛДСП/МДФ под темное дерево (оттенок орех/венге).\n    *   Изголовье кровати и обивка пуфа: Мягкий текстиль (предположительно сатин или его имитация), светлый оттенок (кремовый/светло-бежевый).\n    *   Столешницы прикроватных тумб и туалетного столика: ЛДСП/МДФ, светлый матовый оттенок (кремовый/светло-бежевый).\n    *   Фасады ящиков тумб и туалетного столика, двери шкафа: ЛДСП/МДФ под темное дерево.\n    *   Зеркало.\n*   **Цвет:**\n    *   Основной: Темно-коричневый (оттенок ореха/венге).\n    *   Дополнительный: Кремовый/светло-бежевый.\n*   **Особенности:**\n    *   Закругленные углы у большинства элементов мебели.\n    *   Мягкое изголовье кровати с вертикальной прострочкой.\n    *   Интегрированные ручки-вырезы на фасадах ящиков и дверях шкафа.\n    *   Платяной шкаф с двумя зеркальными центральными дверями.\n    *   Круглое настенное зеркало в светлой раме.\n    *   Мягкий пуф в комплекте с туалетным столиком."},{"id":"kuNosiq8PAPUTeBZ7c1q","name":"Стол Голд","imageUrls":["https://label-com.ru/images/virtuemart/product/stol_gold2.jpg"],"category":"Гостиная","originalUrl":"https://label-com.ru/katalog/gostinaya/stol-gold-1-detail.html","createdAt":"2025-11-24T15:26:21.847Z","updatedAt":"2025-11-24T15:26:21.847Z","rating":0,"reviews":[],"details":{"dimensions":"","material":"","care":""},"price":37000,"description":"Добро пожаловать в мир утонченной элегантности от \"Aura\". Представляем Вашему вниманию обеденную группу \"Стол Голд\" – воплощение классического шика и безупречного вкуса, созданную для тех, кто ценит роскошь в каждой детали. Этот ансамбль, словно сошедший со страниц исторического романа, моментально преобразит Вашу столовую, придав ей атмосферу торжественности и изысканности. Изумительное сочетание величественности форм и благородных материалов делает его центральным элементом любого респектабельного интерьера, гармонично вписываясь в стили неоклассика, барокко или современный прованс.\n\nЦентральным элементом комплекта является монументальный обеденный стол. Его многоугольная столешница завораживает глянцевым блеском и узором, имитирующим натуральный мрамор в нежных оттенках серого и белого, создавая ощущение глубины и объема. Поддерживается эта красота массивным, искусно резным основанием, выполненным в молочно-белом цвете. Каждый изгиб и декоративный элемент, украшенный серебристыми акцентами, свидетельствует о мастерстве исполнения и внимании к деталям, превращая функциональный предмет мебели в произведение искусства.\n\nШесть изящных стульев идеально дополняют величие стола, продолжая общую стилистику и цветовую гамму. Их резные каркасы, повторяющие молочно-белый оттенок и серебристые акценты стола, отличаются плавными линиями и изогнутыми ножками, придающими легкость и грацию. Спинки стульев обиты мягким, глубоким серым велюром или бархатом с эффектной каретной стяжкой (капитоне), украшенной сияющими пуговицами, которые добавляют блеска и роскоши. Сиденья же выполнены из гладкого, чуть мерцающего серого текстиля, обеспечивая не только эстетическое наслаждение, но и исключительный комфорт.\n\n\"Стол Голд\" от \"Aura\" – это не просто мебель, это инвестиция в атмосферу Вашего дома. Это обещание незабываемых ужинов, теплых семейных встреч и ярких моментов, проведенных в окружении красоты и уюта. Он создан для того, чтобы Вы могли наслаждаться каждым мгновением, преподнесенным с истинным величием.\n\n### Техническая информация:\n\n*   **Тип:** Обеденная группа (стол и 6 стульев)\n*   **Материал:**\n    *   Столешница: Высокоглянцевая поверхность с рисунком под натуральный мрамор.\n    *   Каркас стола и стульев: Резное дерево (предположительно массив или МДФ), лакированное покрытие.\n    *   Обивка спинок стульев: Текстиль (велюр/бархат) с каретной стяжкой.\n    *   Обивка сидений стульев: Гладкий текстиль (возможно, экокожа).\n    *   Декоративные элементы: Пуговицы на спинках (возможно, стразы/кристаллы).\n*   **Цвет:** Молочно-белый (каркас), различные оттенки серого (обивка и рисунок столешницы), серебристые акценты (декор).\n*   **Особенности:**\n    *   Многоугольная форма столешницы.\n    *   Массивная резная центральная опора стола.\n    *   Выраженные резные декоративные элементы на каркасе стола и стульев.\n    *   Эффектная каретная стяжка (капитоне) на спинках стульев.\n    *   Изогнутые ножки стульев в стиле \"кабриоль\".\n    *   Глянцевое покрытие столешницы и каркаса."},{"id":"kzzoUYVakx8iC1qZVsy5","name":"Тв тумба Ариана","price":30500,"imageUrls":["https://label-com.ru/images/virtuemart/product/aritv.png"],"category":"Гостиная","originalUrl":"https://label-com.ru/katalog/gostinaya/tv-tumba-ariana-detail.html","createdAt":"2025-11-24T15:26:21.849Z","updatedAt":"2025-11-24T15:26:21.849Z","rating":0,"reviews":[],"details":{"dimensions":"180  x 50  x 63","material":"","care":""},"description":"Представляем \"Тв тумба Ариана\" – жемчужину коллекции мебельного салона Aura, созданную для ценителей безупречного стиля и функциональной роскоши. Эта уникальная композиция воплощает в себе элегантность современной классики с легким налетом ар-деко, мгновенно преображая пространство гостиной и придавая ему атмосферу изысканности. Многоуровневый дизайн \"Арианы\" не только восхищает своей архитектурной продуманностью, но и предлагает идеальное решение для организации медиазоны, гармонично сочетая эстетику и практичность.\n\nВизуальный облик тумбы строится на контрасте и богатстве текстур. Основные поверхности выполнены в чистом, сияющем белом цвете, который, вероятно, имеет легкий глянцевый блеск, визуально расширяя пространство и наполняя его светом. Фасады верхних и боковых выдвижных ящиков украшены восхитительным фактурным узором, напоминающим изящное плетение или тонкую геометрию, что придает мебели глубину и тактильную привлекательность. Нижняя часть боковых ящиков эффектно контрастирует с общим светлым фоном, демонстрируя благородную вставку под темное дерево с выразительной текстурой, которая добавляет теплоты и уюта всему ансамблю.\n\nОсобое очарование \"Ариане\" дарят акцентные детали. Крупные, идеально круглые ручки сияющего золотого оттенка служат не только функциональными элементами, но и роскошными декоративными штрихами, подчеркивая элитный статус изделия. Эту золотую тему гармонично продолжают оригинальные ножки боковых модулей – тонкие, изящные металлические стержни, сгруппированные вместе, которые придают конструкции воздушность и неповторимый характер, словно изысканное ювелирное украшение. Такое сочетание безупречного белого, глубокого темного дерева и мерцающего золота создает поистине аристократичный и гармоничный образ.\n\nТВ тумба \"Ариана\" – это не просто предмет мебели, это заявление о вкусе, стремлении к красоте и внимании к деталям. Она идеально впишется в интерьеры, выполненные в стиле неоклассика, современный шик или контемпорари, где ценятся продуманный дизайн, высокое качество и способность мебели вдохновлять. Позвольте \"Ариане\" стать центром притяжения в вашем доме, создавая атмосферу уюта, роскоши и гармонии.\n\n***\n\n### Техническая информация:\n\n*   **Тип:** ТВ тумба / Медиа консоль\n*   **Стиль:** Современный шик, Неоклассика, Контемпорари с элементами Арт-деко\n*   **Материал:**\n    *   Корпус и основные фасады: Предположительно МДФ/ЛДСП с белым покрытием (возможно, глянцевым или полуглянцевым).\n    *   Фактурные фасады: Декоративная отделка с геометрическим узором.\n    *   Вставки на фасадах боковых ящиков: Декоративная отделка под темное дерево.\n    *   Ручки и ножки: Металл.\n*   **Цвет:**\n    *   Основной: Белый.\n    *   Акценты: Золотой (ручки, ножки).\n    *   Контрастные вставки: Темно-коричневый (имитация древесины).\n*   **Особенности:**\n    *   Многоуровневая, каскадная конструкция.\n    *   Четыре выдвижных ящика для хранения.\n    *   Оригинальные фактурные фасады с геометрическим узором.\n    *   Круглые металлические ручки золотого цвета.\n    *   Уникальные вертикальные металлические ножки-стойки золотого цвета на боковых модулях.\n    *   Сочетание глянцевого белого, темного дерева и золотых акцентов."},{"id":"lXP0uU00tJKt0sWwiKt4","name":"Комплект ДУБАЙ","price":231000,"imageUrls":["https://label-com.ru/images/virtuemart/product/dubai8.jpg"],"category":"Мягкая мебель","originalUrl":"https://label-com.ru/katalog/myagkaya-mebel/komplekt-dubaj-1-detail.html","rating":0,"reviews":[],"createdAt":{"_seconds":1764053293,"_nanoseconds":249000000},"description":"Добро пожаловать в мир утонченной роскоши с \"Комплектом ДУБАЙ\" от мебельного магазина \"Aura\" – воплощением величия и безупречного стиля, созданного для самых взыскательных ценителей. Это не просто диванная группа, это произведение искусства, вдохновленное великолепием дворцовых интерьеров и аристократических салонов, способное преобразить любое пространство в оазис элегантности и престижа. Каждая деталь комплекта \"ДУБАЙ\" говорит о несравненном мастерстве и внимании к традициям классического дизайна, будь то барокко или рококо, гармонично сочетая европейскую пышность с восточным шармом.\n\nВзгляд мгновенно притягивает массивная, щедро украшенная рама, выполненная из высококачественного материала, предположительно дерева, с невероятно сложной и детализированной ручной резьбой. Золотое покрытие, сияющее благородным блеском, подчеркивает каждый изящный изгиб и витиеватый узор, от пышных флористических мотивов до грациозных завитков, создавая ощущение истинной королевской роскоши. Эта роскошная золотая основа безупречно сочетается с мягкой, приятной на ощупь обивкой из благородного текстиля – вероятно, жаккарда или броката – нежного кремового или светло-бежевого оттенка с тонким орнаментальным рисунком.\n\nГлубокая каретная стяжка, или капитоне, украшающая спинки дивана и кресел, придает им объем, особый шарм и обещает максимальный комфорт. Множество декоративных подушек, входящих в комплект, с изысканным кантом, бахромой и плиссированными элементами, не только дополняют эстетику, но и приглашают окунуться в мир непревзойденного уюта. Цветовая палитра \"ДУБАЙ\" – это ода изысканной гармонии: теплое, солнечное золото в сочетании с деликатным, почти перламутровым отливом обивки создает атмосферу света, простора и утонченного вкуса.\n\nКомплект \"ДУБАЙ\" – это выбор тех, кто стремится окружить себя предметами, несущими в себе историю, культуру и вечную красоту. Он станет центральным элементом вашей гостиной, кабинета или парадного зала, наполнив пространство ощущением стабильности, благополучия и неподвластной времени элегантности.\n\n---\n\n**Техническая информ ловье и проходящие по нижней части каркаса кровати, добавляют нотки изысканного шика, подчеркивая статус и внимание к деталям. Прикроватные тумбы, выполненные в светлых, кремовых или светло-бежевых тонах, идеально дополняют композицию. Их фасады украшены изящными вертикальными фрезерованными линиями, гармонирующими с изголовьем кровати, а тонкие золотистые ручки-планки и изящные металлические ножки добавляют легкости и грации.\n\nЗавершает ансамбль величественный шкаф, который не только вместителен, но и является произведением искусства. Его белоснежные или светло-бежевые фасады чередуются с зеркальными панелями, визуально расширяющими пространство и добавляющими света. Зеркала, вероятно, имеют легкий дымчатый или бронзовый оттенок, что придает им особый шарм, а тонкое золотистое обрамление и вертикальные полосы на дверцах вторят общей стилистике коллекции. Рельефные вертикальные элементы на глухих фасадах шкафа перекликаются с дизайном прикроватных тумб, создавая единую, гармоничную картину.\n\nКоллекция \"Монако\" — это не просто мебель, это обещание комфорта и эстетического наслаждения каждый день. Она идеально впишется в интерьер, где ценятся сдержанная роскошь, функциональность и внимание к деталям, превращая спальню в настоящий оазис покоя и вдохновения.\n\n### Техническая информация:\n\n*   **Тип:** Спальный гарнитур (включает двуспальную кровать, две прикроватные тумбы, четырехдверный шкаф).\n*   **Материал:** Велюр/бархат (изголовье и каркас кровати), МДФ/ЛДСП (корпуса тумб и шкафа, фасады), металл (декоративные вставки золотистого цвета, ручки, ножки прикроватных тумб), зеркало/стекло (двери шкафа).\n*   **Цвет:** Глубокий синий (изголовье и каркас кровати), кремовый/светло-бежевый (прикроватные тумбы, корпус и фасады шкафа), золотой/латунный (металлические акценты, ручки, ножки), дымчатый/бронзовый (зеркальные вставки на шкафу).\n*   **Особенности:** Высокое мягкое изголовье с вертикальной прострочкой/ламелями, золотистые декоративные металлические вставки на кровати и шкафу, фрезерованные фасады прикроватных тумб и дверей шкафа, прямоугольные металлические ручки-планки, зеркальные вставки на шкафу с золотистым обрамлением, изящные металлические ножки у прикроватных тумб."},{"id":"onSBhvA7Pe4gFT8YKBdu","name":"Селена","imageUrls":["https://label-com.ru/images/virtuemart/product/selena-2.png"],"category":"Кухни","originalUrl":"https://label-com.ru/katalog/kukhni-1/selena-2-detail.html","createdAt":"2025-11-24T15:26:21.839Z","updatedAt":"2025-11-24T15:26:21.839Z","rating":0,"reviews":[],"details":{"dimensions":"4200  x 2270  x 550","material":"","care":""},"price":143000,"description":"Добро пожаловать в мир безупречного стиля и функциональности с кухонным гарнитуром \"Селена\" от Aura. Представляем вашему вниманию произведение мебельного искусства, созданное для тех, кто ценит гармонию роскоши и практичности в самом сердце дома. Изучив изображение, мы видим, что \"Селена\" воплощает в себе изысканность современной классики, умело сочетая вневременные элементы с актуальными дизайнерскими решениями, создавая атмосферу утонченности и благородства.\n\nОснову композиции составляет чистый, сияющий белый цвет, который придает кухне невероятную легкость и визуально расширяет пространство. Этот светлый фон эффектно подчеркивают деликатные золотистые или бронзовые металлические акценты, обрамляющие фасады и выступающие в роли элегантных ручек-скоб. Эти детали добавляют гарнитуру изысканного блеска и ощущения высокого класса. Фартук и столешница, выполненные из материала с имитацией благородного белого мрамора и его характерными серыми прожилками, становятся центральным акцентом, привнося в интерьер нотку природной красоты и роскоши.\n\nОсобое внимание привлекают фактурные фрезерованные фасады с тонкими вертикальными полосами, которые придают \"Селене\" уникальный характер и визуальную глубину. Глянцевая поверхность некоторых элементов отражает свет, наполняя кухню воздухом и свежестью. Продуманная эргономика проявляется в разнообразии шкафов – от высоких пеналов до вместительных нижних тумб и функциональных выдвижных ящиков, что обеспечивает достаточно места для хранения и безупречную организацию кухонных принадлежностей. Интегрированные мойка и варочная панель подтверждают стремление к минималистичности и чистоте линий.\n\nКухня \"Селена\" создает атмосферу светлой, гостеприимной и функциональной зоны, где приготовление пищи превращается в истинное удовольствие, а семейные ужины — в незабываемые моменты. Это не просто мебель, это тщательно продуманный ансамбль, который преобразит вашу кухню в центр домашнего уюта и стиля, приглашая насладиться каждой минутой, проведенной в ее окружении.\n\n### Техническая информация:\n\n*   **Тип:** Кухонный гарнитур\n*   **Стиль:** Современная классика / Неоклассика\n*   **Материал:**\n    *   Фасады: МДФ с глянцевым покрытием (гладкие и фрезерованные).\n    *   Декоративные элементы и ручки: Металл (с покрытием под золото/бронзу).\n    *   Столешница и фартук: Искусственный камень или кварцевый агломерат с имитацией белого мрамора.\n*   **Цвет:** Белый (основной), Золотистый/Бронзовый (металлические акценты), Белый с серыми прожилками (столешница и фартук).\n*   **Особенности:**\n    *   Фрезерованные фасады с вертикальными полосами (флютинг).\n    *   Декоративные металлические рамки и окантовка золотистого/бронзового оттенка на фасадах.\n    *   Металлические ручки-скобы того же оттенка.\n    *   Просторные верхние и нижние шкафы.\n    *   Выдвижные ящики (минимум три ящика в одном модуле).\n    *   Интегрированная варочная панель и мойка.\n    *   Высокие пеналы для хранения."},{"id":"p6wgQyjpgl17Tv5kpXqb","name":"ЭМИЛИЯ","price":137500,"imageUrls":["https://label-com.ru/images/virtuemart/product/emiliya.jpg"],"category":"Мягкая мебель","originalUrl":"https://label-com.ru/katalog/myagkaya-mebel/emiliya-detail.html","createdAt":"2025-11-24T15:26:21.848Z","updatedAt":"2025-11-24T15:26:21.848Z","rating":0,"reviews":[],"details":{"dimensions":"","material":"","care":""},"description":"Представляем вашему вниманию \"ЭМИЛИЯ\" – изысканный гостиный гарнитур, который мгновенно преображает любое пространство, наполняя его атмосферой благородства и уюта. Этот комплект, состоящий из роскошного дивана и двух элегантных кресел, является идеальным воплощением стиля современной классики, где вечные традиции дизайна встречаются с актуальными тенденциями. \"ЭМИЛИЯ\" создана для тех, кто ценит безупречный вкус и стремится окружить себя предметами, несущими в себе особое очарование.\n\nОбивка комплекта выполнена из высококачественного текстиля с благородной фактурой, напоминающей нежный велюр или бархат. Его теплый бежево-песочный оттенок не только придает мебели универсальность, но и создает ощущение мягкости и воздушности, идеально вписываясь в светлые, наполненные светом интерьеры. Этот утонченный цвет прекрасно гармонирует с золотистыми акцентами – тонкими кантами на подушках и изящными металлическими опорами, которые придают \"ЭМИЛИИ\" неповторимый шик и элегантность.\n\nКаждая деталь гарнитура \"ЭМИЛИЯ\" продумана до мелочей. Внимание сразу привлекает глубокая каретная стяжка (капитоне) на нижних частях дивана и кресел, которая добавляет объема и изысканности, отсылая к классическим образцам мебельного искусства. Удобные, объемные спинки и сиденья обещают исключительный комфорт, а декоративные подушки с золотым кантом не только служат стильным дополнением, но и приглашают к расслаблению. Завершают образ тонкие, но прочные металлические ножки золотого цвета, которые легко приподнимают конструкцию, добавляя ей легкости и визуальной привлекательности.\n\n\"ЭМИЛИЯ\" — это не просто мебель, это центральный элемент интерьера, способный создать в вашей гостиной или приемной зоне атмосферу утонченной роскоши и гостеприимства. С ним каждый момент, проведенный дома, будет наполнен особым комфортом и эстетическим удовольствием. Позвольте \"ЭМИЛИИ\" стать сердцем вашего дома, где стиль встречается с функциональностью, а красота – с долговечностью.\n\n**Техническая информация:**\n*   **Тип:** Гостиный гарнитур (диван и два кресла)\n*   **Материал:** Текстильная обивка (предположительно велюр/бархат), металлические ножки-опоры\n*   **Цвет:** Бежевый/светло-коричневый (обивка), золотой (опоры и декоративные акценты)\n*   **Особенности:** Каретная стяжка (капитоне) на нижней части, декоративные подушки с золотым кантом, металлические конусовидные ножки-опоры"},{"id":"pF7F6oiUZOWrMxs0QisA","name":"Стол Милан","imageUrls":["https://label-com.ru/images/virtuemart/product/stol_milan.jpg"],"category":"Гостиная","originalUrl":"https://label-com.ru/katalog/gostinaya/stol-milan-detail.html","createdAt":"2025-11-24T15:26:21.848Z","updatedAt":"2025-11-24T15:26:21.848Z","rating":0,"reviews":[],"details":{"dimensions":"","material":"","care":""},"price":27000,"description":"Представляем вашему вниманию обеденную группу \"Стол Милан\" — истинное воплощение изысканности и утонченного вкуса, созданную для тех, кто ценит гармонию современной классики в интерьере. Этот комплект, словно сошедший со страниц модного журнала, преобразит вашу столовую в центр элегантности и комфорта, приглашая к незабываемым моментам за общим столом.\n\nЦентральное место занимает стол с идеально гладкой, глянцевой столешницей цвета слоновой кости, которая притягивает взгляд своим мягким сиянием. Ее края деликатно подчеркнуты тонкой золотой окантовкой, добавляющей нотку роскоши. Подстолье стола украшено изящным вертикальным рифлением, продолжающим классическую эстетику, а точеные ножки, окрашенные в тот же благородный кремовый оттенок, завершаются акцентными золотыми кольцами, придавая всей конструкции легкость и воздушность.\n\nКомплект дополняют шесть роскошных стульев, обтянутых мягчайшим велюром теплого бежевого или светло-коричневого оттенка. Каждая высокая спинка стула декорирована эффектной вертикальной прострочкой, которая не только создает неповторимый визуальный ритм, но и обеспечивает дополнительный комфорт. Эргономичная форма стульев обещает уют и поддержку, приглашая провести за столом долгие часы в приятной компании. Ножки стульев, стройные и элегантные, идеально гармонируют с общим дизайном обеденной группы, подчеркивая ее целостность.\n\n\"Стол Милан\" от \"Aura\" — это не просто мебель, это философия гостеприимства, где каждая деталь продумана для создания атмосферы уюта и благородства. Он станет идеальным выбором для тех, кто стремится окружить себя красотой и комфортом, превращая обычные приемы пищи в настоящие праздники вкуса и общения. Позвольте себе эту роскошь, и пусть ваш дом наполнится теплом и изысканностью.\n\n---\n\n**Техническая информация:**\n\n*   **Тип:** Обеденная группа\n*   **Количество предметов:** 7 (1 стол, 6 стульев)\n*   **Форма столешницы:** Прямоугольная\n*   **Материал столешницы:** Глянцевое покрытие (предположительно высококачественный МДФ с лакировкой)\n*   **Материал каркаса стола и ножек:** Высококачественный материал с лакокрасочным покрытием (предположительно МДФ/массив)\n*   **Материал обивки стульев:** Велюр / Бархат\n*   **Цвет стола и ножек:** Кремовый / Слоновая кость\n*   **Цвет обивки стульев:** Теплый бежевый / Светло-коричневый\n*   **Цвет декоративных элементов:** Золотой\n*   **Особенности стола:** Глянцевая столешница, золотая окантовка по периметру, рифленое подстолье, точеные ножки с золотыми акцентами.\n*   **Особенности стульев:** Высокая спинка с вертикальной прострочкой (каналы), эргономичная форма, стройные ножки, обивка из велюра."},{"id":"pLMiYVefh4y4nyF2ptGc","name":"Парма, белый/графит, 5 пред.","price":74450,"imageUrls":["https://label-com.ru/images/virtuemart/product/1.jpg"],"category":"Спальни","originalUrl":"https://label-com.ru/katalog/spalni/parma-2c-bel-grafit-2c-5-pred-detail.html","rating":0,"reviews":[],"createdAt":{"_seconds":1764052723,"_nanoseconds":139000000},"description":"Добро пожаловать в мир утонченного стиля с мебельным магазином Aura! Представляем вашему вниманию гарнитур \"Парма, белый/графит, 5 пред.\" — воплощение современной элегантности и функционального дизайна, созданное для преображения вашей спальни в истинный оазис комфорта и красоты.\n\nС первого взгляда комплект \"Парма\" очаровывает своей продуманной эстетикой, балансирующей на грани минимализма и выразительности. Центральное место занимает просторная кровать с массивным изголовьем, которое гармонично сочетает в себе мягкую, глубокую обивку цвета ночного неба с эффектными белыми 3D-панелями. Эти панели, словно искусно вырезанные волны или геометрический рельеф, придают мебели неповторимую текстурную глубину и игру света, мгновенно притягивая взгляд. Прикроватные тумбы и комод подхватывают этот ритм, демонстрируя уникальные рельефные фасады в белоснежном глянце, контрастирующие с гладкими, матовыми поверхностями цвета графит.\n\nГарнитур \"Парма\" не просто мебель, это ансамбль, каждый элемент которого служит созданию целостной и гармоничной атмосферы. Вместительный шкаф-купе поражает своим масштабом и функциональностью: зеркальные дверцы не только визуально расширяют пространство, но и отражают свет, наполняя комнату воздухом и легкостью, в то время как боковые створки повторяют изысканный 3D-орнамент. Элегантные черные ручки-планки на всех элементах подчеркивают современный характер коллекции, добавляя строгих, но изящных акцентов.\n\n\"Парма\" — это выбор тех, кто ценит чистоту линий, инновационные решения и безупречный стиль. Этот гарнитур создает ощущение спокойствия и роскоши, предлагая идеальное пространство для отдыха и вдохновения. Он станет центральным элементом вашего интерьера, свидетельством отличного вкуса и стремления к совершенству в каждой детали.\n\n### Техническая информация:\n\n*   **Тип:** Спальный гарнитур\n*   **Количество предметов:** 5 предметов (Кровать, 2 прикроватные тумбы, Шкаф, Комод с зеркалом)\n*   **Материал:**\n    *   Корпус: Высококачественные плиточные материалы в цвете графит (матовый/сатиновый финиш)\n    *   Фасады: Высококачественные плиточные материалы в белом глянце с уникальной 3D-текстурой; гладкие фасады в цвете графит; зеркальное полотно (на дверцах шкафа и над комодом)\n    *   Изголовье кровати: Мягкая текстильная обивка в темно-синем/угольном цвете\n    *   Ручки: Металлические, черные, планка\n*   **Цвет:** Белый глянец, Графит (темно-серый), Темно-синий/Угольный (обивка изголовья)\n*   **Особенности:**\n    *   Изголовье кровати с мягкой обивкой и декоративными 3D-панелями.\n    *   Уникальная рельефная 3D-текстура на белых фасадах.\n    *   Зеркальные фасады на шкафу для визуального расширения пространства.\n    *   Контрастное сочетание глянцевых текстурированных и матовых/сатиновых гладких поверхностей.\n    *   Минималистичные черные ручки-планки.\n    *   Наличие выдвижных ящиков и распашных дверей для хранения."},{"id":"q8GPSg1g17nDNMKSKF1Y","name":"Сэнди","price":86900,"imageUrls":["https://label-com.ru/images/virtuemart/product/sendi.png"],"category":"Спальни","originalUrl":"https://label-com.ru/katalog/spalni/sendi-detail.html","rating":0,"reviews":[],"createdAt":{"_seconds":1764052794,"_nanoseconds":68000000},"description":"Представляем спальный гарнитур \"Сэнди\" от Aura — воплощение современной элегантности и утонченного комфорта, созданное для тех, кто ценит гармонию стиля и функциональности. Этот комплект мебели, разработанный на пересечении минимализма и природной теплоты, привносит в вашу спальню атмосферу спокойствия и изысканности. \"Сэнди\" — это не просто мебель, это тщательно продуманное пространство, где каждая деталь служит вашему отдыху и эстетическому наслаждению.\n\nВ основе дизайна \"Сэнди\" лежит выразительный контраст текстур и оттенков. Фасады мебели выполнены в глубоком, насыщенном цвете натурального дерева, которое имитирует благородный шпон или массив, придавая интерьеру теплоту и уют. Эту природную палитру эффектно дополняют вставки матового серого цвета, используемые в прикроватных тумбах, комоде и элементах шкафа, добавляя современный акцент и строгость линий. Главный акцент спальни — мягкое изголовье кровати, обитое плотным текстилем или велюром глубокого черного оттенка, с изящной горизонтальной стежкой, которая приглашает к расслаблению и обещает безмятежный сон.\n\nГарнитур \"Сэнди\" включает в себя все необходимое для обустройства идеальной спальни: просторную кровать с высоким мягким изголовьем, элегантные прикроватные тумбы, функциональный комод и вместительный шкаф. Шкаф с комбинированными фасадами — часть из которых выполнена под дерево, а центральные секции дополнены зеркальными элементами и матово-серыми вставками — не только обеспечивает достаточно места для хранения, но и визуально расширяет пространство, наполняя его светом. Фурнитура представлена лаконичными, интегрированными ручками, подчеркивающими чистые линии и современный характер коллекции.\n\n\"Сэнди\" создает убежище от суеты, где каждый элемент работает на создание атмосферы уюта и стиля. Это идеальный выбор для современного интерьера, стремящегося к балансу между шиком мегаполиса и неброской красотой природных мотивов. С гарнитуром \"Сэнди\" ваша спальня станет не просто комнатой, а истинным оазисом релаксации и безупречного вкуса.\n\n***\n\n### Техническая информация:\n\n*   **Тип:** Спальный гарнитур, включающий кровать, две прикроватные тумбы, вместительный шкаф, комод и настенное зеркало.\n*   **Материал:**\n    *   Каркасы и фасады: Высококачественная ламинированная ДСП или МДФ с текстурой под натуральное дерево и матовым серым покрытием.\n    *   Изголовье кровати: Мягкое, обитое плотным мебельным текстилем (предположительно велюром или рогожкой) черного или очень темно-серого цвета.\n    *   Зеркальные элементы: В шкафу и отдельное настенное зеркало.\n    *   Фурнитура: Металлические направляющие и петли, лаконичные ручки, интегрированные или врезные.\n*   **Цвет:** Оттенки натурального дерева (темный орех/дуб), матовый серый, черный/темно-серый (изголовье).\n*   **Особенности:**\n    *   Мягкое, высокое изголовье кровати с выраженной горизонтальной стежкой.\  округлыми формами и рельефными вертикальными полосами на фасадах идеально вписываются в общую концепцию, предлагая функциональность без ущерба для эстетики.\n\nЗавершает композицию вместительный шкаф-купе, чьи зеркальные фасады не только расширяют пространство, но и отражают свет, наполняя комнату сиянием. Рядом с ним расположен элегантный комод с изогнутыми боковинами, украшенными такой же рифленой фактурой, как и тумбы. Глянцевая столешница комода имитирует светлый мрамор, а золотые акценты и изящные ручки подчеркивают его роскошный характер. Дополняет картину изысканное овальное зеркало в толстой раме с аналогичным рифленым узором и золотой окантовкой, становясь ярким акцентом в интерьере.\n\nЦветовая палитра гарнитура — это симфония светлых оттенков: от нежного бежевого изголовья до глубокого светло-серого глянца корпусной мебели, гармонично дополненная мерцающим золотом металлических элементов. Эти цвета создают ощущение простора и свежести, а тактильные поверхности, такие как мягкая обивка и рельефная отделка, приглашают к прикосновению. \"Ницца Luxury\" — это не просто мебель, это целостная концепция идеальной спальни, где каждая деталь продумана для вашего максимального комфорта и эстетического наслаждения.\n\n---\n\n### Техническая информация:\n\n*   **Тип:** Спальный гарнитур (комплект для спальни)\n*   **Материал:**\n    *   Каркас мебели: Глянцевая МДФ/ЛДСП (с покрытием лаком).\n    *   Обивка изголовья: Мягкая мебельная ткань (предположительно велюр/бархат).\n    *   Декоративные элементы: Металл (цвет золота/латуни), зеркальные вставки.\n    *   Столешницы тумб и комода: Глянцевая поверхность (имитация мрамора или ламинированная МДФ).\n*   **Цвет:** Светло-серый (основной), бежевый/кремовый (изголовье), золотой (декоративные акценты), белый (столешницы).\n*   **Особенности:**\n    *   Геометрический рельефный узор изголовья с металлическими вставками.\n    *   Фактурная рифленая/вертикально-полосатая отделка на боковинах прикроватных тумб, комода и ра я вашего максимального комфорта и визуального наслаждения.\n\n**Техническая информация:**\n*   **Тип:** Спальный гарнитур (6 предметов)\n*   **Стиль:** Современная классика, элегантный, минимализм\n*   **Материал:**\n    *   Обивка кровати и пуфа: Фактурная ткань (кремовый/светло-бежевый)\n    *   Корпусная мебель (тумбы, комод, шкаф): МДФ/ЛДСП (основа)\n    *   Столешницы и ножки туалетного столика: Под светлое дерево (например, дуб сонома/бук)\n    *   Ручки: Металл (золотистый/латунный оттенок)\n    *   Зеркала: Вставки на дверях шкафа, настенное зеркало\n*   **Цвет:** Кремовый/светло-бежевый, светлое дерево, золотистые акценты\n*   **Особенности:**\n    *   Мягкое изголовье кровати с прямоугольной (каретной) прошивкой\n    *   Рифленые/рельефные фасады ящиков и нижней части тумб\n    *   Зеркальные дверцы шкафа\n    *   Металлические ручки в золотистом оттенке\n    *   Комплектация: Кровать, 2 прикроватные тумбы, шкаф, туалетный столик (комод), пуф."},{"id":"tFUpxhMdMXha5tl2UTkl","name":"Мягкая мебель BEST","price":126500,"imageUrls":["https://label-com.ru/images/virtuemart/product/best.jpg"],"category":"Мягкая мебель","originalUrl":"https://label-com.ru/katalog/myagkaya-mebel/myagkaya-mebel-best-detail.html","rating":0,"reviews":[],"createdAt":{"_seconds":1764053438,"_nanoseconds":182000000},"description":"Представляем \"Мягкую мебель BEST\" от \"Aura\" — воплощение современного комфорта и безупречного стиля, созданное для того, чтобы стать сердцем вашего дома. С первого взгляда диван очаровывает своей лаконичной элегантностью и функциональной продуманностью. Глубокий оттенок антрацита, переходящий в благородный темно-серый, придает этой модели особую респектабельность и легко интегрируется в любой современный интерьер, от минимализма до городской классики. Контрастная светлая отстрочка по контуру всех элементов подчеркивает строгие, но обволакивающие формы, добавляя изысканный акцент и динамику.\n\nОбивка дивана выполнена из высококачественного текстиля, напом й/хромированный оттенок).\n    *   В комплекте декоративные подушки."},{"id":"tk8w9tmDxwaFyMR8gyRx","name":"Модель «РЕЛАКС»","price":135000,"imageUrls":["https://label-com.ru/images/virtuemart/product/relax2.jpeg"],"category":"Мягкая мебель","originalUrl":"https://label-com.ru/katalog/myagkaya-mebel/model-relaks-detail.html","rating":0,"reviews":[],"createdAt":{"_seconds":1764053403,"_nanoseconds":814000000},"description":"Погрузитесь в мир безупречного комфорта и изысканного стиля с моделью «РЕЛАКС» от мебельного магазина \"Aura\". Этот мебельный комплект, состоящий из элегантного трехместного дивана и двух уютных кресел, разработан, чтобы стать центральным элементом вашей гостиной, предлагая не только исключительное удобство, но и утонченный, современный дизайн. Модель «РЕЛАКС» — это воплощение спокойствия и гармонии, приглашающее вас отдохнуть от суеты дня в атмосфере сдержанной роскоши.\n\nВизуальный облик комплекта строится на мягкой, невероятно приятной на ощупь фактурной ткани светло-серого оттенка, напоминающей благородный велюр или нежную замшу с легким эффектом потертости. Этот цвет создает ощущение легкости и воздушности, при этом демонстрируя практичность и универсальность, позволяя мебели гармонично вписаться в самые разнообразные интерьеры. Особое внимание привлекает вертикальная канальная стежка, украшающая спинки дивана и боковые части кресел, а также нижнюю часть их фасадов, добавляя объема и изысканности каждой детали.\n\nЭлегантные линии мебели подчеркнуты контрастной окантовкой, которая придает завершенность и графичность силуэту. Теплые, глубокие оттенки натурального дерева присутствуют в изящных конусовидных ножках, что придает конструкции устойчивость и легкость, а также в уникальных вставках на подлокотниках дивана, создающих гармоничный дуэт с общим дизайном. Декоративные подушки, идущие в комплекте, дополняют ансамбль: однотонные для дивана и акцентные для кресел, украшенные современными вертикальными металлическими полосами цвета \"хром\", которые добавляют нотку современного шика.\n\nЭтот комплект мягкой мебели излучает ауру спокойствия и современной элегантности. Он идеально подойдет для тех, кто ценит не только функциональность, но и эстетику, стремясь создать в своем доме оазис уюта и стиля. Модель «РЕЛАКС» — это приглашение насладиться каждым моментом, проведенным дома, окружив себя красотой и комфортом, которые продуманы до мельчайших деталей.\n\n---\n\n**Техническая информация:**\n\n*   **Тип:** Комплект мягкой мебели для гостиной (трехместный диван и два кресла).\n*   **Материал обивки:** Мягкая фактурная ткань (предположительно, велюровая или замшевая ткань с эффектом потертости).\n*   **Материал каркаса/ножек:** Натуральное дерево.\n*   **Цвет обивки:** Светло-серый (оттенок \"голубиная сизая\").\n*   **Цвет деревянных элементов:** Темно-коричневый (оттенок \"темный орех\").\n*   **Декоративные акценты:** Металлические полосы цвета \"хром\" на подушках кресел.\n*   **Особенности:**\n    *   Вертикальная канальная стежка на спинках и боковых элементах.\n    *   Контрастная окантовка по периметру мягких элементов.\n    *   Изящные конусовидные ножки из натурального дерева.\n    *   Декоративные вставки из дерева на подлокотниках дивана.\n    *   Комплект декоративных подушек."},{"id":"uMSgeDtB3nJqW3sjfNYt","name":"Мария","imageUrls":["https://label-com.ru/images/virtuemart/product/marija_5,1.jpg"],"category":"Кухни","originalUrl":"https://label-com.ru/katalog/kukhni-1/mariya-2-detail.html","createdAt":"2025-11-24T15:26:21.838Z","updatedAt":"2025-11-24T15:26:21.839Z","rating":0,"reviews":[],"details":{"dimensions":"","material":"","care":""},"price":104500,"description":"Представляем вашему вниманию кухонный гарнитур \"Мария\" от Aura — воплощение изящества и функциональности, созданное для тех, кто ценит гармонию современного комфорта и вечной классики. Этот комплект мебели мгновенно преобразит вашу кухню, наполнив ее светом, уютом и атмосферой аристократической элегантности. Дизайн \"Марии\"
