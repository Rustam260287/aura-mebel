:{"dimensions":"","material":"","care":""},"description":"Добро пожаловать в мир изысканного комфорта с диваном \"Эдель\" от \"Aura\" – предметом мебели, созданным, чтобы восхищать и дарить неповторимые ощущения уюта и роскоши. Взгляните на него, и вы сразу почувствуете, как пространство вокруг наполняется атмосферой утонченности и благородства. \"Эдель\" – это безупречное воплощение современной классики с элегантными нотками ар-деко, призванное стать центральным акцентом вашего интерьера, будь то просторная гостиная или уютная студия.\n\nОбивка дивана \"Эдель\" выполнена из нежнейшего велюра, который очаровывает своей шелковистой текстурой и притягательным блеском. Выбранный оттенок – \"пыльная роза\" или \"пудровый беж\" – создает ощущение воздушности и легкости, при этом добавляя интерьеру теплоты и романтики. Этот утонченный цвет идеально гармонирует с полированными золотистыми металлическими акцентами, обрамляющими боковины дивана. Эти детали не просто подчеркивают четкие линии и форму, но и добавляют изысканный штрих роскоши, отражая свет и создавая игру бликов.\n\nГлавной изюминкой дизайна, бесспорно, является глубокая каретная стяжка (капитоне), украшающая боковые части и придающая дивану величественный и статусный вид. Ромбовидный узор, образованный утяжками, создает объем и фактуру, напоминая о традициях высокого мебельного искусства. В комплект входят мягкие декоративные подушки, выполненные в тон основной обивке, которые не только дополняют эстетику, но и обеспечивают дополнительный комфорт, приглашая к полному расслаблению.\n\nПомимо своей безупречной эстетики, \"Эдель\" удивляет своей функциональностью. Диван легко трансформируется в просторное и комфортабельное спальное место благодаря продуманному выкатному механизму. Это делает его идеальным решением не только для повседневного отдыха, но и для приема гостей, предлагая им полноценный сон. \"Эдель\" – это не просто диван, это обещание комфорта, стиля и безупречного качества, которое прослужит вам долгие годы.\n\n---\n\n**Техническая информация:**\n\n*   **Тип:** Раскладной диван / Диван-кровать\n*   **Механизм трансформации:** Выкатной\n*   **Материал обивки:** Велюр\n*   **Цвет обивки:** Пудровый / Бежево-розовый / Оттенок \"пыльной розы\"\n*   **Декоративные элементы:** Металлические планки золотистого цвета на боковинах\n*   **Особенности:**\n    *   Глубокая каретная стяжка (капитоне) на боковинах.\n    *   Прямые подлокотники.\n    *   В комплекте четыре декоративные подушки (две большие квадратные, две маленькие прямоугольные)."}},"__N_SSG":true},"page":"/products/[id]","query":{"id":"SGzkbSZiArLMGpBOB7tV"},"buildId":"15N6UJ1ZcCWJtJ8S4Eosx","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
