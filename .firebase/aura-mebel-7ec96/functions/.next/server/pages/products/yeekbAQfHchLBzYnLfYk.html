,"material":"","care":""},"price":104500,"description":"**Женева**\n\nПредставляем кухонный гарнитур \"Женева\" — воплощение утонченного вкуса и гармонии, где классические мотивы встречаются с современной функциональностью. Этот изысканный ансамбль, выполненный в стиле неоклассика, мгновенно преображает пространство, наполняя его светом и чувством непреходящей элегантности. Каждая линия, каждый элемент здесь говорит о продуманном дизайне и стремлении к совершенству, создавая атмосферу уюта и благородной роскоши, идеальной для сердца вашего дома.\n\nФасады гарнитура представлены в безупречном белом оттенке, который визуально расширяет пространство и служит идеальным фоном для игры света. Контрастным, но в то же время гармоничным акцентом выступает величественная столешница и фартук, имитирующие натуральный мрамор с изящными серыми прожилками. Этот дуэт создает ощущение чистоты и природной красоты, а золотистые металлические ручки-скобы деликатно подчеркивают премиальность исполнения, добавляя шика и теплого сияния.\n\nОсобое внимание привлекают детали: высокие витринные шкафы с тонкой стеклянной раскладкой, позволяющие демонстрировать изысканную посуду, и центральный элемент над варочной панелью, украшенный рифлеными фасадами. Филенчатые дверцы нижних и верхних шкафов, дополненные декоративными карнизами, придают гарнитуру завершенный и аристократичный вид. Продуманная эргономика и возможность интеграции современной бытовой техники делают \"Женеву\" не только произведением искусства, но и высокофункциональным решением для кулинарных шедевров.\n\n\"Женева\" — это не просто кухня, это философия жизни, где ценится красота в простоте, комфорт и возможность наслаждаться каждым моментом в окружении изысканного дизайна. Она создана для тех, кто ищет баланс между традиционной эстетикой и современными требованиями, желая обустроить дом с безупречным стилем и неповторимым шармом, который будет радовать глаз многие годы.\n\n---\n\n**Техническая информация:**\n\n*   **Тип:** Кухонный гарнитур / Модульная кухня\n*   **Материал:**\n    *   Фасады: МДФ с эмалевым покрытием (предположительно), ЛДСП (корпус)\n    *   Столешница и фартук: Кварцевый агломерат / Искусственный камень с эффектом мрамора\n    *   Декоративные элементы: МДФ (карнизы, рифленые вставки)\n    *   Витрины: Прозрачное закаленное стекло с раскладкой\n    *   Фурнитура: Металл (ручки-скобы)\n*   **Цвет:**\n    *   Фасады: Белый / Светлый\n    *   Столешница и фартук: Белый с серым мраморным узором\n    *   Фурнитура: Золотистый\n*   **Особенности:**\n    *   Филенчатые (панельные) фасады на большинстве элементов.\n    *   Витринные шкафы с декоративной стеклянной раскладкой.\n    *   Верхние фасады с рифленой (фрезерованной) текстурой над варочной панелью.\n    *   Декоративные карнизы по верхнему периметру.\n    *   Горизонтальные ручки-скобы золотистого цвета.\n    *   Встроенная варочная панель.\n    *   Высокий пенал со стеклянной витриной в левой части.\n    *   Вертикальный пенал для хранения в правой части.\n    *   Единый фартук, переходящий в столешницу.\n    *   Выдвижные ящики в нижнем ярусе."}},"__N_SSG":true},"page":"/products/[id]","query":{"id":"yeekbAQfHchLBzYnLfYk"},"buildId":"15N6UJ1ZcCWJtJ8S4Eosx","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
