com.ru/images/virtuemart/product/elena.jpg"],"description":"Представляем вашему вниманию коллекцию \"Елена\" от мебельного магазина \"Aura\" — истинное воплощение изысканности и утонченного комфорта, созданное для тех, кто ценит безупречный стиль и высококачественный дизайн. Этот ансамбль мягкой мебели и центрального столика гармонично сочетает в себе элегантные элементы современной классики с нотками роскошного ар-деко, мгновенно преображая любое пространство в оазис уюта и гламура. Коллекция \"Елена\" станет центральным акцентом вашего интерьера, притягивая взгляды и даря незабываемые ощущения комфорта.\n\nВ основе коллекции — благородная обивка из мягчайшего велюра или бархата в нежном оттенке тауп, который придает мебели деликатный, чуть мерцающий блеск и тактильную приятность. Плавные, округлые линии подлокотников дивана и кресел словно обнимают, приглашая расслабиться в их объятиях, обещая исключительный комфорт. Изящные металлические ножки золотистого оттенка не только обеспечивают надежную поддержку, но и служат выразительным акцентом, добавляя конструкции легкости и аристократичного блеска. Декоративные подушки, некоторые из которых украшены утонченной геометрической стежкой, искусно дополняют ансамбль, создавая дополнительный объем и тактильное разнообразие.\n\nЦентральное место в композиции занимает приставной столик, выполненный в безупречно белом глянцевом покрытии. Его дизайн поистине уникален: элегантный корпус дополнен выразительным греческим орнаментом \"меандр\" в серебристом исполнении, придающим столику характер и изысканность. Необычное Х-образное основание и удобная открытая полка под столешницей делают его не только стильным, но и функциональным элементом. Сочетание мягкой обивки, золотых и серебристых акцентов, а также глянцевых поверхностей создает атмосферу утонченной роскоши и умиротворения, идеально подходящую как для приема гостей, так и для спокойного вечера в кругу семьи.\n\n**Техническая информация:**\n*   **Тип:** Гарнитур для гостин
