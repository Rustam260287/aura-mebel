ils":{"dimensions":"","material":"","care":""},"description":"Добро пожаловать в мир утонченного стиля с комплектом мебели KREYA от \"Aura\". Этот изысканный ансамбль, представленный на изображении, воплощает собой идеальное сочетание современного дизайна и безупречного комфорта, создавая атмосферу спокойствия и элегантности в любом пространстве. С первого взгляда KREYA пленяет своей гармонией форм и текстур, становясь центральным элементом роскошной гостиной или изысканной зоны отдыха.\n\nВ основе коллекции KREYA лежит трехместный диван и два уютных кресла, обитые высококачественной матовой тканью глубокого темно-серого цвета. Этот оттенок антрацита придает мебели благородный и универсальный вид, легко вписываясь в разнообразные интерьерные палитры. Обивка не просто красива, но и тактильно приятна, обещая непревзойденный комфорт благодаря щедрой набивке и эргономичной форме спинок. Диван и кресла гармонично дополнены изящными деревянными ножками теплого коричневого оттенка, которые сужаются к низу, добавляя легкости и элегантности общей конструкции. Наличие декоративных подушек на креслах подчеркивает внимание к деталям и обеспечивает дополнительную поддержку.\n\nЗавершает композицию KREYA стильный журнальный столик, который является истинным произведением мебельного искусства. Его прямоугольная столешница из прозрачного стекла придает конструкции воздушность и современный вид, одновременно обеспечивая практичную и легкую в уходе поверхность. Основание столика обтянуто той же темно-серой тканью, что и мягкая мебель, и украшено элегантной вертикальной прострочкой, создающей объемный и фактурный вид. Металлические ножки с хромированным блеском завершают образ, привнося нотку современного шика и обеспечивая надежную устойчивость.\n\nKREYA — это больше, чем просто мебель; это заявление о стиле, приглашение к отдыху и символ безупречного вкуса. Комплект идеально подходит для создания зоны релаксации, где каждый элемент способствует созданию атмосферы уюта и гармонии. От
