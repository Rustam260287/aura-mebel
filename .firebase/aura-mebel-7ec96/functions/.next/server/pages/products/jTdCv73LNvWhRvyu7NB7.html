mensions":"","material":"","care":""},"price":24000,"description":"Представляем вашему вниманию обеденную группу \"Стол Лапка\" — истинное воплощение роскоши и утонченности, способное преобразить любую столовую в дворцовые апартаменты. Этот ансамбль, выполненный в благородном классическом стиле с выраженными элементами барокко и неоклассики, не просто мебель, а центральный акцент, который задает тон всему пространству. Каждая деталь здесь продумана до мелочей, чтобы создать атмосферу величия и изысканного вкуса, идеально подходящую для торжественных приемов и теплых семейных вечеров.\n\nСердцем комплекта является овальный стол с величественной столешницей. Ее глянцевая поверхность имитирует натуральный мрамор в нежных серых тонах, создавая эффект глубины и изысканности. Кажется, будто на столешнице застыли облака или причудливые узоры камня, отражая свет и придавая блеск интерьеру. Край столешницы украшен искусной резьбой, вторящей витиеватым узорам на массивном основании. Стол опирается на элегантную центральную колонну с канелюрами, переходящую в изящные фигурные ножки-лапки, каждая из которых является произведением мебельного искусства.\n\nШесть изысканных стульев, входящих в комплект, гармонично дополняют стол. Их высокие, изогнутые спинки увенчаны великолепной резьбой, напоминающей корону или искусный орнамент. Обивка спинок выполнена из мягкого, бархатистого велюра глубокого серого оттенка, который дарит тактильное наслаждение и придает уюта. Сиденья стульев контрастируют с бархатом спинок благодаря глянцевому покрытию того же темно-серого цвета, создавая эффектное сочетание текстур. Фигурные ножки стульев повторяют изгибы ножек стола, завершая целостный и гармоничный образ. Один из стульев комплектуется подлокотниками, добавляя функциональности и еще большего комфорта.\n\nОбеденная группа \"Стол Лапка\" в цвете слоновой кости с серой обивкой и мраморной столешницей — это не просто место для трапезы, это пространство, где рождаются незабываемые моменты. Она излучает благородство и вечную красоту, становясь символом вашего безупречного вкуса и гостеприимства. С этим комплектом ваш дом наполнится атмосферой изысканности, достойной самых высоких похвал.\n\n---\n\n**Техническая информация:**\n\n*   **Тип:** Обеденная группа (стол и шесть стульев).\n*   **Материал:**\n    *   Каркас стола и стульев: Массив дерева / Высококачественная МДФ с резным декором.\n    *   Столешница: Глянцевая, с имитацией натурального камня (мрамора).\n    *   Обивка спинок стульев: Велюр / Бархат.\n    *   Обивка сидений стульев: Глянцевое покрытие (возможно, экокожа или лак).\n*   **Цвет:**\n    *   Каркас: Светло-серый / Оттенок слоновой кости.\n    *   Обивка спинок и сидений: Темно-серый.\n    *   Столешница: Светло-серый с мраморным узором.\n*   **Особенности:**\n    *   Изысканный резной декор ручной работы на каркасах стола и стульев.\n    *   Фигурные ножки-кабриоль.\n    *   Высокие, орнаментированные спинки стульев.\n    *   Овальная форма столешницы.\n    *   Массивное центральное основание стола с колоннообразной опорой.\n    *   Включает один стул с подлокотниками (кресло) и пять стульев без подлокотников."}},"__N_SSG":true},"page":"/products/[id]","query":{"id":"jTdCv73LNvWhRvyu7NB7"},"buildId":"15N6UJ1ZcCWJtJ8S4Eosx","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
