ion":"Позвольте представить \"Мебель ИЗМИР\" — воплощение роскоши и безупречного вкуса, созданное для тех, кто ценит великолепие классики. Этот гарнитур для гостиной, состоящий из величественного дивана и двух изящных кресел, мгновенно переносит в эпоху дворцовой элегантности. Его стиль, несомненно, вдохновлен пышным барокко и утонченным рококо, призванным создать в вашем доме атмосферу аристократического салона. \"ИЗМИР\" — это не просто мебель, а центральный акцент, который наполняет пространство ощущением грандиозности и комфорта.\n\nСердце коллекции \"ИЗМИР\" — это искусная резьба по дереву, украшающая каждый элемент каркаса. Замысловатые, витиеватые орнаменты, напоминающие растительные мотивы и геральдические символы, выполнены с поразительным вниманием к деталям. Каркас, обработанный под античное золото с легкой патиной, не только подчеркивает богатство и глубину каждой линии, но и придает мебели вид подлинного фамильного сокровища. Фигурные ножки, хотя и частично скрытые защитной упаковкой, обещают продолжение общей декоративной концепции, завершая образ истинного произведения искусства.\n\nОбивка комплекта \"ИЗМИР\" выполнена из благородного текстиля, дарящего ощущение мягкости и уюта. Спинки дивана и кресел украшены глубокой каретной стяжкой (капитоне), которая придает им объем, фактуру и дополнительную изысканность, приглашая к расслабленному отдыху. Цветовая палитра строится на теплых, приглушенных оттенках шампанского и жемчужного бежевого, гармонично дополненных золотистыми акцентами резного дерева. Сиденья и декоративные подушки обтянуты тканью с богатым, дамасским или флористическим узором, который великолепно сочетается с общим стилем, добавляя комплекту завершенность и шик. Особое внимание привлекает круглая подушка на диване, стянутая по центру, что является еще одной деталью, подчеркивающей продуманность дизайна.\n\nТехническая информация:\n*   **Тип:** Гарнитур мягкой мебели для гостиной (диван и два кресла).\n*   **Материал:** Каркас: массив дер
