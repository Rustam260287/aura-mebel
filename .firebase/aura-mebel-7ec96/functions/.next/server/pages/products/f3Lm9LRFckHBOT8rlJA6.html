ils":{"dimensions":"","material":"","care":""},"description":"Добро пожаловать в мир роскоши и безупречного стиля с мебелью от \"Aura\".\n\nПредставляем Вашему вниманию \"BUGATTI\" – имя, которое говорит само за себя, воплощая в себе мощь, элегантность и безупречный вкус. Этот угловой диван – не просто предмет мебели, а центральный элемент интерьера, способный мгновенно преобразить любое пространство, наполнив его атмосферой утонченной роскоши. Его дизайн искусно балансирует на грани современной эстетики и классической респектабельности, приглашая к полному погружению в мир комфорта.\n\nОбивка дивана выполнена в благородном, теплом оттенке светло-бежевого, который можно описать как изысканный \"грейдж\", обладающий легкой текстурой, напоминающей дорогостоящую кожу. Этот материал не только приятен на ощупь, но и отличается превосходной износостойкостью. Плавные, округлые линии подлокотников и спинки, подчеркнутые аккуратной горизонтальной отстрочкой, придают модели объем и мягкость, создавая ощущение обволакивающего уюта.\n\nОсобое внимание привлекают детали: на боковинах широких подлокотников размещены изящные декоративные вставки из темного, полированного дерева с изогнутыми линиями, напоминающими произведения искусства. Эти элементы добавляют дивану уникальный характер и тонкую роскошь, свидетельствуя о ручной работе и внимании к каждой детали. Основание дивана, также выполненное из темного дерева, обеспечивает устойчивость и завершает целостный образ, придавая \"BUGATTI\" основательность и солидность, достойную Вашего дома.\n\n\"BUGATTI\" от \"Aura\" – это не просто мебель, это инвестиция в Ваш комфорт и стиль.\n\n---\n\n**Техническая информация:**\n*   **Тип:** Угловой диван\n*   **Материал:** Высококачественная мебельная ткань (или экокожа) с имитацией текстуры кожи, массив дерева (или шпон) для декоративных элементов и основания, наполнитель (мягкий пенополиуретан).\n*   **Цвет:** Светло-бежевый/Грейдж (обивка), темно-коричневый (декоративные деревянные вставк
