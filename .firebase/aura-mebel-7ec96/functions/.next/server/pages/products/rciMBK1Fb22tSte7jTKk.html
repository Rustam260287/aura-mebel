ion":"Добро пожаловать в мир изысканного стиля и безупречного комфорта с комплектом мягкой мебели SALERNO от \"Aura\". Этот ансамбль – истинное воплощение современной роскоши, призванное преобразить ваше пространство, наполнив его атмосферой благородства и утонченного дизайна. Комплект SALERNO безупречно сочетает в себе строгую элегантность контемпорари с эффектными акцентами, создавая гармоничное и притягательное пространство для жизни.\n\nЦентральное место в комплекте занимает просторный трехместный диван, дополненный двумя уютными креслами, каждый из которых представляет собой произведение мебельного искусства. Все элементы обиты высококачественным мебельным текстилем глубокого антрацитового оттенка, который не только дарит приятные тактильные ощущения, но и выглядит чрезвычайно стильно и благородно. Особый шарм мебели придают утонченные золотистые акценты: изящная декоративная окантовка по периметру нижней части и элегантные вставки, подчеркивающие плавные изгибы подлокотников дивана и основания кресел. Встроенные подушки со стильной геометрической прострочкой на диване и деликатная каретная стяжка на боковинах кресел добавляют изысканности и обеспечивают исключительный комфорт.\n\nЗавершают композицию два журнальных столика, выполненных в минималистичном, но эффектном дизайне. Их круглые столешницы из камня, одна – глянцевая черная, другая – светлая, под белый мрамор, создают интересный контраст и идеально дополняют общую цветовую палитру комплекта. Металлические каркасы столиков, выполненные в элегантном черном цвете, придают им легкость и современный вид. Комплект SALERNO – это не просто мебель, это завершенное дизайнерское решение, которое говорит о безупречном вкусе его обладателя и приглашает окунуться в мир абсолютного комфорта и современной роскоши каждый день.\n\n---\n\n**Техническая информация:**\n\n*   **Тип:** Комплект мягкой мебели для гостиной (диван и кресла), журнальные столики.\n*   **Состав комплекта:** Трехместный диван, два кресла, два журнальных столика.\n*   **Материал обивки:** Мебельный текстиль (предположительно, матовый велюр или аналогичная плотная ткань).\n*   **Материал декоративных элементов:** Металл с золотистым покрытием.\n*   **Материал ножек (диван, кресла):** Металл с золотистым покрытием.\n*   **Материал столешниц журнальных столиков:** Камень или искусственный камень (под мрамор).\n*   **Материал каркаса журнальных столиков:** Металл (черный).\n*   **Цвет обивки:** Темно-серый / Антрацитовый.\n*   **Цвет акцентов:** Золотистый.\n*   **Цвет столешниц:** Черный, белый/светло-серый.\n*   **Особенности дивана:** Плавные линии, золотистая декоративная окантовка по периметру нижней части и на подлокотниках, встроенные подушки спинки с геометрической прострочкой.\n*   **Особенности кресел:** Округлая эргономичная форма, золотистая декоративная окантовка по периметру нижней части, каретная стяжка (пуговицы) на боковинах, низкие золотистые ножки.\n*   **Особенности журнальных столиков:** Комплект из двух круглых столиков разной высоты и диаметра, контрастные столешницы из камня, открытые металлические каркасы."}},"__N_SSG":true},"page":"/products/[id]","query":{"id":"rciMBK1Fb22tSte7jTKk"},"buildId":"15N6UJ1ZcCWJtJ8S4Eosx","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
