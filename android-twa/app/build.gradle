plugins {
    id 'com.android.application'
    id 'org.jetbrains.kotlin.android'
}

android {
    namespace 'com.aura.shell'
    compileSdk 34

    defaultConfig {
        applicationId "com.aura.shell"
        minSdk 24
        targetSdk 34
        versionCode 1
        versionName "1.0"
        
        // TWA Configuration
        manifestPlaceholders = [
            hostName: "aura-room.ru",
            defaultUrl: "https://aura-room.ru/ar",
            assetStatements: '[{"relation": ["delegate_permission/common.handle_all_urls"], "target": {"namespace": "web", "site": "https://aura-room.ru"}}]'
        ]
    }

    buildTypes {
        release {
            minifyEnabled true
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }
    kotlinOptions {
        jvmTarget = '1.8'
    }
}

dependencies {
    implementation "com.google.androidbrowserhelper:androidbrowserhelper:2.5.0"
}

