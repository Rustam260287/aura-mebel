<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aura Мебель</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet">

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'brand-cream': '#F5F5DC',
            'brand-cream-dark': '#EAE8D3',
            'brand-brown': '#8B4513',
            'brand-charcoal': '#36454F',
            'brand-terracotta': '#E2725B',
            'brand-terracotta-dark': '#C8604C',
            'brand-gold': '#FFD700',
          },
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
            serif: ['Playfair Display', 'serif'],
          },
          animation: {
            'subtle-fade-in': 'subtle-fade-in 0.6s ease-out forwards',
            'subtle-fade-out': 'subtle-fade-out 0.3s ease-in forwards',
            'fade-in': 'fade-in 0.3s ease-out forwards',
            'scale-in': 'scale-in 0.3s ease-out forwards',
            'fade-in-right': 'fade-in-right 0.5s ease-out forwards',
            'jiggle': 'jiggle 0.5s ease-in-out',
            'shimmer': 'shimmer 1.5s infinite linear',
            'pop': 'pop 0.5s ease-out',
            'heart-pop': 'heart-pop 0.4s ease-out',
          },
          keyframes: {
            'subtle-fade-in': {
              '0%': { opacity: '0', transform: 'translateY(10px)' },
              '100%': { opacity: '1', transform: 'translateY(0)' },
            },
            'subtle-fade-out': {
                '0%': { opacity: '1', transform: 'translateY(0)' },
                '100%': { opacity: '0', transform: 'translateY(-5px)' },
            },
            'fade-in': {
              '0%': { opacity: '0' },
              '100%': { opacity: '1' },
            },
            'scale-in': {
                '0%': { opacity: '0', transform: 'scale(0.95)' },
                '100%': { opacity: '1', transform: 'scale(1)' },
            },
            'fade-in-right': {
                '0%': { opacity: '0', transform: 'translateX(20px)' },
                '100%': { opacity: '1', transform: 'translateX(0)' },
            },
            'jiggle': {
              '0%, 100%': { transform: 'rotate(-3deg)' },
              '50%': { transform: 'rotate(3deg)' },
            },
            'shimmer': {
              '0%': { transform: 'translateX(-100%)' },
              '100%': { transform: 'translateX(100%)' },
            },
            'pop': {
              '0%, 100%': { transform: 'scale(1)' },
              '50%': { transform: 'scale(1.25)' },
            },
            'heart-pop': {
              '0%': { transform: 'scale(1)' },
              '50%': { transform: 'scale(1.4)' },
              '100%': { transform: 'scale(1)' },
            }
          },
        },
      },
    }
  </script>
  <style>
    /* Custom scrollbar for better aesthetics */
    ::-webkit-scrollbar {
      width: 8px;
    }
    ::-webkit-scrollbar-track {
      background: #F5F5DC; /* brand-cream */
    }
    ::-webkit-scrollbar-thumb {
      background: #C8B3A4; /* A muted brown */
      border-radius: 4px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: #8B4513; /* brand-brown */
    }
  </style>
  <script type="importmap">
{
  "imports": {
    "react/": "https://aistudiocdn.com/react@^19.2.0/",
    "react": "https://aistudiocdn.com/react@^19.2.0",
    "@google/genai": "https://aistudiocdn.com/@google/genai@^1.28.0",
    "react-dom/": "https://aistudiocdn.com/react-dom@^19.2.0/",
    "firebase/app": "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js",
    "firebase/firestore": "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js",
    "firebase/": "https://aistudiocdn.com/firebase@^12.5.0/"
  }
}
</script>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
