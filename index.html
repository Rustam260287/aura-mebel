<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aura Мебель</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet">

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'brand-cream': '#FBF9F4',
            'brand-cream-dark': '#F0EDE5',
            'brand-brown': '#5D4037',
            'brand-charcoal': '#374151',
            'brand-terracotta': '#AF4E2E',
            'brand-terracotta-dark': '#944225',
            'brand-gold': '#DAA520', // Darker gold for better contrast
          },
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
            serif: ['Playfair Display', 'serif'],
          },
          borderRadius: {
            'none': '0',
            'sm': '0.125rem',
            DEFAULT: '0.25rem',
            'md': '0.375rem',
            'lg': '0.75rem', // Softer radius
            'xl': '1rem',
            '2xl': '1.5rem',
            '3xl': '2rem',
            'full': '9999px',
          },
          animation: {
            'subtle-fade-in': 'subtle-fade-in 0.8s ease-out forwards',
            'subtle-fade-out': 'subtle-fade-out 0.4s ease-in forwards',
            'fade-in': 'fade-in 0.4s ease-out forwards',
            'scale-in': 'scale-in 0.4s ease-out forwards',
            'fade-in-right': 'fade-in-right 0.6s ease-out forwards',
            'slide-in-left': 'slide-in-left 0.4s ease-out forwards',
            'jiggle': 'jiggle 0.5s ease-in-out',
            'shimmer': 'shimmer 1.5s infinite linear',
            'pop': 'pop 0.5s ease-out',
            'heart-pop': 'heart-pop 0.4s ease-out',
            'pulse': 'pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite',
          },
          keyframes: {
            'subtle-fade-in': {
              '0%': { opacity: '0', transform: 'translateY(15px)' },
              '100%': { opacity: '1', transform: 'translateY(0)' },
            },
            'subtle-fade-out': {
                '0%': { opacity: '1', transform: 'translateY(0)' },
                '100%': { opacity: '0', transform: 'translateY(-10px)' },
            },
            'fade-in': {
              '0%': { opacity: '0' },
              '100%': { opacity: '1' },
            },
            'scale-in': {
                '0%': { opacity: '0', transform: 'scale(0.97)' },
                '100%': { opacity: '1', transform: 'scale(1)' },
            },
            'fade-in-right': {
                '0%': { opacity: '0', transform: 'translateX(25px)' },
                '100%': { opacity: '1', transform: 'translateX(0)' },
            },
            'slide-in-left': {
              '0%': { transform: 'translateX(-100%)' },
              '100%': { transform: 'translateX(0)' },
            },
            'jiggle': {
              '0%, 100%': { transform: 'rotate(-2deg)' },
              '50%': { transform: 'rotate(2deg)' },
            },
            'shimmer': {
              '0%': { transform: 'translateX(-100%)' },
              '100%': { transform: 'translateX(100%)' },
            },
            'pop': {
              '0%, 100%': { transform: 'scale(1)' },
              '50%': { transform: 'scale(1.2)' },
            },
            'heart-pop': {
              '0%': { transform: 'scale(1)' },
              '50%': { transform: 'scale(1.3)' },
              '100%': { transform: 'scale(1)' },
            },
            'pulse': {
              '0%, 100%': {
                transform: 'scale(1)',
                opacity: '1'
              },
              '50%': {
                transform: 'scale(1.03)',
                opacity: '.9'
              }
            },
          },
          minHeight: {
            'screen-ios': 'calc(var(--vh, 1vh) * 100)',
          },
        },
      },
    }
  </script>
  <style>
    /* Custom scrollbar for better aesthetics */
    ::-webkit-scrollbar {
      width: 8px;
    }
    ::-webkit-scrollbar-track {
      background: #FBF9F4; /* brand-cream */
    }
    ::-webkit-scrollbar-thumb {
      background: #D1C4E9; /* A muted brown */
      border-radius: 4px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: #5D4037; /* brand-brown */
    }
    
    body {
        /* Subtle background texture */
        background-color: #FBF9F4;
        background-image: radial-gradient(circle at 1px 1px, rgba(93, 64, 55, 0.05) 1px, transparent 0);
        background-size: 20px 20px;
    }

    /* Airy headings */
    h1, h2, h3, .font-serif {
        letter-spacing: -0.01em;
    }
    
    .prose h3 {
       letter-spacing: normal;
    }
  </style>
  <script type="importmap">
{
  "imports": {
    "react/": "https://aistudiocdn.com/react@^19.2.0/",
    "react": "https://aistudiocdn.com/react@^19.2.0",
    "@google/genai": "https://aistudiocdn.com/@google/genai@^1.28.0",
    "react-dom/": "https://aistudiocdn.com/react-dom@^19.2.0/"
  }
}
</script>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="./index.tsx"></script>
</body>
</html>
